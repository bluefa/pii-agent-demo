openapi: 3.0.3
info:
  title: Azure Provider Management API (Unified)
  description: |-
    Azure 리소스 연동 및 설치 상태 관리를 위한 통합 API입니다.
    스캔 실패 시 5xx 대신 데이터 레벨의 FAILED 상태를 반환하는 Soft-Failure 정책을 따릅니다.
  version: 1.12.1
servers:
  - url: /api/infra/v1
    description: API Gateway Base Path
paths:
  /azure/target-sources/{targetSourceId}/installation-status:
    parameters:
      - name: targetSourceId
        in: path
        required: true
        description: 연동 대상 소스 고유 ID
        schema:
          type: integer
    get:
      summary: Azure 통합 설치 상태 조회
      operationId: getAzureInstallationStatus
      tags:
        - Azure Installation
      description: 대상 소스의 설치 상태를 조회합니다. 5분 경과 시 자동 실시간 조회를 수행합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AzureInstallationStatus'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /azure/target-sources/{targetSourceId}/check-installation:
    parameters:
      - name: targetSourceId
        in: path
        required: true
        description: 연동 대상 소스 고유 ID
        schema:
          type: integer
    post:
      summary: Azure 통합 설치 상태 새로고침
      operationId: refreshAzureInstallationStatus
      tags:
        - Azure Installation
      description: 캐시와 무관하게 즉시 실시간 스캔을 수행하여 상태를 갱신합니다.
      responses:
        '200':
          description: 새로고침 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AzureInstallationStatus'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /azure/target-sources/{targetSourceId}/vm-terraform-script:
    parameters:
      - name: targetSourceId
        in: path
        required: true
        description: 연동 대상 소스 고유 ID
        schema:
          type: integer
    get:
      summary: VM TF Script 다운로드 (Binary)
      operationId: downloadVmTerraformScript
      tags:
        - Azure VM
      description: VM 설치를 위한 Terraform 스크립트를 ZIP 바이너리로 직접 다운로드합니다.
      responses:
        '200':
          description: 스크립트 ZIP 파일
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: 대상 없음 또는 VM 리소스 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /azure/target-sources/{targetSourceId}/settings:
    parameters:
      - name: targetSourceId
        in: path
        required: true
        description: 연동 대상 소스 고유 ID
        schema:
          type: integer
    get:
      summary: 대상 소스별 Azure 설정 조회
      operationId: getAzureTargetSourceSettings
      tags:
        - Settings
      x-expected-duration: 50ms ~ 200ms
      description: Azure Tenant/Subscription 식별자와 Scan App 등록 상태를 조회합니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AzureSettings'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
components:
  schemas:
    AzureInstallationStatus:
      type: object
      description: 통합 설치 상태 응답 모델
      required:
        - has_vm
        - last_check
      properties:
        has_vm:
          type: boolean
          description: 대상 리소스 중 VM 포함 여부
        last_check:
          $ref: '#/components/schemas/LastCheckInfo'
        resources:
          type: array
          description: 개별 리소스별 상태 리스트
          items:
            $ref: '#/components/schemas/AzureResourceStatus'
    LastCheckInfo:
      type: object
      description: 마지막 스캔 작업에 대한 메타 정보
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - IN_PROGRESS
            - FAILED
          description: 스캔 작업 상태
        checked_at:
          type: string
          format: date-time
          description: 마지막 확인 시각
        fail_reason:
          type: string
          description: FAILED 시 에러 요약
    AzureResourceStatus:
      type: object
      description: 개별 Azure 리소스 상태
      required:
        - resource_id
        - resource_type
        - is_vm
      properties:
        resource_id:
          type: string
          description: 리소스 고유 식별자
        resource_name:
          type: string
          description: 리소스 명칭
        resource_type:
          type: string
          description: '리소스 타입 (예: AZURE_VM, AZURE_MSSQL)'
        is_vm:
          type: boolean
          description: VM 여부
        private_endpoint:
          $ref: '#/components/schemas/PrivateEndpointDetail'
        vm_installation:
          $ref: '#/components/schemas/VmInstallationDetail'
    VmInstallationDetail:
      type: object
      description: VM 전용 설치 상세 정보
      properties:
        subnet_exists:
          type: boolean
          description: PLS용 Subnet 존재 여부
        load_balancer:
          type: object
          description: Load Balancer 및 PLS 설치 정보
          properties:
            installed:
              type: boolean
              description: 설치 완료 여부
            name:
              type: string
              description: LB 명칭
    PrivateEndpointDetail:
      type: object
      description: Private Endpoint 승인 상태 정보
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          description: PE 식별자
        name:
          type: string
          description: PE 이름
        status:
          type: string
          enum:
            - NOT_REQUESTED
            - PENDING_APPROVAL
            - APPROVED
            - REJECTED
          description: 승인 상태
    AzureSettings:
      type: object
      description: Azure 대상 소스 설정 정보
      required:
        - scan_app
      properties:
        tenant_id:
          type: string
          format: uuid
          description: Azure Tenant ID
        subscription_id:
          type: string
          format: uuid
          description: Azure Subscription ID
        scan_app:
          type: object
          description: Scan App (Service Principal) 정보
          required:
            - app_id
            - status
          properties:
            app_id:
              type: string
              description: Azure Application ID
            status:
              type: string
              enum:
                - VALID
                - INVALID
                - UNVERIFIED
              description: 신분증 유효성 상태
            last_verified_at:
              type: string
              format: date-time
              description: 마지막 검증 시각
    ErrorResponse:
      type: object
      description: 에러 응답 공통 모델
      required:
        - error
      properties:
        error:
          type: object
          description: 에러 상세 객체
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 에러 코드
            message:
              type: string
              description: 에러 메시지
  responses:
    PermissionDenied:
      description: 인가 실패 응답
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              message: 해당 리소스에 접근할 권한이 없습니다.
    TargetSourceNotFound:
      description: 대상을 찾을 수 없을 때의 응답
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: TARGET_SOURCE_NOT_FOUND
              message: 요청하신 Target Source를 찾을 수 없습니다.
    BadRequest:
      description: 잘못된 요청 응답
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_FAILED
              message: 요청 파라미터가 올바르지 않습니다.
