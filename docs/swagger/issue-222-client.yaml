openapi: 3.0.3
info:
  title: Issue #222 Client-Executable API Mirror
  version: 0.1.0
  description: |-
    GitHub Issue #222의 BFF OpenAPI를 기준으로, 현재 Next.js client에서 실제로 호출 가능한 경로만 묶은 실행형 Swagger 문서입니다.

    ### 목적
    - Swagger UI의 `Try it out`으로 현재 client route를 바로 검증
    - 기존 분리 Swagger(`user.yaml`, `confirm.yaml`, `scan.yaml`, `credential.yaml`, `azure.yaml`)를 재사용
    - 현재 client에 아직 없는 upstream 전용 endpoint는 제외

    ### 경로 규칙
    - 실행 서버: same-origin `/api`
    - 실제 호출 경로: `/api/integration/v1/**`

    ### 제외된 upstream 전용 endpoint
    - `/install/actuator*`
    - `/install/v1/infra/target-sources/{targetSourceId}/azure-private-link-health-check`

    ### 경로 적응 원칙
    - 이미 client에 존재하는 경로는 현재 route shape를 그대로 사용
    - Issue #222에서 필요하지만 client에 없던 `approval-requests/latest`, `azure/scan-app`은 이 문서와 함께 route를 추가
servers:
  - url: /api
    description: Same-origin Next.js API base
tags:
  - name: User
    description: 현재 로그인 사용자 및 접근 가능한 서비스 조회
  - name: Service Access
    description: 서비스 권한 사용자 관리
  - name: Target Source
    description: 타겟소스 목록/생성/상세 조회
  - name: Approval Process
    description: 승인 요청 생성, 조회, 처리, 이력
  - name: Process Status
    description: 타겟소스 처리 상태 조회
  - name: Installation
    description: PII Agent 설치 확정 및 Azure scan app 조회
  - name: Scan
    description: 리소스 스캔과 이력 조회
  - name: Azure Installation
    description: Azure 설치 상태 조회
paths:
  /integration/v1/user/me:
    $ref: './user.yaml#/paths/~1user~1me'

  /integration/v1/user/services:
    $ref: './user.yaml#/paths/~1user~1services'

  /integration/v1/users/search:
    $ref: './user.yaml#/paths/~1users~1search'

  /integration/v1/services/{serviceCode}/authorized-users:
    $ref: './user.yaml#/paths/~1services~1{serviceCode}~1authorized-users'

  /integration/v1/services/{serviceCode}/authorized-users/{userId}:
    $ref: './user.yaml#/paths/~1services~1{serviceCode}~1authorized-users~1{userId}'

  /integration/v1/services/{serviceCode}/target-sources:
    parameters:
      - $ref: './user.yaml#/components/parameters/ServiceCode'
    get:
      tags:
        - Target Source
      summary: 서비스별 타겟소스 목록 조회
      description: 현재 client route의 프로젝트 목록 응답을 그대로 노출합니다.
      operationId: getClientServiceTargetSources
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTargetSourceListResponse'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/ServiceNotFound'
    post:
      tags:
        - Target Source
      summary: 서비스에 타겟소스 생성
      description: 현재 client route의 생성 응답을 그대로 노출합니다.
      operationId: createClientServiceTargetSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './user.yaml#/components/schemas/CreateTargetSourceRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTargetSourceEnvelope'
        '400':
          $ref: './user.yaml#/components/responses/BadRequest'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/ServiceNotFound'
        '409':
          $ref: './user.yaml#/components/responses/Conflict'

  /integration/v1/target-sources/{targetSourceId}:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Target Source
      summary: 타겟소스 상세 조회
      description: 현재 client가 반환하는 상세 모델(Project 기반)을 그대로 노출합니다.
      operationId: getClientTargetSource
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTargetSourceDetail'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'

  /integration/v1/target-sources/{targetSourceId}/resources:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1resources'

  /integration/v1/target-sources/{targetSourceId}/approval-requests:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests'

  /integration/v1/target-sources/{targetSourceId}/approval-requests/latest:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 최신 승인 요청 조회
      description: |
        approval-history의 첫 항목을 latest 형태로 노출하는 client helper route입니다.
        반환되는 request는 summary 중심 응답이며, 상세 input_data.resource_inputs는 포함하지 않습니다.
      operationId: getLatestApprovalRequestFromClient
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ApprovalHistoryItem'
        '404':
          description: 승인 요청 이력이 없음
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ClientProblemDetails'

  /integration/v1/target-sources/{targetSourceId}/approval-requests/approve:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests~1approve'

  /integration/v1/target-sources/{targetSourceId}/approval-requests/reject:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests~1reject'

  /integration/v1/target-sources/{targetSourceId}/approval-requests/cancel:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests~1cancel'

  /integration/v1/target-sources/{targetSourceId}/confirmed-integration:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1confirmed-integration'

  /integration/v1/target-sources/{targetSourceId}/approved-integration:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approved-integration'

  /integration/v1/target-sources/{targetSourceId}/approval-history:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-history'

  /integration/v1/target-sources/{targetSourceId}/process-status:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1process-status'

  /integration/v1/target-sources/{targetSourceId}/pii-agent-installation/confirm:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1pii-agent-installation~1confirm'

  /integration/v1/target-sources/{targetSourceId}/resources/credential:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1resources~1credential'

  /integration/v1/target-sources/{targetSourceId}/secrets:
    $ref: './credential.yaml#/paths/~1target-sources~1{targetSourceId}~1secrets'

  /integration/v1/target-sources/{targetSourceId}/scan:
    $ref: './scan.yaml#/paths/~1target-sources~1{targetSourceId}~1scan'

  /integration/v1/target-sources/{targetSourceId}/scan/history:
    $ref: './scan.yaml#/paths/~1target-sources~1{targetSourceId}~1scan~1history'

  /integration/v1/target-sources/{targetSourceId}/scanJob/latest:
    $ref: './scan.yaml#/paths/~1target-sources~1{targetSourceId}~1scanJob~1latest'

  /integration/v1/azure/target-sources/{targetSourceId}/installation-status:
    $ref: './azure.yaml#/paths/~1azure~1target-sources~1{targetSourceId}~1installation-status'

  /integration/v1/target-sources/{targetSourceId}/azure/scan-app:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Installation
      summary: Azure scan app 조회
      description: Issue #222의 Azure scan app 조회를 현재 client settings 응답 기반으로 노출합니다.
      operationId: getAzureScanAppFromClient
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AzureScanAppResponse'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'
components:
  schemas:
    ClientTargetSourceListResponse:
      type: object
      required:
        - targetSources
      properties:
        targetSources:
          type: array
          items:
            $ref: '#/components/schemas/ClientProjectSummary'
    ClientTargetSourceEnvelope:
      type: object
      required:
        - targetSource
      properties:
        targetSource:
          $ref: '#/components/schemas/ClientTargetSourceDetail'
    ClientProjectSummary:
      type: object
      required:
        - id
        - targetSourceId
        - projectCode
        - processStatus
        - cloudProvider
        - resourceCount
        - hasDisconnected
        - hasNew
        - isRejected
        - connectionTestComplete
      properties:
        id:
          type: string
        targetSourceId:
          type: integer
          format: int64
        projectCode:
          type: string
        processStatus:
          type: integer
        cloudProvider:
          type: string
          enum:
            - AWS
            - Azure
            - GCP
            - IDC
            - SDU
        resourceCount:
          type: integer
        hasDisconnected:
          type: boolean
        hasNew:
          type: boolean
        description:
          type: string
        isRejected:
          type: boolean
        rejectionReason:
          type: string
        connectionTestComplete:
          type: boolean
    ClientTargetSourceDetail:
      type: object
      description: |-
        현재 client가 `/integration/v1/target-sources/{targetSourceId}`에서 반환하는 Project 기반 응답입니다.
        향후 Azure BFF 전환 과정에서 shape가 바뀔 수 있으므로 정의되지 않은 필드는 무시할 수 있어야 합니다.
      required:
        - id
        - targetSourceId
        - projectCode
        - serviceCode
        - cloudProvider
        - processStatus
        - status
        - resources
        - terraformState
        - createdAt
        - updatedAt
        - name
        - description
        - isRejected
      properties:
        id:
          type: string
        targetSourceId:
          type: integer
          format: int64
        projectCode:
          type: string
        serviceCode:
          type: string
        cloudProvider:
          type: string
          enum:
            - AWS
            - Azure
            - GCP
            - IDC
            - SDU
        processStatus:
          type: integer
        status:
          type: object
          additionalProperties: true
        resources:
          type: array
          items:
            type: object
            additionalProperties: true
        terraformState:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
        description:
          type: string
        isRejected:
          type: boolean
      additionalProperties: true
    AzureScanAppResponse:
      type: object
      properties:
        app_id:
          type: string
        status:
          type: string
        fail_reason:
          type: string
        fail_message:
          type: string
        last_verified_at:
          type: string
          format: date-time
    ClientProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - retriable
        - requestId
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        retriable:
          type: boolean
        requestId:
          type: string
