openapi: 3.0.3
info:
  title: Issue #222 Client-Executable API Mirror
  version: 0.1.0
  description: |-
    GitHub Issue #222의 BFF OpenAPI를 기준으로, 현재 Next.js client에서 실제로 호출 가능한 경로만 묶은 실행형 Swagger 문서입니다.

    ### 목적
    - Swagger UI의 `Try it out`으로 현재 client route를 바로 검증
    - 기존 분리 Swagger(`user.yaml`, `confirm.yaml`, `scan.yaml`, `credential.yaml`, `azure.yaml`)를 재사용
    - 현재 client에 아직 없는 upstream 전용 endpoint는 제외

    ### 경로 규칙
    - 실행 서버: same-origin `/`
    - 실제 호출 경로: `/integration/api/v1/**`

    ### 제외된 upstream 전용 endpoint
    - `/install/actuator*`
    - `/install/v1/infra/target-sources/{targetSourceId}/azure-private-link-health-check`

    ### 범위 참고
    - test connection API/UI는 현재 제품에서 유지 대상입니다.
    - Issue #222 원문에 test connection이 명시되지 않은 것은 이번 문서 범위 제외를 의미하며, 기능 제거를 뜻하지 않습니다.

    ### 경로 적응 원칙
    - 이미 client에 존재하는 경로는 현재 route shape를 그대로 사용
    - Issue #222에서 필요하지만 client에 없던 `approval-requests/latest`, `azure/scan-app`은 이 문서와 함께 route를 추가
servers:
  - url: /
    description: Same-origin app origin
tags:
  - name: User
    description: 현재 로그인 사용자 및 접근 가능한 서비스 조회
  - name: Service Access
    description: 서비스 권한 사용자 관리
  - name: Target Source
    description: 타겟소스 목록/생성/상세 조회
  - name: Resources
    description: 타겟소스 리소스 카탈로그 조회
  - name: Approval Process
    description: 승인 요청 생성, 조회, 처리, 이력
  - name: Process Status
    description: 타겟소스 처리 상태 조회
  - name: Installation
    description: PII Agent 설치 확정 및 Azure scan app 조회
  - name: Scan
    description: 리소스 스캔과 이력 조회
  - name: Azure Installation
    description: Azure 설치 상태 조회
paths:
  /integration/api/v1/user/me:
    $ref: './user.yaml#/paths/~1user~1me'

  /integration/api/v1/user/services:
    $ref: './user.yaml#/paths/~1user~1services'

  /integration/api/v1/users/search:
    $ref: './user.yaml#/paths/~1users~1search'

  /integration/api/v1/services/{serviceCode}/authorized-users:
    $ref: './user.yaml#/paths/~1services~1{serviceCode}~1authorized-users'

  /integration/api/v1/services/{serviceCode}/authorized-users/{userId}:
    $ref: './user.yaml#/paths/~1services~1{serviceCode}~1authorized-users~1{userId}'

  /integration/api/v1/services/{serviceCode}/target-sources:
    parameters:
      - $ref: './user.yaml#/components/parameters/ServiceCode'
    get:
      tags:
        - Target Source
      summary: 서비스별 타겟소스 목록 조회
      description: Issue #222 원문의 `GET /install/v1/target-sources/services/{serviceCode}`를 현재 client 경로로 실행 가능하게 노출합니다.
      operationId: getClientServiceTargetSources
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue222TargetSourceDetail'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/ServiceNotFound'
    post:
      tags:
        - Target Source
      summary: 서비스에 타겟소스 생성
      description: Issue #222 원문의 `POST /install/v1/target-sources/services/{serviceCode}/target-sources`를 현재 client 경로로 실행 가능하게 노출합니다.
      operationId: createClientServiceTargetSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Issue222CreateTargetSourceRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue222CreatedTargetSourceInfo'
        '400':
          $ref: './user.yaml#/components/responses/BadRequest'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/ServiceNotFound'
        '409':
          $ref: './user.yaml#/components/responses/Conflict'

  /integration/api/v1/target-sources/{targetSourceId}:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Target Source
      summary: 타겟소스 상세 조회
      description: 현재 client가 반환하는 상세 모델(Project 기반)을 그대로 노출합니다.
      operationId: getClientTargetSource
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTargetSourceDetail'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'

  /integration/api/v1/target-sources/{targetSourceId}/resources:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Resources
      summary: 연동 가능 리소스 목록 조회
      operationId: getClientResources
      x-expected-duration: 80ms ~ 300ms
      description: 현재 Next.js route가 반환하는 리소스 카탈로그 응답입니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ResourceCatalogResponse'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'

  /integration/api/v1/target-sources/{targetSourceId}/approval-requests:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests'

  /integration/api/v1/target-sources/{targetSourceId}/approval-requests/latest:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 최신 승인 요청 조회
      description: |
        approval-history의 첫 항목을 latest 형태로 노출하는 client helper route입니다.
        응답 shape는 Issue #222의 `ApprovalHistoryItemDto`와 동일하며, 요청 상세 선택 복원은
        `target-source`, `approved-integration`, `confirmed-integration` 응답을 기준으로 이어집니다.
      operationId: getLatestApprovalRequestFromClient
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ApprovalHistoryItemDto'
        '404':
          description: 승인 요청 이력이 없음
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ClientProblemDetails'
              example:
                type: https://pii-agent.dev/problems/NOT_FOUND
                title: Not Found
                status: 404
                detail: 승인 요청 이력이 없습니다.
                code: NOT_FOUND
                retriable: false
                requestId: 123e4567-e89b-12d3-a456-426614174000

  /integration/api/v1/target-sources/{targetSourceId}/approval-requests/approve:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests~1approve'

  /integration/api/v1/target-sources/{targetSourceId}/approval-requests/reject:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests~1reject'

  /integration/api/v1/target-sources/{targetSourceId}/approval-requests/cancel:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1approval-requests~1cancel'

  /integration/api/v1/target-sources/{targetSourceId}/confirmed-integration:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 연동 확정 정보 조회
      operationId: getClientConfirmedIntegration
      description: 현재 Next.js route가 반환하는 확정 연동 스냅샷입니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ConfirmedIntegrationResponse'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          description: 대상 소스를 찾을 수 없거나 확정된 연동 스냅샷이 없음
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ClientProblemDetails'
              examples:
                target_source_not_found:
                  summary: 대상 소스를 찾을 수 없음
                  value:
                    type: https://pii-agent.dev/problems/TARGET_SOURCE_NOT_FOUND
                    title: Target Source Not Found
                    status: 404
                    detail: targetSourceId 99999에 해당하는 리소스를 찾을 수 없습니다.
                    code: TARGET_SOURCE_NOT_FOUND
                    retriable: false
                    requestId: 123e4567-e89b-12d3-a456-426614174000
                confirmed_integration_not_found:
                  summary: 확정된 연동 스냅샷이 없음
                  value:
                    type: https://pii-agent.dev/problems/CONFIRMED_INTEGRATION_NOT_FOUND
                    title: Not Found
                    status: 404
                    detail: 확정된 연동 정보가 없습니다.
                    code: CONFIRMED_INTEGRATION_NOT_FOUND
                    retriable: false
                    requestId: 123e4567-e89b-12d3-a456-426614174000

  /integration/api/v1/target-sources/{targetSourceId}/approved-integration:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 승인 완료 정보 조회
      operationId: getClientApprovedIntegration
      description: 현재 Next.js route가 반환하는 승인 완료 스냅샷입니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ApprovedIntegrationResponseDto'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          description: 대상 소스를 찾을 수 없거나 승인된 연동 스냅샷이 없음
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ClientProblemDetails'
              examples:
                target_source_not_found:
                  summary: 대상 소스를 찾을 수 없음
                  value:
                    type: https://pii-agent.dev/problems/TARGET_SOURCE_NOT_FOUND
                    title: Target Source Not Found
                    status: 404
                    detail: targetSourceId 99999에 해당하는 리소스를 찾을 수 없습니다.
                    code: TARGET_SOURCE_NOT_FOUND
                    retriable: false
                    requestId: 123e4567-e89b-12d3-a456-426614174000
                approved_integration_not_found:
                  summary: 승인된 연동 스냅샷이 없음
                  value:
                    type: https://pii-agent.dev/problems/APPROVED_INTEGRATION_NOT_FOUND
                    title: Not Found
                    status: 404
                    detail: 승인된 연동 정보가 없습니다.
                    code: APPROVED_INTEGRATION_NOT_FOUND
                    retriable: false
                    requestId: 123e4567-e89b-12d3-a456-426614174000

  /integration/api/v1/target-sources/{targetSourceId}/approval-history:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 10
    get:
      tags:
        - Approval Process
      summary: 승인/반려/확정 이력 전체 조회
      operationId: getClientApprovalHistory
      description: 현재 Next.js route가 반환하는 approval history page입니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ApprovalHistoryPageDto'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'

  /integration/api/v1/target-sources/{targetSourceId}/process-status:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Process Status
      summary: 대상 소스 processStatus 조회
      operationId: getClientTargetSourceProcessStatus
      x-expected-duration: 2s ~ 30s
      description: 현재 Next.js route가 반환하는 Issue #222 process status입니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: './confirm.yaml#/components/schemas/ProcessStatusResponseDto'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'

  /integration/api/v1/target-sources/{targetSourceId}/pii-agent-installation/confirm:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1pii-agent-installation~1confirm'

  /integration/api/v1/target-sources/{targetSourceId}/resources/credential:
    $ref: './confirm.yaml#/paths/~1target-sources~1{targetSourceId}~1resources~1credential'

  /integration/api/v1/target-sources/{targetSourceId}/secrets:
    $ref: './credential.yaml#/paths/~1target-sources~1{targetSourceId}~1secrets'

  /integration/api/v1/target-sources/{targetSourceId}/scan:
    $ref: './scan.yaml#/paths/~1target-sources~1{targetSourceId}~1scan'

  /integration/api/v1/target-sources/{targetSourceId}/scan/history:
    $ref: './scan.yaml#/paths/~1target-sources~1{targetSourceId}~1scan~1history'

  /integration/api/v1/target-sources/{targetSourceId}/scanJob/latest:
    $ref: './scan.yaml#/paths/~1target-sources~1{targetSourceId}~1scanJob~1latest'

  /integration/api/v1/azure/target-sources/{targetSourceId}/installation-status:
    $ref: './azure.yaml#/paths/~1azure~1target-sources~1{targetSourceId}~1installation-status'

  /integration/api/v1/target-sources/{targetSourceId}/azure/scan-app:
    parameters:
      - $ref: './confirm.yaml#/components/parameters/TargetSourceId'
    get:
      tags:
        - Installation
      summary: Azure scan app 조회
      description: Issue #222의 Azure scan app 조회를 현재 client settings 응답 기반으로 노출합니다.
      operationId: getAzureScanAppFromClient
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AzureScanAppResponse'
        '401':
          $ref: './user.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './user.yaml#/components/responses/Forbidden'
        '404':
          $ref: './user.yaml#/components/responses/TargetSourceNotFound'
components:
  schemas:
    Issue222CreateTargetSourceRequest:
      type: object
      properties:
        description:
          type: string
        cloudProvider:
          type: string
          enum:
            - AWS
            - GCP
            - AZURE
            - IDC
            - UNKNOWN
        awsAccountId:
          type: string
        awsRegionType:
          type: string
        tenantId:
          type: string
        subscriptionId:
          type: string
        gcpProjectId:
          type: string
    Issue222TargetSourceMetadata:
      type: object
      properties:
        tenant_id:
          type: string
        subscription_id:
          type: string
    Issue222TargetSourceDetail:
      type: object
      properties:
        description:
          type: string
        target_source_id:
          type: integer
          format: int64
        process_status:
          type: string
          enum:
            - IDLE
            - PENDING
            - CONFIRMING
            - CONFIRMED
            - INSTALLED
            - CONNECTED
            - COMPLETED
        cloud_provider:
          type: string
          enum:
            - AWS
            - GCP
            - AZURE
            - IDC
            - UNKNOWN
        created_at:
          type: string
          format: date-time
        metadata:
          $ref: '#/components/schemas/Issue222TargetSourceMetadata'
    Issue222CreatedTargetSourceInfo:
      type: object
      properties:
        targetSourceId:
          type: integer
          format: int64
        description:
          type: string
        cloudProvider:
          type: string
          enum:
            - AWS
            - GCP
            - AZURE
            - IDC
            - UNKNOWN
        createdAt:
          type: string
          format: date-time
        serviceCode:
          type: string
        updatedAt:
          type: string
          format: date-time
        metadata:
          $ref: '#/components/schemas/Issue222TargetSourceMetadata'
    ClientTargetSourceDetail:
      type: object
      description: |-
        현재 client가 `/integration/api/v1/target-sources/{targetSourceId}`에서 반환하는 Project 기반 응답입니다.
        향후 Azure BFF 전환 과정에서 shape가 바뀔 수 있으므로 정의되지 않은 필드는 무시할 수 있어야 합니다.
      required:
        - id
        - targetSourceId
        - projectCode
        - serviceCode
        - cloudProvider
        - processStatus
        - status
        - resources
        - terraformState
        - createdAt
        - updatedAt
        - name
        - description
        - isRejected
      properties:
        id:
          type: string
        targetSourceId:
          type: integer
          format: int64
        projectCode:
          type: string
        serviceCode:
          type: string
        cloudProvider:
          type: string
          enum:
            - AWS
            - Azure
            - GCP
            - IDC
            - SDU
        processStatus:
          type: integer
        status:
          type: object
          additionalProperties: true
        resources:
          type: array
          items:
            type: object
            additionalProperties: true
        terraformState:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
        description:
          type: string
        isRejected:
          type: boolean
      additionalProperties: true
    AzureScanAppResponse:
      type: object
      properties:
        app_id:
          type: string
        status:
          type: string
        fail_reason:
          type: string
        fail_message:
          type: string
        last_verified_at:
          type: string
          format: date-time
    ClientProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - retriable
        - requestId
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        retriable:
          type: boolean
        requestId:
          type: string
