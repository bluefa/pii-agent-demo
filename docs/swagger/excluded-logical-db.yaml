openapi: 3.0.3
info:
  title: Excluded Logical Database & Test Connection Confirmation API
  version: 1.0.0
  description: |
    연동 제외 논리 DB 관리 및 Test Connection 완료 확인 **BFF API** 명세서입니다.

    ### 주요 기능
    * **연동 제외 논리 DB 목록 관리**: 리소스별 연동 제외 논리 DB 목록을 조회/업데이트합니다.
    * **TC 결과 논리 DB 조회**: 마지막 Test Connection 성공 결과에서 확인된 논리 DB 목록을 조회합니다.
    * **TC 완료 확인 관리**: TargetSource 단위로 Test Connection 완료 여부를 설정/롤백합니다.

    ### resourceId 변경 사항
    원본 이슈의 path parameter `{resourceId}`를 **query parameter**로 변경하였습니다.
    - 변경 전: `/target-sources/{targetSourceId}/resources/{resourceId}/excluded-logical-databases`
    - 변경 후: `/target-sources/{targetSourceId}/excluded-logical-databases?resourceId={resourceId}`

servers:
  - url: /integration/api/v1
    description: BFF API Base Path

tags:
  - name: Excluded Logical Database
    description: 연동 제외 논리 DB 목록 관리
  - name: Tested Logical Database
    description: Test Connection 결과 논리 DB 목록 조회
  - name: Test Connection Confirmation
    description: Test Connection 완료 확인 관리

paths:
  /target-sources/{targetSourceId}/excluded-logical-databases:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'

    get:
      tags: [Excluded Logical Database]
      summary: 연동 제외 논리 DB 목록 조회
      operationId: getExcludedLogicalDatabases
      description: |
        특정 리소스에 설정된 연동 제외 논리 DB 목록을 조회합니다.
        `resourceId`를 query parameter로 전달합니다.
      parameters:
        - $ref: '#/components/parameters/ResourceIdQuery'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExcludedLogicalDatabasesResponse'
              example:
                targetSourceId: 1
                resourceId: "resource-abc-123"
                excludedLogicalDatabases:
                  - "db_legacy_01"
                  - "db_temp_migration"
                  - "db_deprecated"
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Excluded Logical Database]
      summary: 연동 제외 논리 DB 목록 업데이트
      operationId: updateExcludedLogicalDatabases
      description: |
        특정 리소스의 연동 제외 논리 DB 목록을 전체 교체(replace)합니다.
        `resourceId`를 query parameter로 전달합니다.

        ### 부수 효과
        업데이트 수행 시 다음 동작이 자동으로 실행됩니다:
        1. **Test Connection 이력 삭제**: 기존 TC 이력이 삭제되어 미수행 상태로 초기화됩니다.
        2. **GCS 파일 업로드**: 제외할 논리 DB 목록이 GCS에 파일 형태로 업로드됩니다.
      parameters:
        - $ref: '#/components/parameters/ResourceIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExcludedLogicalDatabasesRequest'
            example:
              excludedLogicalDatabases:
                - "db_legacy_01"
                - "db_temp_migration"
                - "db_deprecated"
      responses:
        '200':
          description: 업데이트 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExcludedLogicalDatabasesResponse'
              example:
                targetSourceId: 1
                resourceId: "resource-abc-123"
                excludedLogicalDatabases:
                  - "db_legacy_01"
                  - "db_temp_migration"
                  - "db_deprecated"
        '404':
          $ref: '#/components/responses/NotFound'

  /target-sources/{targetSourceId}/tested-logical-databases:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'

    get:
      tags: [Tested Logical Database]
      summary: 마지막 Test Connection 결과 논리 DB 목록 조회
      operationId: getTestedLogicalDatabases
      description: |
        특정 리소스에 대해 가장 마지막 Test Connection 버전의 성공(SUCCESS) 결과에서 확인된 논리 DB 목록을 조회합니다.
        `resourceId`를 query parameter로 전달합니다.

        `ConnectionTestedContext`의 `databaseName`을 기반으로, Resource 상태가 **SUCCESS**인 경우의 논리 DB 이름 목록을 반환합니다.

        ### 404 조건
        * 해당 Resource가 존재하지 않는 경우
        * 마지막 Test Connection 결과에서 해당 Resource가 SUCCESS가 아닌 경우
      parameters:
        - $ref: '#/components/parameters/ResourceIdQuery'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestedLogicalDatabasesResponse'
              example:
                targetSourceId: 1
                resourceId: "resource-abc-123"
                testConnectionVersion: "tc-20260218-001"
                logicalDatabases:
                  - "db_production"
                  - "db_analytics"
                  - "db_reporting"
                  - "db_user_data"
        '404':
          $ref: '#/components/responses/TestedLogicalDatabaseNotFound'

  /target-sources/{targetSourceId}/test-connection-confirmation:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'

    put:
      tags: [Test Connection Confirmation]
      summary: Test Connection 완료 확인 설정/롤백
      operationId: updateTestConnectionConfirmation
      description: |
        TargetSource의 Test Connection 완료 확인 상태를 설정하거나 롤백합니다.

        ### 완료 설정 (`confirmed: true`)
        * `confirmed`를 `true`로 설정합니다.
        * `confirmedAt`에 설정 시점의 timestamp가 기록됩니다.

        ### 완료 롤백 (`confirmed: false`)
        * `confirmed`를 `false`로 설정합니다.
        * `confirmedAt`은 `null`로 초기화됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTestConnectionConfirmationRequest'
            examples:
              confirm:
                summary: 완료 설정
                value:
                  confirmed: true
              rollback:
                summary: 완료 롤백
                value:
                  confirmed: false
      responses:
        '200':
          description: 업데이트 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestConnectionConfirmationResponse'
              examples:
                confirmed:
                  summary: 완료 설정 결과
                  value:
                    targetSourceId: 1
                    confirmed: true
                    confirmedAt: "2026-02-18T14:30:00Z"
                rolledBack:
                  summary: 완료 롤백 결과
                  value:
                    targetSourceId: 1
                    confirmed: false
                    confirmedAt: null
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    TargetSourceId:
      name: targetSourceId
      in: path
      required: true
      description: 연동 대상 소스 고유 ID
      schema:
        type: integer
        format: int64
        example: 1

    ResourceIdQuery:
      name: resourceId
      in: query
      required: true
      description: 리소스 고유 식별자 (query parameter)
      schema:
        type: string
        example: "resource-abc-123"

  schemas:
    UpdateExcludedLogicalDatabasesRequest:
      type: object
      description: 연동 제외 논리 DB 목록 업데이트 요청
      required:
        - excludedLogicalDatabases
      properties:
        excludedLogicalDatabases:
          type: array
          description: 연동에서 제외할 논리 DB 이름 목록 (전체 교체)
          items:
            type: string
          example:
            - "db_legacy_01"
            - "db_temp_migration"

    ExcludedLogicalDatabasesResponse:
      type: object
      description: 연동 제외 논리 DB 목록 응답
      required:
        - targetSourceId
        - resourceId
        - excludedLogicalDatabases
      properties:
        targetSourceId:
          type: integer
          format: int64
          description: 연동 대상 소스 고유 ID
        resourceId:
          type: string
          description: 리소스 고유 식별자
        excludedLogicalDatabases:
          type: array
          description: 연동에서 제외된 논리 DB 이름 목록
          items:
            type: string

    TestedLogicalDatabasesResponse:
      type: object
      description: 마지막 Test Connection 성공 결과의 논리 DB 목록 응답
      required:
        - targetSourceId
        - resourceId
        - logicalDatabases
      properties:
        targetSourceId:
          type: integer
          format: int64
          description: 연동 대상 소스 고유 ID
        resourceId:
          type: string
          description: 리소스 고유 식별자
        testConnectionVersion:
          type: string
          description: Test Connection 버전 식별자
        logicalDatabases:
          type: array
          description: 연결 성공으로 확인된 논리 DB 이름 목록
          items:
            type: string

    UpdateTestConnectionConfirmationRequest:
      type: object
      description: Test Connection 완료 확인 설정/롤백 요청
      required:
        - confirmed
      properties:
        confirmed:
          type: boolean
          description: |
            * `true`: 완료 설정 (confirmedAt에 현재 시간 기록)
            * `false`: 완료 롤백 (confirmedAt을 null로 초기화)

    TestConnectionConfirmationResponse:
      type: object
      description: Test Connection 완료 확인 상태 응답
      required:
        - targetSourceId
        - confirmed
      properties:
        targetSourceId:
          type: integer
          format: int64
          description: 연동 대상 소스 고유 ID
        confirmed:
          type: boolean
          description: Test Connection 완료 확인 여부
        confirmedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            완료 확인 시각.
            * `confirmed: true`인 경우 설정 시점의 timestamp
            * `confirmed: false`인 경우 null

    ErrorResponse:
      type: object
      description: 공통 에러 응답
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 에러 코드
            message:
              type: string
              description: 에러 메시지

  responses:
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "NOT_FOUND"
              message: "요청한 리소스를 찾을 수 없습니다."

    TestedLogicalDatabaseNotFound:
      description: |
        다음 조건에 해당하는 경우 404를 반환합니다:
        * 해당 Resource가 존재하지 않는 경우
        * 마지막 Test Connection 결과에서 해당 Resource가 SUCCESS가 아닌 경우
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            resourceNotFound:
              summary: Resource가 존재하지 않음
              value:
                error:
                  code: "RESOURCE_NOT_FOUND"
                  message: "해당 Resource를 찾을 수 없습니다."
            notSuccess:
              summary: 마지막 TC 결과가 SUCCESS가 아님
              value:
                error:
                  code: "TEST_CONNECTION_NOT_SUCCESS"
                  message: "마지막 Test Connection 결과에서 해당 Resource가 SUCCESS 상태가 아닙니다."
