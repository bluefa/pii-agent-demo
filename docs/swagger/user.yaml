openapi: 3.0.3
info:
  title: User and Service Access API
  description: >-
    사용자 정보 조회 및 서비스 접근/타겟소스 관리 API입니다.


    ### Error Handling

    - 모든 에러 응답은 RFC 9457 `ProblemDetails` 스키마를 따릅니다.

    - **401 Unauthorized**: SSO 인증 토큰이 유효하지 않거나, 인증은 되었으나 시스템 권한이 없는 경우(사용자 미등록 포함) 발생합니다.


    ### Legacy API Replacement Map

    > Last reviewed: 2026-04-24 — projid-removal W1-W4 (#320 / #328 / #324 / #325) merge 완료 후 검증.
    > 레거시 `projectId` 개념은 코드에서 전면 폐기되었으며, 본 map은 historical reference입니다.

    - `GET /api/services/{serviceCode}/projects` -> `GET /install/v1/target-sources/services/{serviceCode}`

    - `POST /api/projects` -> `POST /install/v1/target-sources/services/{serviceCode}/target-sources`

    - `GET /api/projects/{projectId}` -> `GET /install/v1/target-sources/{targetSourceId}`

    - `GET /api/services/{serviceCode}/permissions` -> `GET /install/v1/services/{serviceCode}/authorized-users`

    - `POST /api/services/{serviceCode}/permissions` -> `POST /install/v1/services/{serviceCode}/authorized-users`

    - `DELETE /api/services/{serviceCode}/permissions/{userId}` -> `DELETE
    /install/v1/services/{serviceCode}/authorized-users/{userId}`
  version: 1.1.0
servers:
  - url: /install/v1
    description: Issue #222 upstream BFF base
tags:
  - name: User
    description: 사용자 식별 및 사용자 검색
  - name: Service Access
    description: 서비스 접근 가능한 사용자 관리
  - name: Target Source
    description: 서비스 소속 타겟소스 조회/생성/상세
x-legacy-api-replacements:
  - legacy: GET /api/services/{serviceCode}/projects
    replacement: GET /install/v1/target-sources/services/{serviceCode}
    status: migrated
  - legacy: POST /api/projects
    replacement: POST /install/v1/target-sources/services/{serviceCode}/target-sources
    status: migrated
  - legacy: GET /api/projects/{projectId}
    replacement: GET /install/v1/target-sources/{targetSourceId}
    status: migrated
  - legacy: GET /api/services/{serviceCode}/permissions
    replacement: GET /install/v1/services/{serviceCode}/authorized-users
    status: migrated
  - legacy: POST /api/services/{serviceCode}/permissions
    replacement: POST /install/v1/services/{serviceCode}/authorized-users
    status: migrated
  - legacy: DELETE /api/services/{serviceCode}/permissions/{userId}
    replacement: DELETE /install/v1/services/{serviceCode}/authorized-users/{userId}
    status: migrated
paths:
  /user/me:
    get:
      tags:
        - User
      summary: 현재 사용자 정보 조회
      operationId: getUserMe
      x-expected-duration: 50ms ~ 200ms
      description: |-
        현재 로그인한 사용자의 flat 프로필 정보를 반환합니다.
        인증된 세션 혹은 토큰을 기반으로 사용자 정보를 식별합니다.
      responses:
        '200':
          description: 사용자 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /user/services:
    get:
      tags:
        - User
      summary: 접근 가능 서비스 목록 조회
      operationId: getUserServices
      x-expected-duration: 50ms ~ 200ms
      description: 현재 사용자가 접근 가능한 서비스를 camelCase 항목 배열로 반환합니다.
      responses:
        '200':
          description: 서비스 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserServicesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /user/services/page:
    get:
      tags:
        - User
      summary: 접근 가능 서비스 목록 페이지네이션 조회
      operationId: getUserServicesPage
      x-expected-duration: 100ms ~ 300ms
      description: |-
        현재 사용자가 접근 가능한 서비스를 페이지네이션 + 검색으로 조회합니다.
        query 파라미터로 serviceCode 또는 serviceName에 대한 포함 검색을 수행합니다.
      parameters:
        - name: page
          in: query
          required: false
          description: 페이지 번호 (0-based, 기본값 0)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: 페이지당 항목 수 (기본값 10)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: query
          in: query
          required: false
          description: 검색어 (serviceCode 또는 serviceName에 포함 검색)
          schema:
            type: string
      responses:
        '200':
          description: 서비스 목록 페이지 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users/search:
    get:
      tags:
        - User
      summary: 사용자 검색
      operationId: searchUsers
      description: 이름 또는 이메일 기준으로 사용자를 검색합니다.
      x-expected-duration: 100ms ~ 300ms
      parameters:
        - name: q
          in: query
          required: false
          description: 검색어 (이름/이메일)
          schema:
            type: string
        - name: excludeIds
          in: query
          required: false
          description: 검색 결과에서 제외할 사용자 ID 목록 (반복 쿼리)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: 사용자 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/{serviceCode}/target-sources:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
    get:
      tags:
        - Target Source
      summary: 서비스별 타겟소스 목록 조회
      operationId: getServiceTargetSources
      x-replaces-legacy:
        - GET /api/services/{serviceCode}/projects
      x-expected-duration: 100ms ~ 500ms
      description: |-
        특정 서비스에 소속된 타겟소스 목록을 조회합니다.
        기존 `projects` 개념을 v1 계약에서 `target-sources`로 정규화한 엔드포인트입니다.
      responses:
        '200':
          description: 타겟소스 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSourceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
    post:
      tags:
        - Target Source
      summary: 서비스에 타겟소스 생성
      operationId: createServiceTargetSource
      x-replaces-legacy:
        - POST /api/projects
      x-expected-duration: 300ms ~ 1s
      description: |-
        특정 서비스에 새 타겟소스를 생성합니다.
        기존 `POST /projects`를 서비스 스코프 하위 생성으로 재정의합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTargetSourceRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSourceDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /services/{serviceCode}/target-sources/registration-preview:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
    post:
      tags:
        - Target Source
      summary: 인프라 등록 미리보기
      operationId: previewServiceTargetSourceRegistration
      x-expected-duration: 100ms ~ 400ms
      description: |-
        SIT v7 인프라 등록 모달의 Phase 1 → Phase 2 전이에 사용한다. 본 엔드포인트는
        "타겟소스 생성 추천(creation recommendation)" 로직이며, 사용자가 입력한
        `(provider + 식별자 + dbTypes[])` 을 **N 개의 미래 타겟소스 후보** 로 전개해 반환한다.
        Phase 3 에서는 `type=ADD` 행마다 `POST /services/{serviceCode}/target-sources` 를
        1회씩(N회) 호출하여 실제로 타겟소스를 생성한다.

        **인덱스 매칭**: 응답의 `items[i]` 는 요청의 `dbTypes[i]` 와 1:1 대응하며,
        `items.length === dbTypes.length` 가 보장된다. 응답에는 `db_type` 을 echo 하지
        않으므로 클라이언트는 요청 시점의 `dbTypes` 배열 순서를 보존한 상태에서
        인덱스로 참조해야 한다. 정렬·필터·재시도 등으로 순서가 흐트러지면 매핑이 깨진다.

        **Duplicate 판정 키** (동일 서비스 스코프 내):
        - AWS: `(cloud_provider, aws_account_id, is_china_region, db_type)` 가 모두 동일하면 DUPLICATE.
          `aws_linked_account_id` 와 `is_terraform_execution_granted` 는 identity 에 포함되지 않는다.
        - Azure: `(cloud_provider, subscription_id, db_type)` 동일.
          `tenant_id` 는 식별자가 아니라 부가 정보로만 본다.
        - GCP: `(cloud_provider, gcp_project_id, db_type)` 동일.
        - IDC: `(cloud_provider, description_trimmed, db_type)` 동일.
          IDC 의 `description` 은 trim 후 빈 문자열이면 400.
        - SDU: 본 엔드포인트의 직접 입력은 지원하지 않는다 (BFF 가 다른 입력으로부터
          `is_sdu_type=true` 를 판정할 수 있다).

        **정규화 규칙**:
        - `dbType` 은 대소문자 구분 없이 비교한다. 정식 enum 은 도메인 결정 후 별도 ADR 에서 확정.
        - 식별자 (account/subscription/project id) 는 trim 후 그대로 사용 (대소문자·하이픈 보존).

        **Conditional required** (BFF 가 400 으로 검증):
        - cloudProvider=AWS → awsAccountId, isChinaRegion 필수
        - cloudProvider=Azure → tenantId, subscriptionId 필수
        - cloudProvider=GCP → gcpProjectId 필수
        - cloudProvider=IDC → description 필수 (trim 후 비어있으면 400)

        본 엔드포인트는 부수효과가 없는 dry-run 이며, 실제 생성은 후속
        `POST /services/{serviceCode}/target-sources` 호출에서 이뤄진다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationPreviewRequest'
      responses:
        '200':
          description: 미리보기 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
  /target-sources/{targetSourceId}:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Target Source
      summary: 타겟소스 상세 조회
      operationId: getTargetSource
      x-replaces-legacy:
        - GET /api/projects/{projectId}
      x-expected-duration: 80ms ~ 300ms
      description: |-
        타겟소스 상세 정보를 조회합니다.
        기존 `GET /projects/{projectId}`를 `targetSourceId` 기준 조회로 재정의합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSourceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /services/{serviceCode}/authorized-users:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
    get:
      tags:
        - Service Access
      summary: 서비스 접근 사용자 목록 조회
      operationId: getServiceAuthorizedUsers
      x-replaces-legacy:
        - GET /api/services/{serviceCode}/permissions
      x-expected-duration: 80ms ~ 300ms
      description: |-
        해당 서비스 접근 권한을 가진 사용자 목록을 조회합니다.
        기존 `permissions` 엔드포인트를 리소스 의미가 드러나는 이름으로 재정의합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizedUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
    post:
      tags:
        - Service Access
      summary: 서비스 접근 사용자 추가
      operationId: addServiceAuthorizedUser
      x-replaces-legacy:
        - POST /api/services/{serviceCode}/permissions
      x-expected-duration: 100ms ~ 500ms
      description: 서비스 접근 권한 사용자 목록에 사용자를 추가합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAuthorizedUserRequest'
      responses:
        '200':
          description: 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddAuthorizedUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /services/{serviceCode}/authorized-users/{userId}:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
      - $ref: '#/components/parameters/UserId'
    delete:
      tags:
        - Service Access
      summary: 서비스 접근 사용자 제거
      operationId: removeServiceAuthorizedUser
      x-replaces-legacy:
        - DELETE /api/services/{serviceCode}/permissions/{userId}
      x-expected-duration: 100ms ~ 400ms
      description: 서비스 접근 권한 사용자 목록에서 사용자를 제거합니다.
      responses:
        '200':
          description: 제거 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ServiceCode:
      name: serviceCode
      in: path
      required: true
      schema:
        type: string
      description: 서비스 식별 코드
    TargetSourceId:
      name: targetSourceId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 타겟소스 고유 식별자
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: 사용자 고유 식별자
  schemas:
    UserMeResponse:
      type: object
      description: '사용자 본인 정보 (Forward Compatibility: 향후 필드가 추가될 수 있음)'
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: user_01H8X...
          description: 사용자 고유 식별자
        name:
          type: string
          example: 홍길동
          description: 사용자 성명
        email:
          type: string
          format: email
          example: gildong.hong@example.com
          description: 사용자 이메일 주소
    UserServicesResponse:
      type: object
      description: 접근 가능 서비스 목록 응답
      required:
        - services
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceItem'
    UserSearchResponse:
      type: object
      description: 사용자 검색 응답
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserSearchUser'
    UserSearchUser:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: user_01H8X...
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: gildong.hong@example.com
    ServiceItem:
      type: object
      required:
        - serviceCode
        - serviceName
      properties:
        serviceCode:
          type: string
          example: abc
          description: 서비스 구분 코드
        serviceName:
          type: string
          example: 데모 서비스
          description: 서비스의 표시 명칭
    ServicePageResponse:
      type: object
      description: 서비스 목록 페이지네이션 응답 (Spring Page 형태)
      required:
        - content
        - page
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ServiceItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    CloudProvider:
      type: string
      enum:
        - AWS
        - Azure
        - GCP
        - IDC
        - SDU
    TargetSourceProcessStatus:
      type: string
      enum:
        - REQUEST_REQUIRED
        - WAITING_APPROVAL
        - APPLYING_APPROVED
        - TARGET_CONFIRMED
    TargetSourceSummary:
      type: object
      required:
        - target_source_id
        - project_code
        - cloud_provider
        - process_status
        - created_at
      properties:
        target_source_id:
          type: integer
          format: int64
          example: 1001
        project_code:
          type: string
          example: N-IRP-001
        description:
          type: string
          example: 과제 설명
        cloud_provider:
          $ref: '#/components/schemas/CloudProvider'
        process_status:
          $ref: '#/components/schemas/TargetSourceProcessStatus'
        is_integrated:
          type: boolean
          description: 레거시 UI 호환을 위한 완료 여부
          example: false
        created_at:
          type: string
          format: date-time
          example: '2026-02-16T10:00:00Z'
    TargetSourceDetail:
      allOf:
        - $ref: '#/components/schemas/TargetSourceSummary'
        - type: object
          required:
            - service_code
            - updated_at
          properties:
            service_code:
              type: string
              example: SERVICE-A
            description:
              type: string
              example: PII Agent 설치 대상
            updated_at:
              type: string
              format: date-time
              example: '2026-02-16T10:10:00Z'
            metadata:
              type: object
              additionalProperties: true
              description: Provider별 확장 필드 (Forward Compatibility)
    TargetSourceListResponse:
      type: object
      required:
        - target_sources
      properties:
        target_sources:
          type: array
          items:
            $ref: '#/components/schemas/TargetSourceSummary'
    TargetSourceDetailEnvelope:
      type: object
      required:
        - target_source
      properties:
        target_source:
          $ref: '#/components/schemas/TargetSourceDetail'
    CreateTargetSourceRequest:
      type: object
      description: |-
        타겟소스 1건 생성 요청. SIT v7 인프라 등록 모달은 Phase 2 의 preview 결과 중
        `type=ADD` 행마다 본 엔드포인트를 1회 호출한다 (N개 ADD → N회).

        Field naming policy (SIT v7 기준):
        - 카테고리/모드는 boolean (`isChinaRegion`, `isTerraformExecutionGranted`).
        - `dbType` 는 **싱귤러** 만 받는다. 복수형 `dbTypes` 는 preview API 전용.

        Conditional required (BFF 측 400 검증):
        - cloudProvider=AWS → awsAccountId 필수
        - cloudProvider=Azure → tenantId, subscriptionId 필수
        - cloudProvider=GCP → gcpProjectId 필수
        - cloudProvider=IDC → description 을 식별자로 사용 (필수)
      required:
        - projectCode
        - cloudProvider
      properties:
        projectCode:
          type: string
          example: N-IRP-001
        description:
          type: string
          example: 과제 설명
        cloudProvider:
          $ref: '#/components/schemas/CloudProvider'
        awsAccountId:
          type: string
          description: AWS Payer Account ID (12자리). cloudProvider=AWS 시 필수.
          example: '123456789012'
        awsLinkedAccountId:
          type: string
          description: AWS Linked Account ID (12자리). 미입력 시 Payer = Linked 로 간주.
          example: '987654321098'
        isChinaRegion:
          type: boolean
          default: false
          description: |-
            AWS China 파티션 여부. cloudProvider=AWS 시 사용.
            non-AWS 입력에서는 무시한다.
        isTerraformExecutionGranted:
          type: boolean
          default: false
          description: |-
            cloudProvider=AWS 한정. Terraform 실행 권한을 BDC 에 부여하기로 결정되었는지를 표시.
            `true` 면 BDC 가 자동 배포(CloudFormation), `false` 면 사용자가 직접 가이드를 따라
            권한·Agent 를 설치한다.
        awsRegionType:
          deprecated: true
          type: string
          enum:
            - global
            - china
          description: |-
            **Deprecated.** SIT v7 부터 `isChinaRegion` boolean 으로 대체.
            기존 클라이언트 호환을 위해 한시적으로 유지한다.
        tenantId:
          type: string
          description: Azure 전용 tenant id (GUID). cloudProvider=Azure 시 필수.
        subscriptionId:
          type: string
          description: Azure 전용 subscription id (GUID). cloudProvider=Azure 시 필수.
        gcpProjectId:
          type: string
          description: GCP 전용 project id. cloudProvider=GCP 시 필수.
        dbType:
          type: string
          example: MYSQL
          description: |-
            본 타겟소스가 담당하는 DB Type 1개. 싱귤러로만 받는다.
            Preview API 의 `dbTypes[i]` 1건과 대응한다.
    RegistrationPreviewRequest:
      type: object
      description: |-
        인프라 등록 모달 Phase 1 입력값. `dbTypes` 배열은 1+개 항목이어야 하며,
        BFF는 입력 1건을 dbTypes 길이만큼의 preview 행으로 전개한다.

        Naming policy:
        - 카테고리/모드는 **boolean flag** 로 표현 (`isChinaRegion`,
          `isTerraformExecutionGranted`). 기존 enum (`awsRegionType`,
          `awsInstallationMode`) 패턴은 사용하지 않는다.
        - SDU 여부는 입력으로 받지 않고 BFF 가 결정하여 응답에 `is_sdu_type` 으로 표시한다.
      required:
        - cloudProvider
        - dbTypes
      properties:
        cloudProvider:
          $ref: '#/components/schemas/CloudProvider'
        awsAccountId:
          type: string
          description: AWS Payer Account ID (12자리). cloudProvider=AWS 시 필수.
          example: '123456789012'
        awsLinkedAccountId:
          type: string
          description: AWS Linked Account ID (12자리). 미입력 시 Payer = Linked로 간주.
          example: '987654321098'
        isChinaRegion:
          type: boolean
          default: false
          description: |-
            cloudProvider=AWS 시 사용. `true` 면 AWS China 파티션, `false`(기본) 면 Global.
            non-AWS 입력에서는 무시한다.
        isTerraformExecutionGranted:
          type: boolean
          default: false
          description: |-
            cloudProvider=AWS 시 사용. Terraform 실행 권한을 BDC 에 부여하기로 결정되었는지를 표시한다.
            `true` 면 BDC 가 자동 배포(CloudFormation), `false` 면 사용자가 직접 가이드를 따라 권한·Agent 를 설치한다.
        tenantId:
          type: string
          description: cloudProvider=Azure 시 필수.
        subscriptionId:
          type: string
          description: cloudProvider=Azure 시 필수.
        gcpProjectId:
          type: string
          description: cloudProvider=GCP 시 필수.
        description:
          type: string
          description: 인프라 설명 (선택). IDC는 본 필드를 식별자로 사용.
        dbTypes:
          type: array
          minItems: 1
          items:
            type: string
            example: MYSQL
          description: 등록 대상 DB Type 목록. 응답 행 개수와 동일.
    RegistrationPreviewItemType:
      type: string
      enum:
        - ADD
        - DUPLICATE
      description: |-
        - `ADD`: 동일 서비스 내에 같은 duplicate key 의 타겟소스가 없어 신규 생성 대상이다.
        - `DUPLICATE`: 이미 같은 키를 가진 타겟소스가 존재한다.
          `existing_target_source_id` 가 반드시 함께 반환된다.
    RegistrationPreviewItemCommon:
      type: object
      description: |-
        Preview 행의 공통 필드. ADD/DUPLICATE 변형이 공유한다.
        응답은 snake_case (POST raw passthrough, BFF I-3 invariant).

        **인덱스 매칭**: `items[i]` 는 요청 `dbTypes[i]` 와 1:1 대응한다.
        본 응답에는 `db_type` 을 echo 하지 않으며, 클라이언트는 요청 배열을 인덱스로 참조한다.

        UI 렌더링 규칙 요약:
        - `is_china_region=true` → AWS China 칩, false → Global 칩 (AWS 한정)
        - `is_sdu_type=true` → provider 로고 자리에 SDU 아이콘 표시 (이 응답 한정 단일 권위)
        - `is_terraform_execution_granted=true` → 자동 설치 배지, false → 수동 설치 배지 (AWS 한정)
      required:
        - cloud_provider
        - is_china_region
        - is_sdu_type
        - is_terraform_execution_granted
      properties:
        cloud_provider:
          $ref: '#/components/schemas/CloudProvider'
        aws_account_id:
          type: string
        aws_linked_account_id:
          type: string
        is_china_region:
          type: boolean
          description: AWS China 파티션 여부. AWS 외 provider 에서는 항상 false.
        is_sdu_type:
          type: boolean
          description: |-
            BFF 가 SDU 모듈로 처리할 대상이라고 판단했는지 여부. UI 는 본 플래그가 true 일 때
            provider 로고 자리에 SDU 아이콘을 표시한다. 본 응답 스코프 한정 — 다른 BFF 응답의
            `monitoring_module` 등과 별개 표현이다.
        is_terraform_execution_granted:
          type: boolean
          description: |-
            AWS 한정 — Terraform 실행 권한을 BDC 에 부여하기로 결정되었는지 여부.
            AWS 외 provider 에서는 항상 false.
        tenant_id:
          type: string
        subscription_id:
          type: string
        gcp_project_id:
          type: string
        description:
          type: string
    RegistrationPreviewItemAdd:
      allOf:
        - $ref: '#/components/schemas/RegistrationPreviewItemCommon'
        - type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - ADD
              description: 신규 생성 대상.
    RegistrationPreviewItemDuplicate:
      allOf:
        - $ref: '#/components/schemas/RegistrationPreviewItemCommon'
        - type: object
          required:
            - type
            - existing_target_source_id
          properties:
            type:
              type: string
              enum:
                - DUPLICATE
              description: 이미 동일 키의 타겟소스가 존재. `existing_target_source_id` 필수.
            existing_target_source_id:
              type: integer
              format: int64
              description: 중복으로 판단된 기존 타겟소스 ID.
    RegistrationPreviewItem:
      oneOf:
        - $ref: '#/components/schemas/RegistrationPreviewItemAdd'
        - $ref: '#/components/schemas/RegistrationPreviewItemDuplicate'
      discriminator:
        propertyName: type
        mapping:
          ADD: '#/components/schemas/RegistrationPreviewItemAdd'
          DUPLICATE: '#/components/schemas/RegistrationPreviewItemDuplicate'
    RegistrationPreviewResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationPreviewItem'
    PermissionUser:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: user_01H8X...
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: gildong.hong@example.com
    AuthorizedUsersResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/PermissionUser'
    AddAuthorizedUserRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          example: user_01H8X...
    AddAuthorizedUserResponse:
      type: object
      required:
        - success
        - user
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: '#/components/schemas/PermissionUser'
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 에러 식별 코드
              example: UNAUTHORIZED
            message:
              type: string
              description: 에러 상세 메시지 (사용자 노출용)
              example: 인증 정보가 유효하지 않거나 권한이 없습니다.
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - retriable
        - requestId
      properties:
        type:
          type: string
          format: uri
          example: https://pii-agent.dev/problems/UNAUTHORIZED
        title:
          type: string
          example: Unauthorized
        status:
          type: integer
          example: 401
        detail:
          type: string
          example: 로그인이 필요합니다.
        code:
          type: string
          example: UNAUTHORIZED
        retriable:
          type: boolean
          example: false
        retryAfterMs:
          type: integer
          format: int64
          nullable: true
          example: 1000
        requestId:
          type: string
          example: req_01HV6J2YZ3AW9Q5N8D7T6Y4M2P
    PageInfo:
      type: object
      required:
        - page
        - size
        - total_elements
        - total_pages
      properties:
        page:
          type: integer
          description: 현재 페이지 번호 (0-based)
          example: 0
        size:
          type: integer
          description: 페이지당 항목 수
          example: 10
        total_elements:
          type: integer
          format: int64
          description: 전체 항목 수
          example: 100
        total_pages:
          type: integer
          description: 전체 페이지 수
          example: 10
  responses:
    Unauthorized:
      description: 인증되지 않았거나 유효하지 않은 사용자
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: 요청 대상에 대한 권한이 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    BadRequest:
      description: 유효하지 않은 요청 파라미터/본문
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ServiceNotFound:
      description: serviceCode에 해당하는 서비스 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TargetSourceNotFound:
      description: targetSourceId에 해당하는 타겟소스 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: 중복 생성 또는 현재 상태에서 처리 불가
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
