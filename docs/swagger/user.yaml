openapi: 3.0.3
info:
  title: User and Service Access API
  description: >-
    사용자 정보 조회 및 서비스 접근/타겟소스 관리 API입니다.


    ### Error Handling

    - 모든 에러 응답은 RFC 9457 `ProblemDetails` 스키마를 따릅니다.

    - **401 Unauthorized**: SSO 인증 토큰이 유효하지 않거나, 인증은 되었으나 시스템 권한이 없는 경우(사용자 미등록 포함) 발생합니다.


    ### Legacy API Replacement Map

    > Last reviewed: 2026-04-24 — projid-removal W1-W4 (#320 / #328 / #324 / #325) merge 완료 후 검증.
    > 레거시 `projectId` 개념은 코드에서 전면 폐기되었으며, 본 map은 historical reference입니다.

    - `GET /api/services/{serviceCode}/projects` -> `GET /install/v1/target-sources/services/{serviceCode}`

    - `POST /api/projects` -> `POST /install/v1/target-sources/services/{serviceCode}/target-sources`

    - `GET /api/projects/{projectId}` -> `GET /install/v1/target-sources/{targetSourceId}`

    - `GET /api/services/{serviceCode}/permissions` -> `GET /install/v1/services/{serviceCode}/authorized-users`

    - `POST /api/services/{serviceCode}/permissions` -> `POST /install/v1/services/{serviceCode}/authorized-users`

    - `DELETE /api/services/{serviceCode}/permissions/{userId}` -> `DELETE
    /install/v1/services/{serviceCode}/authorized-users/{userId}`
  version: 1.1.0
servers:
  - url: /install/v1
    description: Issue #222 upstream BFF base
tags:
  - name: User
    description: 사용자 식별 및 사용자 검색
  - name: Service Access
    description: 서비스 접근 가능한 사용자 관리
  - name: Target Source
    description: 서비스 소속 타겟소스 조회/생성/상세
x-legacy-api-replacements:
  - legacy: GET /api/services/{serviceCode}/projects
    replacement: GET /install/v1/target-sources/services/{serviceCode}
    status: migrated
  - legacy: POST /api/projects
    replacement: POST /install/v1/target-sources/services/{serviceCode}/target-sources
    status: migrated
  - legacy: GET /api/projects/{projectId}
    replacement: GET /install/v1/target-sources/{targetSourceId}
    status: migrated
  - legacy: GET /api/services/{serviceCode}/permissions
    replacement: GET /install/v1/services/{serviceCode}/authorized-users
    status: migrated
  - legacy: POST /api/services/{serviceCode}/permissions
    replacement: POST /install/v1/services/{serviceCode}/authorized-users
    status: migrated
  - legacy: DELETE /api/services/{serviceCode}/permissions/{userId}
    replacement: DELETE /install/v1/services/{serviceCode}/authorized-users/{userId}
    status: migrated
paths:
  /user/me:
    get:
      tags:
        - User
      summary: 현재 사용자 정보 조회
      operationId: getUserMe
      x-expected-duration: 50ms ~ 200ms
      description: |-
        현재 로그인한 사용자의 flat 프로필 정보를 반환합니다.
        인증된 세션 혹은 토큰을 기반으로 사용자 정보를 식별합니다.
      responses:
        '200':
          description: 사용자 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /user/services:
    get:
      tags:
        - User
      summary: 접근 가능 서비스 목록 조회
      operationId: getUserServices
      x-expected-duration: 50ms ~ 200ms
      description: 현재 사용자가 접근 가능한 서비스를 camelCase 항목 배열로 반환합니다.
      responses:
        '200':
          description: 서비스 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserServicesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /user/services/page:
    get:
      tags:
        - User
      summary: 접근 가능 서비스 목록 페이지네이션 조회
      operationId: getUserServicesPage
      x-expected-duration: 100ms ~ 300ms
      description: |-
        현재 사용자가 접근 가능한 서비스를 페이지네이션 + 검색으로 조회합니다.
        query 파라미터로 serviceCode 또는 serviceName에 대한 포함 검색을 수행합니다.
      parameters:
        - name: page
          in: query
          required: false
          description: 페이지 번호 (0-based, 기본값 0)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: 페이지당 항목 수 (기본값 10)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: query
          in: query
          required: false
          description: 검색어 (serviceCode 또는 serviceName에 포함 검색)
          schema:
            type: string
      responses:
        '200':
          description: 서비스 목록 페이지 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users/search:
    get:
      tags:
        - User
      summary: 사용자 검색
      operationId: searchUsers
      description: 이름 또는 이메일 기준으로 사용자를 검색합니다.
      x-expected-duration: 100ms ~ 300ms
      parameters:
        - name: q
          in: query
          required: false
          description: 검색어 (이름/이메일)
          schema:
            type: string
        - name: excludeIds
          in: query
          required: false
          description: 검색 결과에서 제외할 사용자 ID 목록 (반복 쿼리)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: 사용자 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/{serviceCode}/target-sources:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
    get:
      tags:
        - Target Source
      summary: 서비스별 타겟소스 목록 조회
      operationId: getServiceTargetSources
      x-replaces-legacy:
        - GET /api/services/{serviceCode}/projects
      x-expected-duration: 100ms ~ 500ms
      description: |-
        특정 서비스에 소속된 타겟소스 목록을 조회합니다.
        기존 `projects` 개념을 v1 계약에서 `target-sources`로 정규화한 엔드포인트입니다.
      responses:
        '200':
          description: 타겟소스 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSourceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
    post:
      tags:
        - Target Source
      summary: 서비스에 타겟소스 생성
      operationId: createServiceTargetSource
      x-replaces-legacy:
        - POST /api/projects
      x-expected-duration: 300ms ~ 1s
      description: |-
        특정 서비스에 새 타겟소스를 생성합니다.
        기존 `POST /projects`를 서비스 스코프 하위 생성으로 재정의합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTargetSourceRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSourceDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /target-sources/{targetSourceId}:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Target Source
      summary: 타겟소스 상세 조회
      operationId: getTargetSource
      x-replaces-legacy:
        - GET /api/projects/{projectId}
      x-expected-duration: 80ms ~ 300ms
      description: |-
        타겟소스 상세 정보를 조회합니다.
        기존 `GET /projects/{projectId}`를 `targetSourceId` 기준 조회로 재정의합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSourceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /services/{serviceCode}/authorized-users:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
    get:
      tags:
        - Service Access
      summary: 서비스 접근 사용자 목록 조회
      operationId: getServiceAuthorizedUsers
      x-replaces-legacy:
        - GET /api/services/{serviceCode}/permissions
      x-expected-duration: 80ms ~ 300ms
      description: |-
        해당 서비스 접근 권한을 가진 사용자 목록을 조회합니다.
        기존 `permissions` 엔드포인트를 리소스 의미가 드러나는 이름으로 재정의합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizedUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
    post:
      tags:
        - Service Access
      summary: 서비스 접근 사용자 추가
      operationId: addServiceAuthorizedUser
      x-replaces-legacy:
        - POST /api/services/{serviceCode}/permissions
      x-expected-duration: 100ms ~ 500ms
      description: 서비스 접근 권한 사용자 목록에 사용자를 추가합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAuthorizedUserRequest'
      responses:
        '200':
          description: 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddAuthorizedUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ServiceNotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /services/{serviceCode}/authorized-users/{userId}:
    parameters:
      - $ref: '#/components/parameters/ServiceCode'
      - $ref: '#/components/parameters/UserId'
    delete:
      tags:
        - Service Access
      summary: 서비스 접근 사용자 제거
      operationId: removeServiceAuthorizedUser
      x-replaces-legacy:
        - DELETE /api/services/{serviceCode}/permissions/{userId}
      x-expected-duration: 100ms ~ 400ms
      description: 서비스 접근 권한 사용자 목록에서 사용자를 제거합니다.
      responses:
        '200':
          description: 제거 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ServiceCode:
      name: serviceCode
      in: path
      required: true
      schema:
        type: string
      description: 서비스 식별 코드
    TargetSourceId:
      name: targetSourceId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 타겟소스 고유 식별자
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: 사용자 고유 식별자
  schemas:
    UserMeResponse:
      type: object
      description: '사용자 본인 정보 (Forward Compatibility: 향후 필드가 추가될 수 있음)'
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: user_01H8X...
          description: 사용자 고유 식별자
        name:
          type: string
          example: 홍길동
          description: 사용자 성명
        email:
          type: string
          format: email
          example: gildong.hong@example.com
          description: 사용자 이메일 주소
    UserServicesResponse:
      type: object
      description: 접근 가능 서비스 목록 응답
      required:
        - services
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceItem'
    UserSearchResponse:
      type: object
      description: 사용자 검색 응답
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserSearchUser'
    UserSearchUser:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: user_01H8X...
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: gildong.hong@example.com
    ServiceItem:
      type: object
      required:
        - serviceCode
        - serviceName
      properties:
        serviceCode:
          type: string
          example: abc
          description: 서비스 구분 코드
        serviceName:
          type: string
          example: 데모 서비스
          description: 서비스의 표시 명칭
    ServicePageResponse:
      type: object
      description: 서비스 목록 페이지네이션 응답 (Spring Page 형태)
      required:
        - content
        - page
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ServiceItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    CloudProvider:
      type: string
      enum:
        - AWS
        - Azure
        - GCP
        - IDC
        - SDU
    TargetSourceProcessStatus:
      type: string
      enum:
        - REQUEST_REQUIRED
        - WAITING_APPROVAL
        - APPLYING_APPROVED
        - TARGET_CONFIRMED
    TargetSourceSummary:
      type: object
      required:
        - target_source_id
        - project_code
        - cloud_provider
        - process_status
        - created_at
      properties:
        target_source_id:
          type: integer
          format: int64
          example: 1001
        project_code:
          type: string
          example: N-IRP-001
        description:
          type: string
          example: 과제 설명
        cloud_provider:
          $ref: '#/components/schemas/CloudProvider'
        process_status:
          $ref: '#/components/schemas/TargetSourceProcessStatus'
        is_integrated:
          type: boolean
          description: 레거시 UI 호환을 위한 완료 여부
          example: false
        created_at:
          type: string
          format: date-time
          example: '2026-02-16T10:00:00Z'
    TargetSourceDetail:
      allOf:
        - $ref: '#/components/schemas/TargetSourceSummary'
        - type: object
          required:
            - service_code
            - updated_at
          properties:
            service_code:
              type: string
              example: SERVICE-A
            description:
              type: string
              example: PII Agent 설치 대상
            updated_at:
              type: string
              format: date-time
              example: '2026-02-16T10:10:00Z'
            metadata:
              type: object
              additionalProperties: true
              description: Provider별 확장 필드 (Forward Compatibility)
    TargetSourceListResponse:
      type: object
      required:
        - target_sources
      properties:
        target_sources:
          type: array
          items:
            $ref: '#/components/schemas/TargetSourceSummary'
    TargetSourceDetailEnvelope:
      type: object
      required:
        - target_source
      properties:
        target_source:
          $ref: '#/components/schemas/TargetSourceDetail'
    CreateTargetSourceRequest:
      type: object
      required:
        - projectCode
        - cloudProvider
      properties:
        projectCode:
          type: string
          example: N-IRP-001
        description:
          type: string
          example: 과제 설명
        cloudProvider:
          $ref: '#/components/schemas/CloudProvider'
        awsAccountId:
          type: string
          description: AWS 전용 12자리 계정 ID
          example: '123456789012'
        awsRegionType:
          type: string
          enum:
            - global
            - china
        tenantId:
          type: string
          description: Azure 전용 tenant id (GUID)
        subscriptionId:
          type: string
          description: Azure 전용 subscription id (GUID)
        gcpProjectId:
          type: string
          description: GCP 전용 project id
    PermissionUser:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: user_01H8X...
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: gildong.hong@example.com
    AuthorizedUsersResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/PermissionUser'
    AddAuthorizedUserRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          example: user_01H8X...
    AddAuthorizedUserResponse:
      type: object
      required:
        - success
        - user
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: '#/components/schemas/PermissionUser'
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 에러 식별 코드
              example: UNAUTHORIZED
            message:
              type: string
              description: 에러 상세 메시지 (사용자 노출용)
              example: 인증 정보가 유효하지 않거나 권한이 없습니다.
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - retriable
        - requestId
      properties:
        type:
          type: string
          format: uri
          example: https://pii-agent.dev/problems/UNAUTHORIZED
        title:
          type: string
          example: Unauthorized
        status:
          type: integer
          example: 401
        detail:
          type: string
          example: 로그인이 필요합니다.
        code:
          type: string
          example: UNAUTHORIZED
        retriable:
          type: boolean
          example: false
        retryAfterMs:
          type: integer
          format: int64
          nullable: true
          example: 1000
        requestId:
          type: string
          example: req_01HV6J2YZ3AW9Q5N8D7T6Y4M2P
    PageInfo:
      type: object
      required:
        - page
        - size
        - total_elements
        - total_pages
      properties:
        page:
          type: integer
          description: 현재 페이지 번호 (0-based)
          example: 0
        size:
          type: integer
          description: 페이지당 항목 수
          example: 10
        total_elements:
          type: integer
          format: int64
          description: 전체 항목 수
          example: 100
        total_pages:
          type: integer
          description: 전체 페이지 수
          example: 10
  responses:
    Unauthorized:
      description: 인증되지 않았거나 유효하지 않은 사용자
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: 요청 대상에 대한 권한이 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    BadRequest:
      description: 유효하지 않은 요청 파라미터/본문
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ServiceNotFound:
      description: serviceCode에 해당하는 서비스 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TargetSourceNotFound:
      description: targetSourceId에 해당하는 타겟소스 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
