        - region
      properties:
        provider:
          type: string
          enum:
            - AWS
        resourceType:
          type: string
          enum:
            - DYNAMODB
            - RDS
            - RDS_CLUSTER
            - ATHENA
            - REDSHIFT
            - EC2
        region:
          type: string
        arn:
          type: string
        host:
          type: string
        port:
          type: integer
        databaseName:
          type: string
        vpcId:
          type: string
        instanceId:
          type: string
        hostName:
          type: string
        privateIp:
          type: string
        catalog:
          type: string
    AzureMetadata:
      type: object
      required:
        - provider
        - resourceType
        - region
      properties:
        provider:
          type: string
          enum:
            - Azure
        resourceType:
          type: string
          enum:
            - AZURE_MSSQL
            - AZURE_POSTGRESQL
            - AZURE_MYSQL
            - AZURE_MARIADB
            - AZURE_COSMOS_NOSQL
            - AZURE_SYNAPSE
            - AZURE_VM
        region:
          type: string
        subscriptionId:
          type: string
        resourceGroup:
          type: string
        serverName:
          type: string
        host:
          type: string
        port:
          type: integer
        accountName:
          type: string
        endpoint:
          type: string
        workspaceName:
          type: string
        vmName:
          type: string
        hostName:
          type: string
        privateIp:
          type: string
    GcpMetadata:
      type: object
      required:
