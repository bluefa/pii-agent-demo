          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
          description: VM 또는 수동 입력 대상의 연결 포트
        oracle_service_id:
          type: string
          nullable: true
          description: Oracle DB 연결에 필요한 Service ID
        network_interface_id:
          type: string
          nullable: true
          description: Azure VM 리소스에 선택된 네트워크 인터페이스 ID
        ip_configuration_name:
          type: string
          nullable: true
          description: Azure VM 리소스에 선택된 IP Configuration 이름
        metadata:
          $ref: '#/components/schemas/ResourceMetadata'
    IntegrationCategory:
      type: string
      enum:
        - TARGET
        - NO_INSTALL_NEEDED
        - INSTALL_INELIGIBLE
      description: 'TARGET: 제외 시 사유 필수, NO_INSTALL_NEEDED: 사유 선택, INSTALL_INELIGIBLE: 연동 불가'
    ResourceMetadata:
      oneOf:
        - $ref: '#/components/schemas/AwsMetadata'
        - $ref: '#/components/schemas/AzureMetadata'
        - $ref: '#/components/schemas/GcpMetadata'
        - $ref: '#/components/schemas/OtherMetadata'
      discriminator:
        propertyName: provider
    AwsMetadata:
      type: object
      required:
        - provider
