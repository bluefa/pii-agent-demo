        - db_type
        - port
        - host
        - oracleServiceId
      properties:
        resource_id:
          type: string
        db_type:
          type: string
          enum:
            - ORACLE
        port:
          type: integer
          minimum: 1
          maximum: 65535
        host:
          type: string
        oracleServiceId:
          type: string
          description: Oracle DB 연결에 필요한 Service ID
        selectedNicId:
          type: string
    NonOracleEndpointConfig:
      type: object
      required:
        - resource_id
        - db_type
        - port
        - host
      properties:
        resource_id:
          type: string
        db_type:
          type: string
          enum:
            - MYSQL
            - POSTGRESQL
            - MSSQL
            - MONGODB
        port:
          type: integer
          minimum: 1
          maximum: 65535
        host:
          type: string
        selectedNicId:
          type: string
    PageInfo:
      type: object
      required:
        - total_elements
        - total_pages
        - number
        - size
      properties:
        total_elements:
          type: integer
          example: 15
        total_pages:
          type: integer
          example: 2
        number:
          type: integer
          description: 현재 페이지 번호 (0-based)
        size:
          type: integer
          description: 요청한 페이지 당 항목 수
    ProcessStatusResponse:
      type: object
      required:
        - target_source_id
        - process_status
        - status_inputs
        - evaluated_at
      properties:
        target_source_id:
          type: integer
          format: int64
        process_status:
          $ref: '#/components/schemas/TargetSourceProcessStatus'
        status_inputs:
          type: object
          required:
            - has_confirmed_integration
            - has_pending_approval_request
            - has_approved_integration
            - last_approval_result
          properties:
            has_confirmed_integration:
              type: boolean
            has_pending_approval_request:
              type: boolean
            has_approved_integration:
              type: boolean
            last_approval_result:
              $ref: '#/components/schemas/LastApprovalResult'
            last_rejection_reason:
              type: string
              nullable: true
              description: 최근 REJECTED 또는 SYSTEM_ERROR 사유
        evaluated_at:
          type: string
          format: date-time
    TargetSourceProcessStatus:
      type: string
      description: |
        BFF가 승인 객체 존재 여부만으로 계산하는 프로세스 상태 (ADR-009).
        설치 진행 상황은 Provider별 installation-status API에서 별도 조회합니다.
        - REQUEST_REQUIRED: 요청 필요 (확정 정보 없음, 최초 진입 상태)
        - WAITING_APPROVAL: 승인 대기 (PENDING 상태의 ApprovalRequest 존재)
        - APPLYING_APPROVED: 승인 반영 중 (ApprovedIntegration 존재)
        - TARGET_CONFIRMED: 연동 확정 완료 (ConfirmedIntegration 존재, 활성 요청/반영 없음)
      enum:
        - REQUEST_REQUIRED
        - WAITING_APPROVAL
        - APPLYING_APPROVED
        - TARGET_CONFIRMED
    LastApprovalResult:
      type: string
      enum:
        - NONE
        - APPROVED
        - REJECTED
        - CANCELLED
        - SYSTEM_ERROR
        - COMPLETED
    InstallationConfirmResponse:
      type: object
      required:
        - success
        - confirmed_at
      properties:
        success:
          type: boolean
        confirmed_at:
          type: string
          format: date-time
    UpdateResourceCredentialRequest:
      type: object
      required:
        - resourceId
      properties:
        resourceId:
          type: string
          description: 대상 리소스 식별자
        credentialId:
          type: string
          nullable: true
          description: 연결할 Credential ID. null이면 연결 해제
    UpdateResourceCredentialResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    ProblemDetailsResponse:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - retriable
        - requestId
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        retriable:
          type: boolean
        retryAfterMs:
          type: integer
        requestId:
          type: string
  responses:
    Unauthorized:
      description: 인증 실패 (SSO 토큰 만료 또는 미인증)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: 인증이 필요합니다.
    PermissionDenied:
      description: 인가 실패 (API 호출 권한 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              message: 해당 리소스에 접근할 권한이 없습니다.
    TargetSourceNotFound:
      description: 대상 소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: TARGET_SOURCE_NOT_FOUND
              message: 해당 ID의 Target Source가 존재하지 않습니다.
    ApprovedIntegrationNotFound:
      description: 승인된 연동 스냅샷이 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailsResponse'
          example:
            type: https://pii-agent.dev/problems/APPROVED_INTEGRATION_NOT_FOUND
            title: Not Found
            status: 404
            detail: 승인된 연동 정보가 없습니다.
            code: APPROVED_INTEGRATION_NOT_FOUND
            retriable: false
            requestId: 123e4567-e89b-12d3-a456-426614174000
    ConfirmedIntegrationNotFound:
      description: 확정된 연동 스냅샷이 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailsResponse'
          example:
            type: https://pii-agent.dev/problems/CONFIRMED_INTEGRATION_NOT_FOUND
            title: Not Found
            status: 404
            detail: 확정된 연동 정보가 없습니다.
            code: CONFIRMED_INTEGRATION_NOT_FOUND
            retriable: false
            requestId: 123e4567-e89b-12d3-a456-426614174000
    BadRequest:
      description: 잘못된 요청 파라미터
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_FAILED
              message: 요청 파라미터가 올바르지 않습니다.
