openapi: 3.0.3
info:
  title: Target Source Management API
  version: 3.0.0
  description: >
    ADR-006 기반의 연동 대상 소스(Target Source) 통합 관리 API입니다.


    **아키텍처 설계 요약:**

    1. **객체 분리**: Confirmed(현재 확정), Approved(승인 후 반영 중), Request(승인 요청) 정보를 물리적으로 분리하여 관리합니다.

    2. **쓰기 권한 단일화**: 사용자는 `POST /approval-requests`를 통해서만 인프라 변경 의사를 표현할 수 있습니다.

    3. **이력 관리**: `COMPLETED`(확정 완료) 및 `SYSTEM_ERROR`(반영 실패) 상태를 통해 인프라 반영의 최종 생명주기를 추적합니다.

    4. **보안**: `integrationCategory`와 같은 시스템 가이드는 Response에만 포함하며, Request 검증은 백엔드에서 수행합니다.

    5. **용어 체계**: processStatus 상태명은 ADR-009 기준을 따릅니다. `APPLYING_APPROVED`는 "승인 반영 중" 전용입니다.


    ---


    **Legacy API 대체 매핑표 (v3.0.0):**


    | Legacy Path | v1 Path | 비고 |

    |---|---|---|

    | `POST /projects/{id}/confirm-pii-agent` | _(삭제)_ | route 삭제 |

    | `POST /projects/{id}/confirm-completion` | `POST /target-sources/{id}/pii-agent-installation/confirm` | 관리자 최종 확정
    |

    | `PATCH /projects/{id}/resources/credential` | `PUT /target-sources/{id}/resources/credential` | credential 갱신 |

    | `POST /projects/{id}/test-connection` | `POST /target-sources/{id}/test-connection` | 연결 테스트 |

    | `POST /projects/{id}/complete-installation` | _(삭제)_ | 신규 의존 금지 |
servers:
  - url: /install/v1
    description: Issue #222 upstream BFF base path
tags:
  - name: Resources
    description: 리소스 목록, 메타데이터 조회 및 Credential 관리
  - name: Approval Process
    description: 연동 요청 생성, 승인 정보 조회 및 히스토리 관리
  - name: Process Status
    description: 승인 객체 기반 프로세스 상태 조회 (설치 진행은 Provider별 installation-status 참조)
  - name: Installation
    description: PII Agent 설치 확정 및 연결 테스트
paths:
  /target-sources/{targetSourceId}/resources:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Resources
      summary: 연동 가능 리소스 목록 조회
      operationId: getResources
      x-expected-duration: 80ms ~ 300ms
      x-client-cancellable: true
      description: |-
        사용 가능한 모든 클라우드 리소스를 조회합니다.

        이 응답은 리소스의 고유 속성만 제공합니다.
        UI에서 제외 사유 필수 여부를 결정하기 위한 `integrationCategory`와
        이후 페이지 마이그레이션에 필요한 DB/네트워크 메타데이터를 포함합니다.

        현재 선택 여부나 credential 반영 상태는 포함하지 않으며, 해당 상태는 기존
        `approval-history`, `approved-integration`, `confirmed-integration` API로 복원합니다.

        클라이언트는 `AbortSignal`로 요청을 취소할 수 있다 (candidate section
        unmount 시 네트워크 비용 회수). 서버 계약 자체는 변하지 않는다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceCatalogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/ConfirmedIntegrationNotFound'
  /target-sources/{targetSourceId}/approval-requests:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    post:
      tags:
        - Approval Process
      summary: 연동 대상 요청 생성
      operationId: createApprovalRequest
      x-expected-duration: 500ms 이내
      description: |
        사용자가 선택한 리소스와 엔드포인트 설정(DB 등)을 바탕으로 승인을 요청합니다.
        이 요청이 승인되면 `ApprovedIntegration`이 생성되고, 인프라 반영이 성공하면 `ConfirmedIntegration`으로 전환됩니다.

        요청 입력은 GitHub Issue #222 원문과 동일하게 최상위 `resource_inputs[]` 배열을 사용합니다.
        - 선택 리소스의 세부 설정은 `resource_input` flat 필드(`database_type`, `host`, `port`, `credential_id`)로 전달합니다.
        - 제외 리소스는 `selected=false`와 `exclusion_reason`으로 표현합니다.

        **차단 정책 (ADR-006 D-002, D-008 / ADR-009 D-006):**
        - 이미 PENDING 상태의 승인 요청이 존재하면 409 `CONFLICT_REQUEST_PENDING` 반환
        - ApprovedIntegration이 존재(반영 중)하면 409 `CONFLICT_APPLYING_IN_PROGRESS` 반환
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequestInputDto'
      responses:
        '200':
          description: 요청 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequestSummaryDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/ApprovedIntegrationNotFound'
        '409':
          description: 승인 요청 충돌 (반영 중이거나 이미 요청 진행 중)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                applying_in_progress:
                  summary: 반영 중 신규 요청 차단
                  value:
                    error:
                      code: CONFLICT_APPLYING_IN_PROGRESS
                      message: 승인된 내용이 반영 중입니다. 완료 후 다시 요청해주세요.
                request_pending:
                  summary: 이미 승인 요청 진행 중
                  value:
                    error:
                      code: CONFLICT_REQUEST_PENDING
                      message: 이미 승인 요청이 진행 중입니다.
  /target-sources/{targetSourceId}/approval-requests/approve:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    post:
      tags:
        - Approval Process
      summary: 승인 요청 승인 (관리자)
      operationId: approveApprovalRequest
      description: |
        현재 PENDING 상태인 승인 요청을 승인합니다.
        관리자 권한이 필요하며, 승인 시 ApprovedIntegration이 생성되고 인프라 반영이 시작됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalApproveRequestDto'
      responses:
        '200':
          description: 승인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalActionResponseDto'
        '400':
          description: 승인 대기 상태가 아님
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_FAILED
                  message: 승인 대기 상태가 아닙니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/approval-requests/reject:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    post:
      tags:
        - Approval Process
      summary: 승인 요청 반려 (관리자)
      operationId: rejectApprovalRequest
      description: |
        현재 PENDING 상태인 승인 요청을 반려합니다.
        관리자 권한이 필요하며, 반려 사유(`reason`)는 필수입니다.
        반려 시 요청이 REJECTED로 전환되고 사용자는 재요청할 수 있습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRejectRequestDto'
      responses:
        '200':
          description: 반려 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalActionResponseDto'
        '400':
          description: 승인 대기 상태가 아니거나 반려 사유 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_state:
                  summary: 승인 대기 상태가 아님
                  value:
                    error:
                      code: VALIDATION_FAILED
                      message: 승인 대기 상태가 아닙니다.
                missing_reason:
                  summary: 반려 사유 누락
                  value:
                    error:
                      code: VALIDATION_FAILED
                      message: 반려 사유를 입력해주세요.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/approval-requests/cancel:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    post:
      tags:
        - Approval Process
      summary: 승인 요청 취소 (요청자)
      operationId: cancelApprovalRequest
      x-expected-duration: 500ms 이내
      description: |
        현재 PENDING 상태인 승인 요청을 취소합니다.
        취소 시 ApprovalResult(CANCELLED)가 생성되고, 프로젝트는 이전 상태(REQUEST_REQUIRED 또는 TARGET_CONFIRMED)로 복원됩니다.

        **차단 정책 (ADR-006 D-010):**
        - PENDING 상태의 승인 요청이 없으면 400 `VALIDATION_FAILED` 반환
        - ApprovedIntegration이 존재(반영 중)하면 409 `CONFLICT_APPLYING_IN_PROGRESS` 반환 — 승인 반영 중에는 취소 불가
      responses:
        '200':
          description: 취소 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalActionResponseDto'
        '400':
          description: 취소 가능한 승인 요청이 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_FAILED
                  message: 취소할 수 있는 승인 요청이 없습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
        '409':
          description: 승인 반영 중 — 취소 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFLICT_APPLYING_IN_PROGRESS
                  message: 승인된 내용이 반영 중입니다. 반영 완료 후까지 취소할 수 없습니다.
  /target-sources/{targetSourceId}/approval-requests/system-reset:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    post:
      tags:
        - Approval Process
      summary: 승인 요청 시스템 리셋 (반려/UNAVAILABLE → IDLE)
      operationId: systemResetApprovalRequest
      x-expected-duration: 200ms 이내
      description: |
        REJECTED 또는 UNAVAILABLE 상태인 approval-request 를 IDLE 로 명시적으로 reset 합니다.
        사용자가 "연동 대상 DB 다시 선택하기" 액션을 트리거할 때 호출되며,
        이 호출 후 processStatus 는 WAITING_TARGET_CONFIRMATION (1) 으로 회귀합니다.

        본 endpoint 도입 이유: 반려 시 BFF 가 자동으로 processStatus 를 회귀시키지 않고,
        사용자가 반려 사유를 확인한 뒤 명시적으로 reset 을 트리거하도록 한다.
      responses:
        '200':
          description: |
            시스템 리셋 성공.
            응답 status 는 `CANCELLED` 로 내려가며, 이후 processStatus 는
            `WAITING_TARGET_CONFIRMATION` (1) 로 회귀한다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalActionResponseDto'
        '400':
          description: 변경 불가 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: 리셋할 approval-request 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            REJECTED 또는 UNAVAILABLE 상태가 아님 — 에러 코드 `APPROVAL_REQUEST_NOT_RESETTABLE`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: APPROVAL_REQUEST_NOT_RESETTABLE
                  message: REJECTED 또는 UNAVAILABLE 상태에서만 system-reset 호출 가능합니다.
  /target-sources/{targetSourceId}/confirmed-integration:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 연동 확정 정보 조회 (현재 실제 상태)
      operationId: getConfirmedIntegration
      x-client-cancellable: true
      description: |
        현재 Terraform이 관리 중이며 실제 인프라에 반영 완료되어 구동 중인 정보입니다.

        클라이언트는 `AbortSignal`로 요청을 취소할 수 있다 (ConfirmedIntegrationSection
        unmount 시 네트워크 비용 회수). 서버 계약 자체는 변하지 않는다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmedIntegrationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/approved-integration:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 승인 완료 정보 조회 (반영 중 상태)
      operationId: getApprovedIntegration
      x-client-cancellable: true
      description: |
        관리자 승인이 완료되어 인프라에 반영 중인 과도기적 스냅샷 정보입니다.

        클라이언트는 `AbortSignal`로 요청을 취소할 수 있다 (ApprovedIntegrationSection
        unmount 시 네트워크 비용 회수). 서버 계약 자체는 변하지 않는다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedIntegrationResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/approval-requests/latest:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Approval Process
      summary: 최신 승인 요청 조회
      operationId: getApprovalRequestLatest
      x-expected-duration: 500ms 이내
      description: |
        가장 최근의 승인 요청과 처리 결과를 반환합니다.
        승인 요청 이력이 없으면 404를 반환합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequestLatestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/approval-history:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
        description: 페이지 번호 (0부터 시작)
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: 페이지 당 항목 수
    get:
      tags:
        - Approval Process
      summary: 승인/반려/확정 이력 전체 조회 (Pagination)
      operationId: getApprovalHistory
      description: |
        과거의 모든 요청과 처리 결과(성공, 실패, 반려 등)를 조회합니다.
        응답은 GitHub Issue #222 원문과 동일한 Spring Page 형태를 사용합니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalHistoryPageDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/process-status:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    get:
      tags:
        - Process Status
      summary: 대상 소스 processStatus 조회
      operationId: getTargetSourceProcessStatus
      x-expected-duration: 2s ~ 30s
      description: |
        GitHub Issue #222 원문 기준의 process status를 반환합니다.
        현재 client route는 UI 단계와 동일한 값(`IDLE` → `COMPLETED`)으로 정규화해 노출합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessStatusResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/pii-agent-installation/confirm:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    post:
      tags:
        - Installation
      summary: PII Agent 설치 확정 (관리자)
      operationId: confirmPiiAgentInstallation
      x-expected-duration: 500ms 이내
      description: |
        관리자가 PII Agent 설치를 최종 확정합니다.
        연결 테스트가 완료된(CONNECTION_VERIFIED) 상태에서만 호출 가능합니다.
        확정 시 processStatus가 INSTALLATION_COMPLETE로 전환됩니다.
      responses:
        '200':
          description: 설치 확정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationConfirmResponse'
        '400':
          description: 설치 확정 가능한 상태가 아님
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_FAILED
                  message: 설치 확정 가능한 상태가 아닙니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /target-sources/{targetSourceId}/resources/credential:
    parameters:
      - $ref: '#/components/parameters/TargetSourceId'
    put:
      tags:
        - Resources
      summary: 리소스 Credential 갱신
      operationId: updateResourceCredential
      x-expected-duration: 300ms 이내
      description: |
        특정 리소스에 연결할 Credential을 변경합니다.
        연결 테스트 단계(WAITING_CONNECTION_TEST, CONNECTION_VERIFIED, INSTALLATION_COMPLETE)에서만 변경 가능합니다.
        `credentialId`를 null로 전달하면 Credential 연결을 해제합니다.
        GitHub Issue #222 원문 Swagger와 동일하게 `PUT` 메서드를 사용합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResourceCredentialRequest'
      responses:
        '200':
          description: Credential 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResourceCredentialResponse'
        '400':
          description: 요청 파라미터 오류 또는 변경 불가 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_resource_id:
                  summary: resourceId 누락
                  value:
                    error:
                      code: VALIDATION_FAILED
                      message: resourceId가 필요합니다.
                invalid_state:
                  summary: 변경 불가 상태
                  value:
                    error:
                      code: VALIDATION_FAILED
                      message: Credential 변경 가능한 상태가 아닙니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
components:
  parameters:
    TargetSourceId:
      name: targetSourceId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ResourceCatalogResponse:
      type: object
      required:
        - resources
        - total_count
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        total_count:
          type: integer
    Resource:
      type: object
      required:
        - id
        - resource_id
        - name
        - resource_type
        - database_type
        - host
        - port
        - oracle_service_id
        - network_interface_id
        - ip_configuration_name
        - metadata
        - integration_category
