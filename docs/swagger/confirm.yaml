        id:
          type: string
        resource_id:
          type: string
        name:
          type: string
        resource_type:
          type: string
        database_type:
          type: string
          enum:
            - MYSQL
            - POSTGRESQL
            - MSSQL
            - DYNAMODB
            - ATHENA
            - REDSHIFT
            - COSMOSDB
            - BIGQUERY
            - MONGODB
            - ORACLE
