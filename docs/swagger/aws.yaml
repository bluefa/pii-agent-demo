openapi: 3.0.3
info:
  title: Cloud Resource Scan API (AWS Provider)
  description: |-
    AWS Provider 전용 리소스 스캔 및 인프라 설치 상태 관리를 위한 통합 API입니다.
    Terraform 스크립트 기반의 설치 단위(ServiceScript)와 IAM Role 실시간 검증 기능을 제공합니다.

    ### [주의 사항: Forward Compatibility]
    본 API의 모든 응답 모델은 향후 확장될 수 있습니다. 클라이언트(또는 AI Agent)는 정의되지 않은 필드가 응답에 포함되더라도 에러를 발생시키지 않고 무시해야 합니다.
  version: 1.15.0
servers:
  - url: /api/infra/v1
    description: API Gateway Base Path
paths:
  /aws/target-sources/{targetSourceId}/installation-status:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    get:
      tags:
        - AWS Installation
      summary: AWS 설치 상태 조회
      operationId: getAwsInstallationStatus
      x-expected-duration: 200ms ~ 5s
      description: |-
        **동기 작업(Synchronous)**
        배치 작업 또는 실시간 동기화로 갱신된 최신 설치 상태(Terraform 스크립트 단위)를 조회합니다.
        마지막 확인 시점으로부터 5분이 경과한 경우, 내부적으로 실시간 조회를 수행하여 캐시를 갱신합니다.
      responses:
        '200':
          description: 조회 성공 (스캔 실패 시에도 200 응답 내 FAILED 상태 반환)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwsInstallationStatus'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /aws/target-sources/{targetSourceId}/check-installation:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    post:
      tags:
        - AWS Installation
      summary: AWS 설치 상태 실시간 동기화
      operationId: refreshAwsInstallationStatus
      x-expected-duration: 30s ~ 5m
      description: |-
        **동기 작업(Synchronous)**
        현재 AWS 인프라 리소스를 직접 탐색하여 각 ServiceScript의 설치 상태를 강제로 갱신합니다.
      responses:
        '200':
          description: 동기화 시도 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwsInstallationStatus'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /aws/target-sources/{targetSourceId}/verify-execution-role:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    post:
      tags:
        - AWS Verification
      summary: 실행 권한(Execution Role) 검증
      operationId: verifyAwsExecutionRole
      x-expected-duration: 1s ~ 30s
      description: |-
        **동기 작업(Synchronous)**
        타겟 소스에 할당된 Execution Role의 유효성을 실시간으로 검증합니다.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roleArn:
                  type: string
                  description: 검증할 특정 Role ARN (미입력 시 기존 등록값 사용)
      responses:
        '200':
          description: |-
            검증 결과 (성공/실패 모두 200으로 응답).
            실패 시 `status: INVALID` + `failReason`으로 원인 구분.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwsRoleInfo'
              examples:
                valid:
                  summary: 검증 성공
                  value:
                    role_arn: arn:aws:iam::123456789012:role/PiiExecutionRole
                    status: VALID
                    last_verified_at: '2026-02-15T10:30:00Z'
                notConfigured:
                  summary: Role ARN 미설정
                  value:
                    role_arn: null
                    status: INVALID
                    fail_reason: ROLE_NOT_CONFIGURED
                    fail_message: Execution Role이 설정되지 않았습니다. Settings에서 Role ARN을 등록해주세요.
                insufficientPermissions:
                  summary: Role 권한 부족
                  value:
                    role_arn: arn:aws:iam::123456789012:role/PiiExecutionRole
                    status: INVALID
                    fail_reason: ROLE_INSUFFICIENT_PERMISSIONS
                    fail_message: 등록된 Role의 AWS IAM 권한이 부족합니다. 필요 권한을 확인해주세요.
                scanRoleUnavailable:
                  summary: 검증에 필요한 Scan Role 사용 불가
                  value:
                    role_arn: arn:aws:iam::123456789012:role/PiiExecutionRole
                    status: INVALID
                    fail_reason: SCAN_ROLE_UNAVAILABLE
                    fail_message: Execution Role 검증을 위해 Scan Role이 필요합니다. Scan Role을 먼저 설정하고 검증해주세요.
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /aws/target-sources/{targetSourceId}/verify-scan-role:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    post:
      tags:
        - AWS Verification
      summary: 스캔 권한(Scan Role) 검증
      operationId: verifyAwsScanRole
      x-expected-duration: 1s ~ 30s
      description: |-
        **동기 작업(Synchronous)**
        리소스 조회를 위한 Scan Role의 권한 유효성을 실시간으로 검증합니다.
      responses:
        '200':
          description: |-
            검증 결과 (성공/실패 모두 200으로 응답).
            실패 시 `status: INVALID` + `failReason`으로 원인 구분.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwsRoleInfo'
              examples:
                valid:
                  summary: 검증 성공
                  value:
                    role_arn: arn:aws:iam::123456789012:role/PiiScanRole
                    status: VALID
                    last_verified_at: '2026-02-15T10:30:00Z'
                notConfigured:
                  summary: Role ARN 미설정
                  value:
                    role_arn: null
                    status: INVALID
                    fail_reason: ROLE_NOT_CONFIGURED
                    fail_message: Scan Role이 설정되지 않았습니다. Settings에서 Role ARN을 등록해주세요.
                insufficientPermissions:
                  summary: Role 권한 부족
                  value:
                    role_arn: arn:aws:iam::123456789012:role/PiiScanRole
                    status: INVALID
                    fail_reason: ROLE_INSUFFICIENT_PERMISSIONS
                    fail_message: 등록된 Role의 AWS IAM 권한이 부족합니다. 필요 권한을 확인해주세요.
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /aws/target-sources/{targetSourceId}/installation-mode:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    post:
      tags:
        - AWS Installation
      summary: AWS 설치 모드 설정
      operationId: setAwsInstallationMode
      x-expected-duration: 500ms
      description: |-
        **동기 작업(Synchronous)**
        AWS PII Agent 설치 방식(AUTO/MANUAL)을 설정합니다.
        설치 모드는 프로젝트 생성 후 1회만 설정 가능하며, 이후 변경할 수 없습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum:
                    - AUTO
                    - MANUAL
                  description: '설치 모드 (AUTO: TF Role 등록 후 자동 실행, MANUAL: TF Script 직접 실행)'
      responses:
        '200':
          description: 설정 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  project:
                    type: object
                    description: 업데이트된 프로젝트 정보 (Forward Compatibility)
        '400':
          description: 유효하지 않은 설치 모드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
        '409':
          description: 설치 모드가 이미 설정됨 (변경 불가)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /aws/target-sources/{targetSourceId}/terraform-script:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    get:
      tags:
        - AWS Installation
      summary: AWS TF Script 다운로드 정보 조회
      operationId: getAwsTerraformScript
      x-expected-duration: 500ms
      description: |-
        **동기 작업(Synchronous)**
        수동 설치(MANUAL) 모드에서 Terraform 스크립트 다운로드 정보를 조회합니다.
        자동 설치(AUTO) 모드에서는 스크립트가 필요 없으므로 400 에러를 반환합니다.
      responses:
        '200':
          description: TF Script 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerraformScriptResponse'
        '400':
          description: AUTO 모드에서는 스크립트 불필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
  /aws/target-sources/{targetSourceId}/settings:
    parameters:
      - $ref: '#/components/parameters/targetSourceId'
    get:
      tags:
        - Settings
      summary: 대상 소스별 AWS 설정 조회
      operationId: getAwsTargetSourceSettings
      x-expected-duration: 150ms
      description: |-
        **동기 작업(Synchronous)**
        타겟 소스에 등록된 AWS IAM Role 정보 및 마지막 검증 상태를 조회합니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwsSettings'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/TargetSourceNotFound'
components:
  parameters:
    targetSourceId:
      name: targetSourceId
      in: path
      required: true
      description: 타겟 소스 고유 식별자
      schema:
        type: integer
  schemas:
    AwsInstallationStatus:
      type: object
      description: 'AWS 설치 상태 응답 (Forward Compatibility: 정의되지 않은 필드가 포함되더라도 무시해야 함)'
      required:
        - service_scripts
        - last_check
      properties:
        last_check:
          $ref: '#/components/schemas/LastCheckInfo'
        has_execution_permission:
          type: boolean
          description: 실행 권한 보유 여부
        execution_role_arn:
          type: string
          description: TF Execution Role ARN (자동 설치 모드에서만 존재)
        service_scripts:
          type: array
          description: Terraform 스크립트 단위 설치 상태 목록
          items:
            $ref: '#/components/schemas/ServiceScript'
        bdc_status:
          type: object
          description: BDC 관련 상태
          properties:
            status:
              $ref: '#/components/schemas/ScriptStatus'
        action_summary:
          $ref: '#/components/schemas/AwsInstallationActionSummary'
    LastCheckInfo:
      type: object
      description: 마지막 스캔 작업에 대한 메타 정보
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - IN_PROGRESS
            - FAILED
          description: 작업 상태
        checked_at:
          type: string
          format: date-time
          description: 마지막으로 스캔을 완료하거나 시도한 시각
        fail_reason:
          type: string
          description: FAILED 상태일 경우의 에러 원인
    ServiceScript:
      type: object
      description: Terraform 스크립트 단위 리소스 그룹
      required:
        - script_name
        - status
      properties:
        script_id:
          type: string
          description: 스크립트 고유 식별자 (UI 안정 키)
        script_name:
          type: string
          example: VPC Endpoint (vpc-0123abcd / ap-northeast-2)
        terraform_script_name:
          type: string
          description: terraform script 표시명 (script_name과 동일 의미)
        status:
          $ref: '#/components/schemas/ScriptStatus'
        resource_count:
          type: integer
          description: 스크립트에 매핑된 리소스 개수
        region:
          type: string
          description: AWS 리전
        resources:
          type: array
          description: 스크립트에 포함된 개별 리소스 리스트
          items:
            $ref: '#/components/schemas/ResourceItem'
    ResourceItem:
      type: object
      description: 개별 AWS 리소스 정보
      properties:
        resource_id:
          type: string
          description: AWS Resource ID
        type:
          type: string
          description: AWS Resource Type
        resource_type:
          type: string
          description: AWS Resource Type (snake_case alias)
        name:
          type: string
          description: Resource 명칭
        installation_display_status:
          $ref: '#/components/schemas/InstallationDisplayStatus'
    ScriptStatus:
      type: string
      enum:
        - PENDING
        - INSTALLING
        - COMPLETED
        - FAILED
      description: 설치 진행 상태
    InstallationDisplayStatus:
      type: string
      description: 사용자 노출용 단순 설치 상태
      enum:
        - NOT_INSTALLED
        - COMPLETED
    AwsInstallationActionSummary:
      type: object
      description: 화면 상단 요약 카드 데이터
      required:
        - service_action_required
        - bdc_installation_required
      properties:
        service_action_required:
          type: boolean
          description: 서비스 담당자 조치 필요 여부
        bdc_installation_required:
          type: boolean
          description: BDC 설치 필요 여부
    AwsSettings:
      type: object
      description: AWS 설정 정보
      required:
        - execution_role
        - scan_role
      properties:
        execution_role:
          $ref: '#/components/schemas/AwsRoleInfo'
        scan_role:
          $ref: '#/components/schemas/AwsRoleInfo'
    AwsRoleInfo:
      type: object
      description: IAM Role 정보 및 검증 상태
      required:
        - status
      properties:
        role_arn:
          type: string
          nullable: true
          description: AWS IAM Role ARN (미설정 시 null)
        status:
          type: string
          enum:
            - VALID
            - INVALID
            - UNVERIFIED
          description: Role 유효성 검증 상태
        fail_reason:
          type: string
          nullable: true
          enum:
            - ROLE_NOT_CONFIGURED
            - ROLE_INSUFFICIENT_PERMISSIONS
            - SCAN_ROLE_UNAVAILABLE
          description: INVALID 상태일 때 실패 사유 (VALID/UNVERIFIED 시 null)
        fail_message:
          type: string
          nullable: true
          description: INVALID 상태일 때 사용자 노출 메시지 (VALID/UNVERIFIED 시 null)
        last_verified_at:
          type: string
          format: date-time
          description: 마지막 검증 시각
    TerraformScriptResponse:
      type: object
      description: Terraform 스크립트 다운로드 정보
      required:
        - download_url
        - file_name
      properties:
        download_url:
          type: string
          description: 스크립트 다운로드 URL
        file_name:
          type: string
          description: 스크립트 파일명
        expires_at:
          type: string
          format: date-time
          description: 다운로드 URL 만료 시각
    ErrorResponse:
      type: object
      description: 에러 응답 공통 모델
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: '에러 코드 (예: AccessDenied, PermissionDenied)'
            message:
              type: string
              description: 에러 상세 메시지
  responses:
    PermissionDenied:
      description: 인가 실패 (API 호출 권한 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              message: 해당 리소스에 접근할 권한이 없습니다.
    TargetSourceNotFound:
      description: 대상 소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: TARGET_SOURCE_NOT_FOUND
              message: 요청하신 Target Source를 찾을 수 없습니다.
