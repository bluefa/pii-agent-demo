openapi: 3.0.3
info:
  title: Task Dashboard API (Queue Board)
  version: 3.0.0
  description: |
    PII 모니터링 모듈 관련 PM/개발 개입이 필요한 승인 요청을 일괄 조회하는 **Queue Board** API입니다.

    ---

    ### 아키텍처: 기존 승인 프로세스의 확장

    Queue Board에서 관리하는 항목은 별도 엔티티가 아니라, **기존 `ApprovalRequest`에 `requestType`을 확장**한 것입니다.

    ```
    Target Source (기존)
      └── ApprovalRequest (기존 엔티티 확장)
            ├── TARGET_CONFIRMATION  ← 기존: 연동 대상 확정 승인
            └── END_OF_SERVICE       ← 신규: EoS 처리
    ```

    ### UI 구조

    3탭 구조:
    - **대기중**: `status=PENDING` — 승인/반려/상세 액션 가능
    - **처리중**: `status=IN_PROGRESS` — 승인 후 시스템 처리 진행 중, 상세 액션만 가능
    - **완료 내역**: `status=APPROVED,REJECTED` — 상세 액션만 가능

    ### API 역할 분담

    | 역할 | API | Swagger |
    |------|-----|---------|
    | 목록 조회 (전체 TS 횡단) | `GET /task-admin/approval-requests` | **이 파일** |
    | 개별 승인/반려 | `POST /target-sources/{id}/approval-requests/approve\|reject` | `confirm.yaml` |
    | 승인 요청 생성 | `POST /target-sources/{id}/approval-requests` | `confirm.yaml` |
    | 최근 승인 요청 (상세 모달) | `GET /target-sources/{id}/approval-requests/latest` | `confirm.yaml` |

    ### 라우팅

    Next.js: `/task_admin`
servers:
  - url: /api/infra/v1
    description: v1 Base Path
tags:
  - name: Queue Board
    description: |
      관리자 Queue Board — 전체 Target Source를 횡단하여 승인 요청을 집계 조회.
      승인/반려 액션은 기존 `confirm.yaml`의 API를 재사용합니다.
paths:
  /task-admin/approval-requests:
    get:
      tags:
        - Queue Board
      summary: 승인 요청 목록 조회 (전체 Target Source 횡단)
      operationId: getApprovalRequestQueue
      x-expected-duration: 500ms ~ 2s
      description: |
        전체 Target Source에 걸쳐 승인 요청을 집계하여 목록으로 반환합니다.

        **탭별 호출:**
        - 대기중 탭: `?status=PENDING`
        - 처리중 탭: `?status=IN_PROGRESS`
        - 완료 내역 탭: `?status=APPROVED,REJECTED`

        필터(요청 유형), 검색(서비스코드/서비스명), 정렬, 페이지네이션을 지원합니다.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: 페이지 번호 (0부터 시작)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: 페이지 당 항목 수
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: requestedAt,desc
          description: '정렬 기준 (예: requestedAt,desc)'
        - name: status
          in: query
          required: true
          schema:
            type: string
            example: PENDING
          description: |
            상태 필터 (콤마 구분으로 복수 지정 가능).
            - 대기중 탭: `PENDING`
            - 처리중 탭: `IN_PROGRESS`
            - 완료 탭: `APPROVED,REJECTED`
        - name: requestType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ApprovalRequestType'
          description: 승인 요청 유형 필터
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: 검색어 (서비스코드 또는 서비스명)
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequestQueueResponse'
              examples:
                pending_tab:
                  summary: 대기중 탭
                  value:
                    content:
                      - approval_request_id: ar_001
                        target_source_id: 42
                        request_type: TARGET_CONFIRMATION
                        request_type_name: 연동 대상 확정
                        status: PENDING
                        service_code: SVC001
                        service_name: 결제 시스템
                        provider: AWS
                        cloud_info: '123456789012'
                        requested_at: '2026-02-25T10:30:00Z'
                        requested_by: 홍길동
                    page:
                      total_elements: 5
                      total_pages: 1
                      number: 0
                      size: 20
                      pending_count: 5
                      processing_count: 2
                processing_tab:
                  summary: 처리중 탭
                  value:
                    content:
                      - approval_request_id: ar_003
                        target_source_id: 28
                        request_type: TARGET_CONFIRMATION
                        request_type_name: 연동 대상 확정
                        status: IN_PROGRESS
                        status_label: 연동내용 반영중
                        service_code: SVC003
                        service_name: 인사 시스템
                        provider: GCP
                        cloud_info: hr-system-prod-123
                        requested_at: '2026-02-24T08:00:00Z'
                        requested_by: 이담당
                        processed_at: '2026-02-24T10:00:00Z'
                        processed_by: 박관리
                      - approval_request_id: ar_004
                        target_source_id: 33
                        request_type: END_OF_SERVICE
                        request_type_name: EoS 처리
                        status: IN_PROGRESS
                        status_label: EOS 처리중
                        service_code: SVC004
                        service_name: 레거시 결제 v1
                        provider: IDC
                        cloud_info: IDC
                        requested_at: '2026-02-23T14:00:00Z'
                        requested_by: 최담당
                        processed_at: '2026-02-24T09:30:00Z'
                        processed_by: 박관리
                    page:
                      total_elements: 2
                      total_pages: 1
                      number: 0
                      size: 20
                      pending_count: 5
                      processing_count: 2
                completed_tab:
                  summary: 완료 내역 탭
                  value:
                    content:
                      - approval_request_id: ar_002
                        target_source_id: 15
                        request_type: END_OF_SERVICE
                        request_type_name: EoS 처리
                        status: APPROVED
                        service_code: SVC002
                        service_name: 레거시 API
                        provider: Azure
                        cloud_info: contoso.onmicrosoft.com / prod-sub-01
                        requested_at: '2026-02-24T09:00:00Z'
                        requested_by: 김담당
                        processed_at: '2026-02-24T14:30:00Z'
                        processed_by: 박관리
                    page:
                      total_elements: 7
                      total_pages: 1
                      number: 0
                      size: 20
                      pending_count: 5
                      processing_count: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
components:
  schemas:
    ApprovalRequestType:
      type: string
      enum:
        - TARGET_CONFIRMATION
        - END_OF_SERVICE
      description: |
        승인 요청 유형. 기존 `confirm.yaml`의 ApprovalRequest에 `requestType` 필드로 추가.
        - `TARGET_CONFIRMATION`: 연동 대상 확정 승인 (기존)
        - `END_OF_SERVICE`: EoS 처리 (신규)
    ApprovalRequestStatus:
      type: string
      enum:
        - PENDING
        - IN_PROGRESS
        - APPROVED
        - REJECTED
      description: |
        승인 요청 상태.
        - `PENDING`: 접수됨, 관리자 처리 대기 → 대기중 탭
        - `IN_PROGRESS`: 승인 후 시스템 처리 진행 중 → 처리중 탭
        - `APPROVED`: 처리 완료 (승인) → 완료 내역 탭
        - `REJECTED`: 관리자 반려 → 완료 내역 탭
    CloudProvider:
      type: string
      enum:
        - AWS
        - Azure
        - GCP
        - IDC
        - SDU
    ApprovalRequestQueueResponse:
      type: object
      required:
        - content
        - page
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalRequestQueueItem'
        page:
          $ref: '#/components/schemas/PageInfoWithCounts'
    ApprovalRequestQueueItem:
      type: object
      required:
        - approval_request_id
        - target_source_id
        - request_type
        - status
        - service_code
        - service_name
        - provider
        - cloud_info
        - requested_at
        - requested_by
      description: |
        Queue Board 테이블의 한 행.
        기존 ApprovalRequest + Target Source 정보를 조인한 뷰.
      properties:
        approval_request_id:
          type: string
          description: 기존 ApprovalRequest ID
          example: ar_01H8X...
        target_source_id:
          type: integer
          format: int64
          description: Target Source ID (승인/반려 API 호출 및 상세 페이지 진입에 필요)
          example: 42
        request_type:
          $ref: '#/components/schemas/ApprovalRequestType'
        request_type_name:
          type: string
          description: 요청 유형 표시명 (UI용)
          example: 연동 대상 확정
        status:
          $ref: '#/components/schemas/ApprovalRequestStatus'
        status_label:
          type: string
          nullable: true
          description: |
            처리중 상태의 표시 라벨 (IN_PROGRESS일 때만 값 존재).
            - TARGET_CONFIRMATION + IN_PROGRESS → "연동내용 반영중"
            - END_OF_SERVICE + IN_PROGRESS → "EOS 처리중"
          example: 연동내용 반영중
        service_code:
          type: string
          description: 서비스 코드
          example: SVC001
        service_name:
          type: string
          description: 서비스명
          example: 결제 시스템
        provider:
          $ref: '#/components/schemas/CloudProvider'
        cloud_info:
          type: string
          description: |
            Provider별 Cloud 식별 정보 (표시용 문자열):
            - AWS: Account ID (예: `123456789012`)
            - Azure: Tenant / Subscription (예: `contoso.onmicrosoft.com / prod-sub-01`)
            - GCP: Project ID (예: `my-project-123`)
            - SDU: `SDU`
            - IDC: `IDC`
          example: '123456789012'
        requested_at:
          type: string
          format: date-time
          description: 요청 시간 (승인 요청 생성 시각). 기존 ApprovalRequest.requested_at과 동일.
          example: '2026-02-25T10:30:00Z'
        requested_by:
          type: string
          description: 요청 담당자명
          example: 홍길동
        processed_at:
          type: string
          format: date-time
          nullable: true
          description: 처리 시간 (승인/반려 처리 시각). 기존 ApprovalResult.processed_at과 동일. PENDING 상태에서는 null.
          example: '2026-02-25T14:30:00Z'
        processed_by:
          type: string
          nullable: true
          description: 처리 담당자명 (APPROVED/REJECTED/IN_PROGRESS 시)
          example: 김관리
        rejection_reason:
          type: string
          nullable: true
          description: 반려 사유 (REJECTED 시)
    PageInfoWithCounts:
      type: object
      required:
        - total_elements
        - total_pages
        - number
        - size
        - pending_count
        - processing_count
        - approved_count
        - rejected_count
      description: 페이지네이션 정보 + 탭 배지용 건수 (현재 필터와 무관하게 항상 반환)
      properties:
        total_elements:
          type: integer
          description: 현재 쿼리 결과의 전체 건수
          example: 15
        total_pages:
          type: integer
          example: 2
        number:
          type: integer
          description: 현재 페이지 번호 (0-based)
        size:
          type: integer
          description: 요청한 페이지 당 항목 수
        pending_count:
          type: integer
          description: 전체 PENDING 건수 (대기중 탭 배지 표시용)
          example: 5
        processing_count:
          type: integer
          description: 전체 IN_PROGRESS 건수 (처리중 탭 배지 표시용)
          example: 2
        approved_count:
          type: integer
          description: 전체 APPROVED 건수 (Summary Card 표시용)
          example: 3
        rejected_count:
          type: integer
          description: 전체 REJECTED 건수 (Summary Card 표시용)
          example: 1
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
  responses:
    Unauthorized:
      description: 인증 실패 (SSO 토큰 만료 또는 미인증)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: 인증이 필요합니다.
    PermissionDenied:
      description: 인가 실패 (관리자 권한 필요)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              message: 관리자 권한이 필요합니다.
