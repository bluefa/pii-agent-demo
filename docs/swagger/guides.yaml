openapi: 3.0.3
info:
  title: Admin Guides API
  version: 1.0.0
  description: |
    `GuideCard` 콘텐츠 편집 API. Admin 이 각 프로세스 Step 의 가이드 HTML 을 ko/en 언어로 수정한다.

    ### 스코프
    * **대상**: AWS(AUTO+MANUAL), AZURE, GCP 의 각 프로세스 Step 가이드 (`kind: 'process-step'`)
    * **제외**: IDC, SDU (Step 미확정), PREREQ 가이드, side-panel / tooltip / FAQ 배치

    ### 설계 원칙
    * **가이드 이름은 프론트엔드 상수** (`GUIDE_NAMES` in `lib/constants/guide-registry.ts`) 로 관리.
      * Admin 은 이름을 **생성·삭제·변경할 수 없다**. 콘텐츠만 편집 가능.
      * 서버는 `name → contents` 매핑만 저장 (배치·라벨·slot 등 메타데이터는 프론트 소유).
    * **콘텐츠는 단일 HTML 필드** — ko/en 각각 한 문자열. `<h4>` · `<p>` · `<ul>` 등 allow-list 태그만 허용.
    * **ko/en 동시 작성 필수** — 저장 시 둘 다 non-empty + HTML 검증 통과해야 200.
    * **허용 외 HTML = 렌더 거부** — `validateGuideHtml()` 3-layer 방어 (Tiptap → 서버 검증 → AST 렌더러).

    ### 에러 코드 (ERROR_CATALOG 추가 항목)
    * `GUIDE_NOT_FOUND` (404) — path 의 `name` 이 `GUIDE_NAMES` 상수 enum 에 없음 (invalid identifier)
    * `GUIDE_CONTENT_INVALID` (400) — ko/en 중 비어있거나 허용 외 HTML 포함. `errors` 필드에 언어별 상세 에러.

    > `GUIDE_NOT_FOUND` 는 **invalid identifier** 용이다. `name ∈ GUIDE_NAMES` 이지만 store 에 값이 없는 **drift 상태** 에서는 서버가 빈 콘텐츠를 seed 해 200 을 반환한다 (edit-first 정책). 이 경우 server log 에 warn 기록.

    ### 관련 문서
    * [기능 명세](../reports/guide-cms/spec.md)
    * [구현 계획](../reports/guide-cms/implementation-plan.md)
    * [ADR-010 Slot Registry](../adr/010-guide-cms-slot-registry.md)

    ### 경로 규약
    * 본 명세는 **Next.js 내부 CSR 엔드포인트** (`INTERNAL_INFRA_API_PREFIX = '/integration/api/v1'`) 를 기준으로 한다.
    * 상류 BFF 엔드포인트는 별도 (`UPSTREAM_INFRA_API_PREFIX = '/install/v1'`) — 이번 스코프는 Mock 모드로만 구현, 실 BFF 연동은 향후 wave.
    * 에러 응답 포맷은 RFC 9457 `application/problem+json` (`app/api/_lib/problem.ts` 참조).
servers:
  - url: /integration/api/v1
    description: Next.js 내부 CSR 라우트 (INTERNAL_INFRA_API_PREFIX)
tags:
  - name: Guides
    description: 가이드 콘텐츠 조회·편집

paths:
  /admin/guides/{name}:
    parameters:
      - $ref: '#/components/parameters/GuideNamePath'

    get:
      tags:
        - Guides
      summary: 가이드 단건 조회
      operationId: getGuide
      x-expected-duration: 100ms ~ 500ms
      description: |
        지정된 `name` 의 가이드 콘텐츠를 조회한다. ko/en 두 언어 콘텐츠를 함께 반환.

        * `name` 은 `GUIDE_NAMES` enum 에 포함된 값만 허용 (22개 고정)
        * 미등록 `name` 요청 시 `404 GUIDE_NOT_FOUND`
        * 저장된 콘텐츠가 허용 외 HTML 을 포함하는 경우라도 그대로 반환 (클라이언트 렌더 단계에서 검증)
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideDetail'
              example:
                name: AZURE_APPLYING
                contents:
                  ko: "<h4>승인된 DB를 시스템에 반영하고 있어요</h4><p>승인된 DB 메타 정보가 PII Agent 관리 시스템에 동기화되는 중입니다.</p><ul><li>반영 완료까지 최대 10분가량 소요될 수 있습니다.</li><li>이 단계에서는 실제 데이터가 전송되지 않으며, 메타데이터만 동기화됩니다.</li></ul>"
                  en: "<h4>Applying approved DB to the system</h4><p>Metadata of approved DBs is being synced to PII Agent.</p><ul><li>Sync may take up to 10 minutes.</li><li>No actual data is transferred at this stage — metadata only.</li></ul>"
                updatedAt: "2026-04-25T09:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: name 이 GUIDE_NAMES 에 없음 (invalid identifier)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: 'https://pii-agent.dev/problems/GUIDE_NOT_FOUND'
                title: 'Guide Not Found'
                status: 404
                detail: '해당 가이드 이름을 찾을 수 없습니다.'
                code: GUIDE_NOT_FOUND
                retriable: false
                requestId: 'req_abc123'

    put:
      tags:
        - Guides
      summary: 가이드 콘텐츠 저장
      operationId: putGuide
      x-expected-duration: 200ms ~ 1s
      description: |
        가이드 콘텐츠를 전체 교체 저장 (PUT semantics).

        **검증 규칙 (서버)**:
        1. path `name ∈ GUIDE_NAMES` — 아니면 `404 GUIDE_NOT_FOUND`
        2. body `contents.ko`, `contents.en` 모두 `string`
        3. 두 언어 모두 HTML strip 후 non-empty
        4. 두 언어 모두 `validateGuideHtml()` 통과 (허용 태그/속성만, URL scheme 제한)
        5. 위 중 하나라도 실패 → `400 GUIDE_CONTENT_INVALID` (details 에 언어별 에러 목록)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuideUpdateInput'
            example:
              contents:
                ko: "<h4>승인된 DB를 시스템에 반영하고 있어요</h4><p>…</p>"
                en: "<h4>Applying approved DB</h4><p>…</p>"
      responses:
        '200':
          description: 저장 성공 — 저장된 상태 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideDetail'
        '400':
          description: 콘텐츠 검증 실패 (빈 값 또는 허용 외 HTML)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/GuideContentInvalidProblem'
              example:
                type: 'https://pii-agent.dev/problems/GUIDE_CONTENT_INVALID'
                title: 'Guide Content Invalid'
                status: 400
                detail: 'ko, en 모두 작성되어야 하며 허용된 HTML 태그만 사용할 수 있습니다.'
                code: GUIDE_CONTENT_INVALID
                retriable: false
                requestId: 'req_abc123'
                errors:
                  ko:
                    - code: DISALLOWED_TAG
                      message: "허용되지 않은 태그: <script>"
                      path: "div[0] > script[0]"
                  en:
                    - code: EMPTY_CONTENT
                      message: "빈 콘텐츠"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: name 이 GUIDE_NAMES 에 없음 (invalid identifier)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: 'https://pii-agent.dev/problems/GUIDE_NOT_FOUND'
                title: 'Guide Not Found'
                status: 404
                detail: '해당 가이드 이름을 찾을 수 없습니다.'
                code: GUIDE_NOT_FOUND
                retriable: false
                requestId: 'req_abc123'

components:
  parameters:
    GuideNamePath:
      name: name
      in: path
      required: true
      description: |
        가이드 식별자. `GUIDE_NAMES` 상수에 정의된 22개 값 중 하나.
      schema:
        $ref: '#/components/schemas/GuideName'

  schemas:
    GuideName:
      type: string
      description: |
        프론트엔드 `GUIDE_NAMES as const` 와 1:1 매핑되는 고정 enum.

        * AWS (8): AUTO/MANUAL 이 step 1-3, 5-7 은 공유 · step 4 는 variant 별로 fork
        * AZURE (7): variant 없음
        * GCP (7): variant 없음

        새 name 추가 시 프론트 상수 + seed 업데이트 PR 동반 필요.
      enum:
        - AWS_TARGET_CONFIRM
        - AWS_APPROVAL_PENDING
        - AWS_APPLYING
        - AWS_AUTO_INSTALLING
        - AWS_MANUAL_INSTALLING
        - AWS_CONNECTION_TEST
        - AWS_ADMIN_APPROVAL
        - AWS_COMPLETED
        - AZURE_TARGET_CONFIRM
        - AZURE_APPROVAL_PENDING
        - AZURE_APPLYING
        - AZURE_INSTALLING
        - AZURE_CONNECTION_TEST
        - AZURE_ADMIN_APPROVAL
        - AZURE_COMPLETED
        - GCP_TARGET_CONFIRM
        - GCP_APPROVAL_PENDING
        - GCP_APPLYING
        - GCP_INSTALLING
        - GCP_CONNECTION_TEST
        - GCP_ADMIN_APPROVAL
        - GCP_COMPLETED

    GuideContents:
      type: object
      required:
        - ko
        - en
      properties:
        ko:
          type: string
          description: |
            한국어 HTML 본문. 허용 태그: `h4`, `p`, `br`, `ul`, `ol`, `li`, `strong`, `em`, `code`, `a[href,target,rel]`.
            저장 시 non-empty + allow-list 검증 통과 필수.
        en:
          type: string
          description: |
            영어 HTML 본문. ko 와 동일한 allow-list 적용.

    GuideDetail:
      type: object
      required:
        - name
        - contents
        - updatedAt
      properties:
        name:
          $ref: '#/components/schemas/GuideName'
        contents:
          $ref: '#/components/schemas/GuideContents'
        updatedAt:
          type: string
          format: date-time
          description: 마지막 저장 시각 (ISO 8601, UTC)

    GuideUpdateInput:
      type: object
      required:
        - contents
      properties:
        contents:
          $ref: '#/components/schemas/GuideContents'

    GuideValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - DISALLOWED_TAG
            - DISALLOWED_ATTRIBUTE
            - INVALID_URL_SCHEME
            - INVALID_NESTING
            - PARSE_ERROR
            - EMPTY_CONTENT
        message:
          type: string
        tagName:
          type: string
          description: 위반 태그 (해당되는 경우)
        path:
          type: string
          description: 위반 위치 경로 (예 'ul[0] > li[2]')

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - retriable
        - requestId
      description: |
        RFC 9457 Problem Details. `app/api/_lib/problem.ts` 의 `ProblemDetails` 타입과 1:1 매칭.
        Content-Type 은 `application/problem+json`.
      properties:
        type:
          type: string
          format: uri
          description: 에러 유형 URI (예 'https://pii-agent.dev/problems/GUIDE_NOT_FOUND')
        title:
          type: string
          description: ERROR_CATALOG 의 title (예 'Guide Not Found')
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: 사용자 대상 상세 메시지
        code:
          type: string
          description: 프로젝트 에러 코드 (KnownErrorCode)
        retriable:
          type: boolean
        retryAfterMs:
          type: integer
          description: 재시도 권장 지연 (retriable = true 일 때만)
        requestId:
          type: string
          description: 추적용 요청 ID

    GuideContentInvalidProblem:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          description: |
            `GUIDE_CONTENT_INVALID` 확장 — `ProblemDetails` 에 `errors` 필드 추가.
            언어별 검증 에러 상세 제공.
          properties:
            code:
              type: string
              enum: [GUIDE_CONTENT_INVALID]
            errors:
              type: object
              description: 언어별 검증 에러 상세
              properties:
                ko:
                  type: array
                  items:
                    $ref: '#/components/schemas/GuideValidationError'
                en:
                  type: array
                  items:
                    $ref: '#/components/schemas/GuideValidationError'

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: 'https://pii-agent.dev/problems/UNAUTHORIZED'
            title: 'Unauthorized'
            status: 401
            detail: '인증이 필요합니다.'
            code: UNAUTHORIZED
            retriable: false
            requestId: 'req_abc123'
    PermissionDenied:
      description: 권한 없음 (Admin 역할 필요)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: 'https://pii-agent.dev/problems/FORBIDDEN'
            title: 'Forbidden'
            status: 403
            detail: '관리자 권한이 필요합니다.'
            code: FORBIDDEN
            retriable: false
            requestId: 'req_abc123'
