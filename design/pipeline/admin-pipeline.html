<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Admin Pipeline — PII Admin</title>
<style>
/* ── Tokens: 1st :root (color) + 2nd :root (Toss surface) from 00-tokens.md ── */
:root{
  /* color */
  --color-primary:#0064FF; --color-primary-hover:#0050D6; --color-primary-light:#E8F1FF;
  --color-success:#45CB85; --color-success-dark:#2A7D52;
  --color-error:#EF4444; --color-error-dark:#991B1B;
  --color-warning:#F97316; --color-warning-dark:#9A3412;
  --color-pending:#9CA3AF; --color-pending-dark:#4B5563;
  --color-info:#3B82F6; --color-info-dark:#1E40AF;
  --color-provider-aws:#FF9900; --color-provider-azure:#0078D4; --color-provider-gcp:#4285F4;
  --color-provider-idc:#374151; --color-provider-sdu:#9333EA;
  --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB; --gray-300:#D1D5DB;
  --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563; --gray-700:#374151;
  /* Toss surface */
  --toss-page-bg:#F2F4F6; --toss-card-bg:#FFFFFF; --toss-inner-bg:#F7F8FA;
  --toss-divider:#EBEEF2; --toss-strong:#191F28; --toss-medium:#4E5968;
  --toss-weak:#8B95A1; --toss-faint:#B0B8C1;
  --toss-shadow-sm:0 1px 2px rgba(17,24,39,.04),0 4px 16px -8px rgba(17,24,39,.06);
  --toss-shadow-md:0 2px 4px rgba(17,24,39,.04),0 12px 32px -12px rgba(17,24,39,.10);
  --toss-radius-card:20px; --toss-radius-card-sm:16px; --toss-radius-inner:12px; --toss-radius-pill:10px;
  --font-sans:'Geist',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Malgun Gothic',system-ui,sans-serif;
  --font-mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,Monaco,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--toss-page-bg);color:var(--toss-strong);
  font-family:var(--font-sans);font-size:15px;letter-spacing:-.018em;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;letter-spacing:inherit}

/* ── App shell ── */
.topnav{height:52px;background:var(--toss-card-bg);border-bottom:1px solid var(--toss-divider);
  display:flex;align-items:center;gap:20px;padding:0 24px;position:sticky;top:0;z-index:20}
.topnav .brand{font-weight:700;font-size:16px}
.topnav .nav-item{color:var(--toss-weak);font-size:14px;padding:6px 4px;cursor:pointer}
.topnav .nav-item.active{color:var(--toss-strong);font-weight:600}
.topnav .nav-item.active::after{content:"●";color:var(--color-primary);font-size:9px;margin-left:4px;vertical-align:middle}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;flex:none;background:var(--toss-card-bg);border-right:1px solid var(--toss-divider);padding:20px 12px}
.sidebar .sb-title{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--toss-weak);
  text-transform:uppercase;padding:6px 12px 10px}
.sidebar .sb-item{display:block;padding:10px 12px;border-radius:10px;color:var(--toss-medium);
  font-size:14px;font-weight:500;cursor:pointer;margin-bottom:2px}
.sidebar .sb-item:hover{background:var(--toss-inner-bg)}
.sidebar .sb-item.active{background:var(--color-primary-light);color:var(--color-primary);font-weight:600}
.content{flex:1;padding:28px 32px;min-width:0}
.breadcrumb{font-size:13px;color:var(--toss-weak);margin-bottom:14px}
.breadcrumb .crumb{cursor:pointer}
.breadcrumb .crumb:hover{color:var(--toss-medium)}
.breadcrumb .sep{margin:0 7px;color:var(--toss-faint)}
.breadcrumb .cur{color:var(--toss-strong);font-weight:600}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-head h1{font-size:22px;font-weight:700;margin:0}
.section-title{font-size:14px;font-weight:700;color:var(--toss-medium);margin:22px 0 12px}

/* ── Card ── */
.card{background:var(--toss-card-bg);border-radius:var(--toss-radius-card);box-shadow:var(--toss-shadow-sm);padding:22px}
.card+.card{margin-top:16px}

/* ── StatCard ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat{background:var(--toss-card-bg);border-radius:var(--toss-radius-card-sm);box-shadow:var(--toss-shadow-sm);padding:18px 20px}
.stat .lbl{font-size:13px;color:var(--toss-weak);display:flex;align-items:center;gap:6px}
.stat .val{font-size:30px;font-weight:700;margin-top:8px;line-height:1.1}
.stat .val .den{color:var(--toss-faint);font-weight:600;font-size:22px}
.stat.unavailable .val{color:var(--toss-faint)}
.stat .sub{font-size:12px;color:var(--toss-weak);margin-top:4px}

/* ── FieldTag ── */
.ftag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;
  padding:1px 7px;border-radius:6px;vertical-align:middle}
.ftag.ext{background:#FFF4E6;color:var(--color-warning-dark)}
.ftag.approx{background:#EFF6FF;color:var(--color-info-dark)}
.ftag.na{background:var(--gray-100);color:var(--toss-weak)}
.ftag.null{background:var(--gray-100);color:var(--toss-faint)}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:var(--toss-radius-pill)}
.pill .dot{width:6px;height:6px;border-radius:50%}
.pill.s-RUNNING,.pill.s-IN_PROGRESS{background:#EAF2FE;color:var(--color-info-dark)} .pill.s-RUNNING .dot,.pill.s-IN_PROGRESS .dot{background:var(--color-info)}
.pill.s-READY{background:#EAF2FE;color:var(--color-info)} .pill.s-READY .dot{background:var(--color-info)}
.pill.s-DONE{background:#E9F8F0;color:var(--color-success-dark)} .pill.s-DONE .dot{background:var(--color-success)}
.pill.s-FAILED{background:#FDECEC;color:var(--color-error-dark)} .pill.s-FAILED .dot{background:var(--color-error)}
.pill.s-CANCELLED{background:var(--gray-100);color:var(--color-pending-dark)} .pill.s-CANCELLED .dot{background:var(--color-pending)}
.pill.s-BLOCKED{background:var(--gray-100);color:var(--toss-weak)} .pill.s-BLOCKED .dot{background:var(--toss-faint)}

/* ── ProviderTag ── */
.ptag{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.ptag .pdot{width:8px;height:8px;border-radius:50%}
.ptag.external{border:1px dashed var(--color-warning);border-radius:8px;padding:1px 8px}
.pv-aws{color:var(--color-provider-aws)} .pv-aws .pdot{background:var(--color-provider-aws)}
.pv-azure{color:var(--color-provider-azure)} .pv-azure .pdot{background:var(--color-provider-azure)}
.pv-gcp{color:var(--color-provider-gcp)} .pv-gcp .pdot{background:var(--color-provider-gcp)}
.pv-idc{color:var(--color-provider-idc)} .pv-idc .pdot{background:var(--color-provider-idc)}
.pv-sdu{color:var(--color-provider-sdu)} .pv-sdu .pdot{background:var(--color-provider-sdu)}

/* ── ProgressBar ── */
.pbar{display:inline-flex;align-items:center;gap:8px}
.pbar .track{width:96px;height:8px;border-radius:6px;background:var(--gray-200);overflow:hidden}
.pbar .fill{height:100%;background:var(--color-primary);border-radius:6px}
.pbar .lbl{font-size:12px;color:var(--toss-medium);font-variant-numeric:tabular-nums}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;font-size:12px;font-weight:600;color:var(--toss-weak);padding:10px 12px;
  border-bottom:1px solid var(--toss-divider)}
.tbl td{padding:12px;border-bottom:1px solid var(--toss-divider);color:var(--toss-medium);vertical-align:middle}
.tbl tr.click{cursor:pointer}
.tbl tr.click:hover td{background:var(--toss-inner-bg)}
.tbl .mono{font-family:var(--font-mono);font-size:13px;color:var(--toss-strong)}
.link{color:var(--color-primary);font-weight:600;cursor:pointer}
.chev{color:var(--toss-faint)}

/* ── FilterBar ── */
.filterbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filterbar .grow{flex:1}
.input,select.sel{height:36px;border:1px solid var(--gray-200);border-radius:10px;padding:0 12px;
  font-size:14px;background:var(--toss-card-bg);color:var(--toss-strong)}
.input:focus,select.sel:focus{outline:2px solid var(--color-primary);outline-offset:1px;border-color:transparent}
.seg{display:inline-flex;background:var(--toss-inner-bg);border-radius:10px;padding:3px}
.seg button{border:0;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;
  font-weight:600;color:var(--toss-weak);cursor:pointer}
.seg button.on{background:var(--toss-card-bg);color:var(--color-primary);box-shadow:var(--toss-shadow-sm)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 16px;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.primary{background:var(--color-primary);color:#fff}
.btn.primary:not(:disabled):hover{background:var(--color-primary-hover)}
.btn.secondary{background:var(--toss-card-bg);color:var(--toss-medium);border-color:var(--gray-300)}
.btn.secondary:not(:disabled):hover{background:var(--gray-50)}
.btn.ghost{background:transparent;color:var(--toss-weak)}
.btn.ghost:not(:disabled):hover{background:var(--gray-100)}
.btn.danger{background:#fff;color:var(--color-error);border-color:#F3C6C6}
.btn.danger:not(:disabled):hover{background:#FDECEC}
.btn.sm{height:30px;padding:0 11px;font-size:13px}

/* ── KeyValueGrid ── */
.kv{display:grid;grid-template-columns:130px 1fr;gap:9px 14px;font-size:14px}
.kv .k{color:var(--toss-weak)}
.kv .v{color:var(--toss-strong);font-weight:500}
.kv .v.mono{font-family:var(--font-mono);font-size:13px}

/* ── Collapsible ── */
details.collap{border:1px solid var(--toss-divider);border-radius:12px;margin-top:12px;background:var(--toss-card-bg)}
details.collap>summary{cursor:pointer;padding:12px 16px;font-size:14px;font-weight:600;color:var(--toss-medium);list-style:none}
details.collap>summary::-webkit-details-marker{display:none}
details.collap>summary::before{content:"▸";margin-right:8px;color:var(--toss-faint)}
details.collap[open]>summary::before{content:"▾"}
details.collap>.body{padding:0 16px 16px}

/* ── Task flow ── */
.flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 2px 12px}
.tnode{flex:none;width:190px;border:1.5px solid var(--gray-200);border-radius:14px;padding:14px;
  background:var(--toss-card-bg);cursor:pointer;position:relative}
.tnode:hover{border-color:var(--color-primary);box-shadow:var(--toss-shadow-sm)}
.tnode.sel{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-light)}
.tnode.cond{border-style:dashed}
.tnode .seq{font-size:12px;color:var(--toss-weak);font-weight:600}
.tnode .nm{font-size:14px;font-weight:600;margin:4px 0 8px;color:var(--toss-strong)}
.tnode .meta{font-size:11px;color:var(--toss-weak);margin-top:8px}
.tnode .kindchip{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;background:var(--gray-100);color:var(--toss-medium)}
.tnode .kindchip.ext{background:#FFF4E6;color:var(--color-warning-dark)}
.connector{flex:none;width:34px;display:flex;align-items:center;justify-content:center;color:var(--toss-faint);font-size:18px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.4);display:flex;align-items:center;
  justify-content:center;z-index:50}
.modal{background:#fff;border-radius:var(--toss-radius-card);box-shadow:var(--toss-shadow-md);
  width:460px;max-width:90vw;padding:24px}
.modal h3{margin:0 0 6px;font-size:18px}
.modal .desc{font-size:14px;color:var(--toss-medium);margin-bottom:16px}
.modal .foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.recipe{background:var(--toss-inner-bg);border-radius:12px;padding:12px 14px}
.recipe .step{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.recipe .step .sq{width:20px;height:20px;border-radius:50%;background:var(--color-primary-light);
  color:var(--color-primary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}

/* ── Toast ── */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--toss-strong);
  color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;box-shadow:var(--toss-shadow-md);z-index:60}

/* ── Empty ── */
.empty{text-align:center;padding:34px;color:var(--toss-weak);font-size:14px}
.empty .ico{font-size:26px;display:block;margin-bottom:8px;opacity:.5}
#svclist .sb-item{display:block;padding:10px 12px;border-radius:10px;color:var(--toss-medium);
  font-size:14px;font-weight:500;cursor:pointer;margin-bottom:4px;border:1px solid var(--toss-divider)}
#svclist .sb-item:hover{background:var(--toss-inner-bg)}
#svclist .sb-item.active{background:var(--color-primary-light);color:var(--color-primary);border-color:transparent;font-weight:600}
.two-col{display:grid;grid-template-columns:320px 1fr;gap:16px}
.meta-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.muted{color:var(--toss-weak)}
.notice{background:var(--color-primary-light);color:var(--color-info-dark);font-size:12px;
  padding:6px 10px;border-radius:8px;display:inline-block}
</style>
</head>

<div class="topnav">
  <span class="brand">PII Admin</span>
  <span class="nav-item">SIT 연동</span>

</div>

<script>

const SERVICES = [
  {code:'SVC001', name:'svc-alpha'},
  {code:'SVC002', name:'svc-beta'},
  {code:'SVC003', name:'svc-gamma'},

const AUTH_USERS = {

    {id:'ts-gcp-002', provider:'gcp', account:'gcp-proj-77', processStatus:'COMPLETED'},

Object.entries(TARGET_SOURCES).forEach(([svc,arr])=>arr.forEach(t=>TS_INDEX[t.id]={...t,serviceCode:svc,serviceName:SERVICES.find(s=>s.code===svc).name}));

// helper builders for attempts/checks
const att = (no,status,error,at,resp)=>({attemptNo:no,status,errorCode:error,at,response:resp});
const chk = (call,notMet,apiErr,timeout,ext,at)=>({callCount:call,notMetCount:notMet,apiErrorCount:apiErr,callTimeoutCount:timeout,lastExternalStatus:ext,lastResponseCode:null,lastResponseSummary:null,lastCheckedAt:at});

// 🆕 pipelines (A3/A4/A7/A8). tasks 안에 attempts(TERRAFORM_JOB)/check(CONDITION_CHECK)
const PIPELINES = {

        errorCode:null, startedAt:'14:21', finishedAt:null, executionTimeout:'30분',
        attempts:[att(1,'IN_PROGRESS',null,'14:21','{"job_id":"tf-b22","result":"running"}')]},
      {seq:4, kind:'TERRAFORM_JOB', operation:'BDC Service Level TF', status:'BLOCKED', failCount:0, maxFail:1,
        errorCode:null, startedAt:null, finishedAt:null, executionTimeout:'30분', attempts:[]},
    ]},
  127:{id:127, type:'DELETE', target:'ts-aws-001', provider:'aws', status:'DONE',
    createdAt:'2026-06-28 09:11', lastActivityAt:'2026-06-28 09:33',
    tasks:[
      {seq:1, kind:'TERRAFORM_JOB', operation:'BDC Service Level TF 삭제', status:'DONE', failCount:0, maxFail:1,
        errorCode:null, startedAt:'09:11', finishedAt:'09:20', executionTimeout:'30분',
        attempts:[att(1,'DONE',null,'09:11','{"job_id":"tf-d10","result":"destroyed"}')]},
      {seq:2, kind:'TERRAFORM_JOB', operation:'SVC TF 삭제', status:'DONE', failCount:0, maxFail:1,
        errorCode:null, startedAt:'09:21', finishedAt:'09:33', executionTimeout:'30분',
        attempts:[att(1,'DONE',null,'09:21','{"job_id":"tf-d11","result":"destroyed"}')]},
    ]},
  126:{id:126, type:'INSTALL', target:'ts-gcp-002', provider:'gcp', status:'DONE',
    createdAt:'2026-06-25 11:00', lastActivityAt:'2026-06-25 11:40',
    tasks:[
      {seq:1, kind:'CONDITION_CHECK', operation:'TF 권한 확인', status:'DONE', failCount:0, maxFail:6, errorCode:null, startedAt:'11:00', finishedAt:'11:05', pollingInterval:'10분', ttl:'7일', check:chk(1,0,0,0,'OK','11:05')},
      {seq:2, kind:'CONDITION_CHECK', operation:'Subnet 생성 확인', status:'DONE', failCount:2, maxFail:6, errorCode:null, startedAt:'11:06', finishedAt:'11:20', pollingInterval:'10분', ttl:'7일', check:chk(3,2,0,0,'OK','11:20')},
      {seq:3, kind:'TERRAFORM_JOB', operation:'SVC TF 동작', status:'DONE', failCount:0, maxFail:1, errorCode:null, startedAt:'11:21', finishedAt:'11:30', executionTimeout:'30분', attempts:[att(1,'DONE',null,'11:21','{"job_id":"tf-g01"}')]},
      {seq:4, kind:'TERRAFORM_JOB', operation:'BDC TF 동작', status:'DONE', failCount:0, maxFail:1, errorCode:null, startedAt:'11:31', finishedAt:'11:40', executionTimeout:'30분', attempts:[att(1,'DONE',null,'11:31','{"job_id":"tf-g02"}')]},
    ]},
  125:{id:125, type:'DELETE', target:'ts-idc-003', provider:'idc', status:'RUNNING',
    createdAt:'2026-06-30 13:50', lastActivityAt:'2026-06-30 13:56',
    tasks:[
      {seq:1, kind:'TERRAFORM_JOB', operation:'BDP TF 삭제', status:'IN_PROGRESS', failCount:0, maxFail:1, errorCode:null, startedAt:'13:50', finishedAt:null, executionTimeout:'30분', attempts:[att(1,'IN_PROGRESS',null,'13:50','{"job_id":"tf-i01","result":"running"}')]},

    ]},

  const src = (type==='INSTALL'?install:del)[provider] || [];

/* =========================================================================
 * Derivations (§4.5)
 * ========================================================================= */
const progressN = p => p.tasks.filter(t=>t.status==='DONE').length;       // (a)
const progressM = p => p.tasks.length;
function currentTask(p){                                                   // (b)
  const order = {READY:0,IN_PROGRESS:0,FAILED:0};
  const cand = p.tasks.filter(t=>t.status in order).sort((a,b)=>a.seq-b.seq)[0];
  return cand || null;
}
const finalSeq = p => Math.max(...p.tasks.map(t=>t.seq));
const canCancel = p => p.status==='RUNNING';                              // (c)
function targetButtons(ts){                                                // (d)
  const run = (BY_TARGET[ts.id]||[]).map(id=>PIPELINES[id]).find(p=>p.status==='RUNNING');
  if(run) return {install:false, delete:false, cancel:true, runId:run.id};
  const installed = ['CONNECTED','COMPLETED','INSTALLED'].includes(ts.processStatus);
  return {install:!installed, delete:installed, cancel:false, runId:null};
}

const app = {navState:{}, selectedServiceCode:null, selectedTaskId:null, modal:null};
function nav(hash, navState){ if(navState) app.navState={...app.navState,...navState}; location.hash=hash; }
function parseHash(){
  const h = location.hash || '#/dashboard';
  const m = h.match(/^#\/(dashboard|services|target|pipeline)(?:\/(.+))?$/);
  if(!m) return {route:'404'};
  return {route:m[1], param:m[2]?decodeURIComponent(m[2]):null};
}
function setActiveSidebar(route){
  document.querySelectorAll('.sb-item').forEach(a=>{
    const r = a.getAttribute('data-nav');
    a.classList.toggle('active', (route==='dashboard'&&r==='#/dashboard')||(route==='services'&&r==='#/services'));
  });
}
function breadcrumb(parts){ // parts: [{label,hash?}] last is current
  return `<div class="breadcrumb">`+parts.map((p,i)=>{
    const last=i===parts.length-1;
    const sep=i>0?'<span class="sep">›</span>':'';
    return sep+(last?`<span class="cur">${esc(p.label)}</span>`:`<span class="crumb" data-nav="${p.hash}">${esc(p.label)}</span>`);
  }).join('')+`</div>`;
}
function render(){
  const {route,param}=parseHash();
  setActiveSidebar(route);
  const out=document.getElementById('outlet');
  out.innerHTML='';
  let view;
  if(route==='dashboard') view=viewDashboard();
  else if(route==='services') view=viewServices();
  else if(route==='target') view=viewTarget(param);
  else if(route==='pipeline') view=viewPipeline(param);

  out.appendChild(view);
  wireNav(out);
}
function wireNav(root){
  root.querySelectorAll('[data-nav]').forEach(node=>{
    if(node._wired) return; node._wired=true;
    node.addEventListener('click',()=>{const h=node.getAttribute('data-nav'); if(h) location.hash=h;});
    node.setAttribute('tabindex','0'); node.setAttribute('role','link');
    node.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();node.click();}});
  });
}

    hist.innerHTML=`<div class="empty"><span class="ico">📭</span>파이프라인 이력이 없어요</div>`;
  }
  root.querySelector('#refresh').onclick=()=>toast('상태를 새로고침했어요');
  const bi=root.querySelector('#btn-install'), bd=root.querySelector('#btn-delete'), bc=root.querySelector('#btn-cancel');
  if(btns.install) bi.onclick=()=>openPreview(ts,'INSTALL');
  if(btns.delete) bd.onclick=()=>openPreview(ts,'DELETE');
  if(btns.cancel) bc.onclick=()=>openCancel(btns.runId);
  return root;
}

/* =========================================================================
 * View 4: Pipeline detail (#/pipeline/:id) — A4 meta+flow, A5 task detail, A6 cancel
 * ========================================================================= */
function viewPipeline(id){
  const p=PIPELINES[id];
  if(!p) return view404();
  const ts=TS_INDEX[p.target];
  const crumbs=[{label:'서비스 검색',hash:'#/services'}];
  const svcName=app.navState.serviceName || (ts&&ts.serviceName);
  if(svcName && app.navState.serviceCode!==null && (app.navState.targetId===p.target)) {
    crumbs.push({label:svcName});
    crumbs.push({label:p.target, hash:`#/target/${p.target}`});
  } else {
    // dashboard 직행: service 컨텍스트 없음 → target 조각만
    crumbs.push({label:p.target, hash:`#/target/${p.target}`});
  }
  crumbs.push({label:`파이프라인 #${p.id}`});
  const cur=currentTask(p);
  const root=el(`<div>
    ${breadcrumb(crumbs)}
    <div class="page-head"><h1>파이프라인 #${p.id}</h1></div>
    <div class="meta-2">
      <div class="card">
        <div class="section-title" style="margin-top:0">파이프라인 정보</div>
        <div class="kv">
          <div class="k">ID / 타입</div><div class="v mono">#${p.id} · ${p.type}</div>
          <div class="k">target</div><div class="v mono">${p.target} ${provTag(p.provider,true)}</div>
          <div class="k">상태</div><div class="v">${pill(p.status)}</div>
          <div class="k">생성</div><div class="v">${p.createdAt}</div>
          <div class="k">마지막 활동</div><div class="v">${p.lastActivityAt}</div>
          <div class="k">현재 / 최종 task</div><div class="v">${cur?`seq ${cur.seq}`:'완료'} / seq ${finalSeq(p)} <span class="ftag approx">파생 ⚙️</span></div>
          <div class="k">실패 / 한계</div><div class="v">${cur?`${cur.failCount} / ${cur.maxFail}`:'—'} <span class="ftag approx">파생 ⚙️</span></div>
        </div>
        <div style="margin-top:16px"><button class="btn danger" id="pcancel" ${canCancel(p)?'':'disabled'}>파이프라인 취소</button>
          ${canCancel(p)?'':'<span class="muted" style="font-size:12px;margin-left:8px">진행 중(RUNNING)만 취소 가능</span>'}</div>
      </div>
      <div class="card">
        <div class="section-title" style="margin-top:0">실행 메타 <span class="muted" style="font-weight:400">(ADR-021)</span></div>
        <details class="collap" open><summary>미제공 필드 (이 저장소에 데이터 없음)</summary><div class="body">
          <div class="kv">
            <div class="k">next_due_at</div><div class="v">${naTag}</div>
            <div class="k">lease (claimed_until)</div><div class="v">${naTag}</div>
            <div class="k">cancel_requested</div><div class="v">${naTag}</div>
            <div class="k">지연 lag</div><div class="v">${naTag}</div>
          </div>
          <div class="muted" style="font-size:12px;margin-top:10px">ADR-021 실행 필드 — ADR-016 도메인 저장소 범위 밖. 취소는 즉시 CANCELLED(플래그 없음).</div>
        </div></details>
      </div>
    </div>
    <div class="section-title">Task 흐름 <span class="muted" style="font-weight:400">(읽기 전용 · 노드 클릭 → 하단 상세)</span></div>
    <div class="card"><div class="flow" id="flow"></div></div>
    <div id="taskdetail"></div>
  </div>`);
  // flow
  const flow=root.querySelector('#flow');
  p.tasks.forEach((t,i)=>{
    if(i>0) flow.appendChild(el(`<div class="connector">─▶</div>`));
    const cond=t.kind==='CONDITION_CHECK';
    const icon={DONE:'✔',IN_PROGRESS:'▶',BLOCKED:'○',READY:'◔',FAILED:'✕',CANCELLED:'⊘'}[t.status];
    const node=el(`<div class="tnode ${cond?'cond':''} ${app.selectedTaskId==t.seq?'sel':''}" data-seq="${t.seq}" role="button" tabindex="0">
      <div class="seq">${icon} seq ${t.seq}</div>
      <div class="nm">${esc(t.operation)}</div>
      <span class="kindchip ${cond?'ext':''}">${cond?'CONDITION_CHECK · 외부확인':'TERRAFORM_JOB'}</span>
      <div style="margin-top:8px">${pill(t.status)}</div>
      <div class="meta">${t.failCount?`fail ${t.failCount}`:''}${t.errorCode?` · ${t.errorCode}`:''}${t.startedAt?` · ${t.startedAt}${t.finishedAt?'~'+t.finishedAt:''}`:''}</div>
    </div>`);
    const sel=()=>{app.selectedTaskId=t.seq; renderTaskDetail(root,p);
      flow.querySelectorAll('.tnode').forEach(n=>n.classList.toggle('sel',n.dataset.seq==t.seq));};
    node.onclick=sel; node.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();sel();}};
    flow.appendChild(node);
  });
  renderTaskDetail(root,p);
  const pc=root.querySelector('#pcancel'); if(canCancel(p)) pc.onclick=()=>openCancel(p.id);
  return root;
}
function renderTaskDetail(root,p){
  const box=root.querySelector('#taskdetail');
  const t=p.tasks.find(x=>x.seq==app.selectedTaskId);
  if(!t){ box.innerHTML=`<div class="card empty"><span class="ico">👆</span>Task 노드를 클릭하면 상세가 여기에 표시됩니다</div>`; return; }
  const cond=t.kind==='CONDITION_CHECK';
  let detail;
  if(cond){
    const c=t.check;
    detail=`<div class="section-title">Check 요약 <span class="muted" style="font-weight:400">(CONDITION_CHECK)</span></div>`+
      (c?`<div class="kv" style="grid-template-columns:150px 1fr">
        <div class="k">call / not_met</div><div class="v">${c.callCount} / ${c.notMetCount}</div>
        <div class="k">api_error / timeout</div><div class="v">${c.apiErrorCount} / ${c.callTimeoutCount}</div>
        <div class="k">last_external_status</div><div class="v">${c.lastExternalStatus}</div>
        <div class="k">last_checked_at</div><div class="v">${c.lastCheckedAt}</div>
        <div class="k">last_response_code</div><div class="v">${c.lastResponseCode??'null'} <span class="ftag null">미채움 ⚠️</span></div>
        <div class="k">last_response_summary</div><div class="v">${c.lastResponseSummary??'null'} <span class="ftag null">미채움 ⚠️</span></div>
      </div>`:`<div class="empty">아직 폴링 기록 없음</div>`);
  }else{
    detail=`<div class="section-title">Attempts <span class="muted" style="font-weight:400">(TERRAFORM_JOB)</span></div>`+
      (t.attempts&&t.attempts.length?`<table class="tbl"><thead><tr><th>#</th><th>상태</th><th>error_code</th><th>시각</th><th>response (원시 text)</th></tr></thead><tbody>${
        t.attempts.map(a=>`<tr><td>${a.attemptNo}</td><td>${pill(a.status)}</td><td>${a.errorCode||'-'}</td><td class="muted">${a.at}</td><td class="mono" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(a.response)}">${esc(a.response)}</td></tr>`).join('')}</tbody></table>
        <div class="muted" style="font-size:12px;margin-top:8px">job_ids · dispatch_response_* 는 제거된 필드(❌) — job id는 response 원시 text 안에 있습니다.</div>`
      :`<div class="empty">아직 시도 없음 (BLOCKED)</div>`);
  }
  box.innerHTML=`<div class="card">
    <div class="section-title" style="margin-top:0">Task seq ${t.seq} · ${esc(t.operation)}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
      <span class="kindchip ${cond?'ext':''}" style="font-size:11px;padding:2px 8px;border-radius:6px">${t.kind}</span>${pill(t.status)}
    </div>
    <div class="kv" style="grid-template-columns:150px 1fr;margin-bottom:16px">
      <div class="k">operation</div><div class="v">${esc(t.operation)}</div>
      ${cond?`<div class="k">pollingInterval / ttl</div><div class="v">${t.pollingInterval} / ${t.ttl}</div>
        <div class="k">maxFailCount</div><div class="v">${t.maxFail} <span class="muted" style="font-size:12px">count-bound(ttl→유한)</span></div>`
        :`<div class="k">executionTimeout</div><div class="v">${t.executionTimeout}</div>
        <div class="k">fail / maxFail</div><div class="v">${t.failCount} / ${t.maxFail}</div>`}
      <div class="k">started / finished</div><div class="v">${t.startedAt||'-'} / ${t.finishedAt||'-'}</div>
    </div>
    <div class="muted" style="font-size:12px;margin-bottom:12px">설정은 읽기 전용 — 원본 10-API에 task 편집(PATCH) 없음.</div>
    ${detail}
  </div>`;
}

/* =========================================================================
 * Modals: preview (A9→A10), cancel (A6)
 * ========================================================================= */
function closeModal(){document.getElementById('modal-root').innerHTML='';app.modal=null;document.removeEventListener('keydown',escClose);}
function escClose(e){if(e.key==='Escape')closeModal();}
function mountModal(html){
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="overlay">${html}</div>`;
  root.querySelector('.overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.addEventListener('keydown',escClose);
  return root.querySelector('.modal');
}
function openPreview(ts,type){
  app.modal={kind:'preview',type,id:ts.id};
  const steps=previewRecipe(ts.provider,type);
  const m=mountModal(`<div class="modal">
    <h3>${type==='INSTALL'?'설치':'삭제'} 실행 미리보기</h3>
    <div class="desc">${ts.id} · ${PROVIDERS[ts.provider]} — 아래 순서(recipe)로 파이프라인이 생성됩니다. <span class="muted">유일성: 진행 중 run이 있으면 기존 run을 반환합니다.</span></div>
    <div class="recipe">${steps.map(s=>`<div class="step"><span class="sq">${s.seq}</span>${esc(s.operation)} <span class="kindchip ${s.kind==='CONDITION_CHECK'?'ext':''}" style="margin-left:auto">${s.kind}</span></div>`).join('')||'<span class="muted">recipe 없음</span>'}</div>
    <div class="foot"><button class="btn ghost" id="mcancel">취소</button><button class="btn primary" id="mrun">${type==='INSTALL'?'설치':'삭제'} 실행</button></div>
  </div>`);
  m.querySelector('#mcancel').onclick=closeModal;
  m.querySelector('#mrun').onclick=()=>{
    // A10 POST — mock: 진행 중 run 있으면 그걸 반환(멱등), 없으면 최신 run으로 이동
    const running=(BY_TARGET[ts.id]||[]).map(id=>PIPELINES[id]).find(p=>p.status==='RUNNING');
    closeModal();
    if(running){ toast('이미 진행 중인 파이프라인으로 이동합니다'); nav(`#/pipeline/${running.id}`,{serviceCode:ts.serviceCode,serviceName:ts.serviceName,targetId:ts.id,provider:ts.provider}); }
    else { const latest=(BY_TARGET[ts.id]||[])[0]; toast(`${type==='INSTALL'?'설치':'삭제'} 파이프라인이 실행됐어요`); if(latest) nav(`#/pipeline/${latest}`,{serviceCode:ts.serviceCode,serviceName:ts.serviceName,targetId:ts.id,provider:ts.provider}); }
  };
}
function openCancel(pipelineId){
  app.modal={kind:'cancel',id:pipelineId};
  const m=mountModal(`<div class="modal">
    <h3>파이프라인 취소</h3>
    <div class="desc">#${pipelineId} 파이프라인을 취소할까요? <b>취소는 즉시 반영</b>됩니다(idle/cooperative 구분 없음). 진행 중 task와 후속 task가 CANCELLED로 종단화됩니다.</div>
    <div class="foot"><button class="btn ghost" id="mkeep">닫기</button><button class="btn danger" id="mdo">취소 실행</button></div>
  </div>`);
  m.querySelector('#mkeep').onclick=closeModal;
  m.querySelector('#mdo').onclick=()=>{ closeModal(); toast(`#${pipelineId} 취소 요청됨(즉시)`); };
}

/* ── Toast ── */
let toastTimer=null;
function toast(msg){
  const r=document.getElementById('toast-root');
  r.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>r.innerHTML='',2600);
}

/* ── boot ── */
render();
</script>
</body>
</html>
