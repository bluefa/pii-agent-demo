  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

bd8-4dc9-949a-687227724e04\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* -----------------------------------------------------------------\n     Brand / Primary\n     The PII Agent blue \u2014 a Toss-style #0064FF. Used for all primary\n     actions, tabs, active states, links.\n     ----------------------------------------------------------------- */\n  --color-primary:            #0064FF;\n  --color-primary-hover:      #0050D6;\n  --color-primary-light:      #E8F1FF;   /* tinted surface behind primary */\n  --color-primary-50:         #EFF6FF;   /* toolbar/pill background */\n  --color-primary-100:        #DBEAFE;   /* hover of pill background */\n\n  /* -----------------------------------------------------------------\n     Status colors (CLAUDE.md + theme.ts are source of truth)\n     ----------------------------------------------------------------- */\n  --color-success:            #45CB85;   /* \uc5f0\uacb0\ub428 / \uc644\ub8cc */\n  --color-success-dark:       #2A7D52;   /* success text on tinted bg */\n  --color-success-hover:      #3AB574;\n  --color-error:              #EF4444;   /* red-500 \u2014 \ub04a\uae40 / \uc5d0\ub7ec */\n  --color-error-dark:         #991B1B;   /* red-800 \u2014 dark text */\n  --color-warning:            #F97316;   /* orange-500 \u2014 \uc9c4\ud589\uc911 / AWS */\n  --color-warning-dark:       #9A3412;\n  --color-pending:            #9CA3AF;   /* gray-400 \u2014 \ub300\uae30\uc911 */\n  --color-pending-dark:       #4B5563;\n  --color-info:               #3B82F6;   /* blue-500 \u2014 \uc2e0\uaddc */\n  --color-info-dark:           #1E40AF;\n\n  /* -----------------------------------------------------------------\n     Cloud provider brand colors\n     Used as left-border accent + tinted background on info cards.\n     ----------------------------------------------------------------- */\n  --color-provider-aws:       #FF9900;\n  --color-provider-azure:     #0078D4;\n  --color-provider-gcp:       #4285F4;\n  --color-provider-idc:       #374151;   /* gray-700 */\n  --color-provider-sdu:       #9333EA;   /* purple-600 */\n\n  /* -----------------------------------------------------------------\n     Neutrals (Tailwind gray-* scale; exposed as tokens)\n     ----------------------------------------------------------------- */\n  --gray-50:   #F9FAFB;\n  --gray-100:  #F3F4F6;\n  --gray-200:  #E5E7EB;\n  --gray-300:  #D1D5DB;\n  --gray-400:  #9CA3AF;\n  --gray-500:  #6B7280;\n  --gray-600:  #4B5563;\n  --gray-700:  #374151;\n  --gray-800:  #1F2937;\n  --gray-900:  #111827;\n\n  /* -----------------------------------------------------------------\n     Semantic \u2014 text\n     ----------------------------------------------------------------- */\n  --fg-1:  var(--gray-900);   /* primary text \u2014 headlines, body emphasis */\n  --fg-2:  var(--gray-700);   /* secondary text \u2014 body */\n  --fg-3:  var(--gray-500);   /* tertiary text \u2014 captions, labels */\n  --fg-4:  var(--gray-400);   /* quaternary text \u2014 placeholders, disabled */\n  --fg-inverse: #FFFFFF;\n\n  /* -----------------------------------------------------------------\n     Semantic \u2014 surfaces\n     ----------------------------------------------------------------- */\n  --bg-page:      #FFFFFF;\n  --bg-muted:     var(--gray-50);      /* page background, table header */\n  --bg-surface:   #FFFFFF;             /* card */\n  --bg-tinted:    var(--gray-100);\n\n  /* Borders */\n  --border-light:   var(--gray-100);   /* inside cards (dividers) */\n  --border-default: var(--gray-200);   /* cards, inputs */\n  --border-strong:  var(--gray-300);\n\n  /* -----------------------------------------------------------------\n     Radii\n     ----------------------------------------------------------------- */\n  --radius-sm:     6px;\n  --radius-button: 8px;    /* rounded-lg */\n  --radius-card:   12px;   /* rounded-xl */\n  --radius-card-lg:16px;   /* rounded-2xl \u2014 KPI cards */\n  --radius-pill:   9999px;\n\n  /* -----------------------------------------------------------------\n     Shadows\n     ----------------------------------------------------------------- */\n  --shadow-card:        0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);\n  --shadow-card-hover:  0 4px 12px -2px rgb(0 0 0 / 0.10), 0 2px 4px -2px rgb(0 0 0 / 0.06);\n  --shadow-modal:       0 20px 25px -5px rgb(0 0 0 / 0.10), 0 8px 10px -6px rgb(0 0 0 / 0.10);\n  --shadow-button:      0 1px 2px 0 rgb(0 0 0 / 0.05);\n\n  /* -----------------------------------------------------------------\n     Spacing scale \u2014 Tailwind 4px base\n     ----------------------------------------------------------------- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;   /* card padding, section gap */\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n\n  /* -----------------------------------------------------------------\n     Typography \u2014 families\n     ----------------------------------------------------------------- */\n  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', system-ui, sans-serif;\n  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;\n\n  /* Type scale \u2014 from real product usage */\n  --type-display:   28px;   /* DashboardHeader h1 */\n  --type-h1:        22px;   /* KPI big numbers, modal titles (lg) */\n  --type-h2:        20px;\n  --type-h3:        18px;\n  --type-body:      15px;   /* body copy in dashboard */\n  --type-body-sm:   14px;   /* table text, secondary body */\n  --type-caption:   13px;\n  --type-label:     12px;   /* muted labels */\n  --type-micro:     11px;   /* tiny chips */\n\n  /* Gradient \u2014 the one 'brand gradient' used in dashboard */\n  --gradient-brand: linear-gradient(135deg, #0064FF 0%, #6366f1 100%);\n  --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);\n  --gradient-indigo:  linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);\n}\n\n/* =============================================================================\n   Semantic utility classes \u2014 use these in hand-rolled HTML cards / slides.\n   ============================================================================= */\n\nbody, .ds-body {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n.ds-h1 {\n  font-size: var(--type-display);\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  line-height: 1.15;\n  color: var(--fg-1);\n}\n.ds-h2 {\n  font-size: var(--type-h1);\n  font-weight: 700;\n  letter-spacing: -0.01em;\n  line-height: 1.25;\n  color: var(--fg-1);\n}\n.ds-h3 {\n  font-size: var(--type-h3);\n  font-weight: 600;\n  line-height: 1.3;\n  color: var(--fg-1);\n}\n.ds-body {\n  font-size: var(--type-body);\n  line-height: 1.55;\n  color: var(--fg-2);\n}\n.ds-body-sm {\n  font-size: var(--type-body-sm);\n  line-height: 1.5;\n  color: var(--fg-2);\n}\n.ds-caption {\n  font-size: var(--type-caption);\n  color: var(--fg-3);\n  line-height: 1.4;\n}\n.ds-label {\n  font-size: var(--type-label);\n  color: var(--fg-3);\n  line-height: 1.3;\n}\n.ds-micro {\n  font-size: var(--type-micro);\n  color: var(--fg-4);\n  letter-spacing: 0.01em;\n}\n.ds-card-title {\n  /* The distinctive section header style from Card.tsx */\n  font-size: var(--type-body-sm);\n  font-weight: 600;\n  color: var(--fg-3);\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n.ds-mono {\n  font-family: var(--font-mono);\n}\n\n/* Card recipe */\n.ds-card {\n  background: var(--bg-surface);\n  border-radius: var(--radius-card);\n  box-shadow: var(--shadow-card);\n  padding: var(--space-6);\n}\n.ds-card--flat {\n  box-shadow: none;\n  border: 1px solid var(--border-default);\n}\n\n/* Button recipes */\n.ds-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-2);\n  padding: 8px 16px;\n  border-radius: var(--radius-button);\n  font-weight: 500;\n  font-size: var(--type-body-sm);\n  transition: all 150ms ease;\n  cursor: pointer;\n  border: 0;\n}\n.ds-btn--primary   { background: var(--color-primary); color: #fff; box-shadow: var(--shadow-button); }\n.ds-btn--primary:hover { background: var(--color-primary-hover); }\n.ds-btn--secondary { background: #fff; color: var(--fg-2); border: 1px solid var(--border-strong); }\n.ds-btn--secondary:hover { background: var(--gray-50); }\n.ds-btn--ghost     { background: transparent; color: var(--fg-3); }\n.ds-btn--ghost:hover { background: var(--gray-100); }\n.ds-btn--danger    { background: #DC2626; color: #fff; }\n.ds-btn--success   { background: var(--color-success); color: #fff; }\n\n/* Badge recipe */\n.ds-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  border-radius: var(--radius-pill);\n  font-weight: 500;\n  font-size: var(--type-label);\n  padding: 2px 10px;\n}\n.ds-badge__dot { width: 6px; height: 6px; border-radius: 50%; }\n\n/* Focus ring \u2014 matches globals.css */\n.ds-focus:focus-visible {\n  outline: 2px solid var(--color-primary);\n  outline-offset: 2px;\n}\n<\u002Fstyle>\n\n<style>\n  /* cyrillic-ext */\n@font-face {\n  font-family: 'Caveat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cc4e8d2e-aa42-4f0b-ae6e-32f3c2888fc1\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Caveat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8d340dbf-38fb-4e02-b963-a8240ca27d27\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Caveat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"96302c94-54da-4bb9-901d-e58a7da3f76f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Caveat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"37577778-db65-43f4-a55d-5d2341ade8bf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n  /* === Toss-flavored token overrides on top of colors_and_type.css === */\n  :root {\n    /* Toss surface tone: page sits on a light grey, cards are pure white */\n    --toss-page-bg: #F2F4F6;\n    --toss-card-bg: #FFFFFF;\n    --toss-inner-bg: #F7F8FA;       /* nested surface inside cards */\n    --toss-divider: #EBEEF2;        /* very light divider */\n    --toss-strong-text: #191F28;    /* Toss black */\n    --toss-medium-text: #4E5968;\n    --toss-weak-text:   #8B95A1;\n    --toss-faint-text:  #B0B8C1;\n\n    /* Soft, two-step elevation \u2014 very Toss */\n    --toss-shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04), 0 4px 16px -8px rgba(17, 24, 39, 0.06);\n    --toss-shadow-md: 0 2px 4px rgba(17, 24, 39, 0.04), 0 12px 32px -12px rgba(17, 24, 39, 0.10);\n    --toss-shadow-lg: 0 8px 16px rgba(17, 24, 39, 0.04), 0 24px 48px -16px rgba(17, 24, 39, 0.14);\n\n    /* Larger radii \u2014 Toss leans 16-20px on big surfaces */\n    --toss-radius-card: 20px;\n    --toss-radius-card-sm: 16px;\n    --toss-radius-inner: 12px;\n    --toss-radius-pill: 10px;\n  }\n\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;\n    background: var(--toss-page-bg);\n    color: var(--toss-strong-text);\n    font-size: 15px;\n    letter-spacing: -0.018em;\n    -webkit-font-smoothing: antialiased;\n  }\n  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }\n  input, select { font-family: inherit; font-size: inherit; }\n  a { color: var(--color-primary); text-decoration: none; }\n  a:hover { text-decoration: underline; }\n\n  /* ---------- APP SHELL ---------- */\n  .app { min-height: 100vh; display: flex; flex-direction: column; }\n\n  /* Top nav \u2014 matches app TopNav (lib/theme.ts navStyles): slate-900 dark bar */\n  .topnav {\n    height: 56px;\n    background: #0F172A; /* tailwind slate-900 */\n    display: flex;\n    align-items: center;\n    padding: 0 24px;\n    color: #FFFFFF;\n    gap: 32px;\n    border-bottom: none;\n  }\n  .topnav .brand {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 8px 12px;\n    border-radius: 8px;\n    background: linear-gradient(135deg, #0064FF 0%, #4F46E5 100%);\n    font-weight: 700;\n    font-size: 15px;\n    color: #FFFFFF;\n    letter-spacing: -0.01em;\n    white-space: nowrap;\n  }\n  .topnav .brand .dot {\n    width: 6px; height: 6px; border-radius: 50%; background: #FFFFFF;\n  }\n  .topnav .brand small { font-weight: 400; opacity: 0.85; font-size: 12px; margin-left: 4px; color: #FFFFFF; }\n  .topnav nav { display: flex; gap: 4px; }\n  .topnav nav a {\n    color: #CBD5E1; /* slate-300 */\n    padding: 8px 16px;\n    border-radius: 6px;\n    font-size: 13.5px;\n    font-weight: 500;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: background 0.15s, color 0.15s, transform 0.08s;\n    white-space: nowrap;\n    letter-spacing: -0.01em;\n  }\n  .topnav nav a:hover { background: rgba(255,255,255,0.05); color: #FFFFFF; text-decoration: none; }\n  .topnav nav a.active { color: #FFFFFF; background: rgba(255,255,255,0.10); }\n  .topnav nav a:active { transform: scale(0.96); }\n\n  .topnav .spacer { flex: 1; }\n  .topnav .user {\n    display: flex; align-items: center; gap: 10px;\n    font-size: 13px; color: #CBD5E1; /* slate-300 */\n    font-weight: 500;\n  }\n  .topnav .user .avatar {\n    width: 32px; height: 32px; border-radius: 50%;\n    background: #475569; /* slate-600 */\n    display: grid; place-items: center;\n    font-weight: 600; color: #FFFFFF; font-size: 12px;\n    border: none;\n  }\n\n  /* ---------- BODY ---------- */\n  .body { flex: 1; display: flex; }\n\n  /* Sidebar \u2014 service list */\n  .sidebar {\n    width: 296px;\n    background: var(--toss-card-bg);\n    border-right: 1px solid var(--toss-divider);\n    display: flex; flex-direction: column;\n  }\n  .sidebar .sb-header { padding: 28px 20px 16px; display: flex; flex-direction: column; gap: 14px; }\n  .sidebar .sb-title-row { display: flex; align-items: baseline; justify-content: space-between; }\n  .sidebar .sb-title { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: -0.035em; color: var(--toss-strong-text); }\n  .sidebar .sb-count { font-size: 13px; font-weight: 700; color: var(--toss-weak-text); letter-spacing: -0.01em; }\n  .sidebar .sb-search {\n    width: 100%;\n    height: 42px;\n    border: 0;\n    background: var(--toss-inner-bg);\n    border-radius: 12px;\n    padding: 0 40px 0 14px;\n    font-size: 14px;\n    color: var(--toss-strong-text);\n    outline: none;\n    transition: background 0.15s;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%239CA3AF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/><\u002Fsvg>\");\n    background-repeat: no-repeat;\n    background-position: right 12px center;\n  }\n  .sidebar .sb-search:focus { background: #fff; box-shadow: 0 0 0 3px rgba(0,100,255,0.10); }\n\n  .sidebar .sb-list { flex: 1; overflow: auto; padding: 4px 12px 16px; }\n  .svc-item {\n    display: flex; flex-direction: column; gap: 4px;\n    padding: 14px 16px;\n    border-radius: 14px;\n    cursor: pointer;\n    margin-bottom: 2px;\n    position: relative;\n    transition: background 0.15s, transform 0.08s;\n  }\n  .svc-item:hover { background: var(--toss-inner-bg); }\n  .svc-item:active { transform: scale(0.98); }\n  .svc-item.active {\n    background: #EBF2FF;\n  }\n  .svc-item.active::before { content: none; }\n  .svc-item .svc-name { font-size: 15px; font-weight: 700; color: var(--toss-strong-text); letter-spacing: -0.025em; line-height: 1.3; }\n  .svc-item .svc-code { font-size: 12.5px; color: var(--toss-weak-text); font-weight: 600; letter-spacing: 0; font-family: 'Geist Mono', monospace; }\n  .svc-item.active .svc-name { color: var(--color-primary); }\n  .svc-item.active .svc-code { color: var(--color-primary); opacity: 0.7; }\n  .svc-item .svc-badge {\n    position: absolute; right: 12px; top: 12px;\n    font-size: 10px; font-weight: 600; color: var(--color-error);\n    background: #FEE2E2; padding: 2px 6px; border-radius: 4px;\n  }\n\n  .sidebar .sb-pager {\n    padding: 14px 20px;\n    border-top: 1px solid var(--toss-divider);\n    display: flex; justify-content: center; gap: 8px;\n    font-size: 13px; color: var(--toss-weak-text);\n  }\n  .sb-pager a { color: var(--toss-weak-text); font-weight: 500; }\n  .sb-pager a.current { color: var(--color-primary); font-weight: 700; }\n\n  .sidebar .sb-footer {\n    border-top: 1px solid var(--toss-divider);\n    padding: 14px 20px;\n    display: flex; flex-direction: column; gap: 8px;\n  }\n  .sb-footer a {\n    color: var(--toss-medium-text); font-size: 14px; font-weight: 500;\n    display: flex; align-items: center; gap: 10px;\n    padding: 8px 0;\n  }\n  .sb-footer a:hover { color: var(--color-primary); text-decoration: none; }\n\n  /* Main column */\n  .main {\n    flex: 1;\n    padding: 32px 40px 80px;\n    overflow: auto;\n  }\n\n  /* Breadcrumb */\n  .breadcrumb {\n    font-size: 13px;\n    color: var(--toss-weak-text);\n    margin-bottom: 16px;\n    font-weight: 500;\n  }\n  .breadcrumb .sep { margin: 0 8px; color: var(--toss-faint-text); }\n  .breadcrumb .current { color: var(--toss-medium-text); }\n\n  /* Page header */\n  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 16px; }\n  .page-title { font-size: 30px; font-weight: 800; margin: 0; letter-spacing: -0.03em; line-height: 1.2; color: var(--toss-strong-text); }\n  .page-meta { display: flex; flex-wrap: wrap; gap: 36px; margin: 20px 0 28px; color: var(--toss-medium-text); font-size: 14px; }\n  .page-meta .kv { display: flex; flex-direction: column; gap: 4px; }\n  .page-meta .k { font-size: 13px; color: var(--toss-weak-text); text-transform: none; letter-spacing: 0; font-weight: 500; white-space: nowrap; }\n  .page-meta .v { color: var(--toss-strong-text); font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }\n\n  /* Section card \u2014 Toss style: borderless, soft elevation, generous radius */\n  .card {\n    background: var(--toss-card-bg);\n    border: 0;\n    border-radius: var(--toss-radius-card);\n    box-shadow: var(--toss-shadow-sm);\n  }\n  .card-header {\n    display: flex; justify-content: space-between; align-items: flex-start;\n    padding: 28px 28px 12px;\n    border-bottom: 0;\n    gap: 16px;\n  }\n  .card-header > div:first-child { display: flex; flex-direction: column; gap: 6px; min-width: 0; }\n  .card-header .eyebrow {\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 12px; font-weight: 700;\n    color: var(--color-primary);\n    letter-spacing: 0.02em;\n  }\n  .card-header h2 {\n    margin: 0; font-size: 26px; font-weight: 800;\n    letter-spacing: -0.045em;\n    line-height: 1.2;\n    color: var(--toss-strong-text);\n    white-space: nowrap;\n  }\n  .card-header h2 .accent { color: var(--color-primary); }\n  .card-header h2 .h2-icon {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 24px; height: 24px;\n    margin-right: 4px;\n    color: var(--color-primary);\n    vertical-align: -5px;\n  }\n  .card-header p {\n    font-size: 13.5px !important;\n    color: var(--toss-weak-text) !important;\n    line-height: 1.55;\n    font-weight: 500;\n  }\n  .card-body { padding: 16px 28px 28px; }\n\n  /* Primary button \u2014 Toss buttons: bigger radius, bolder weight, scale press */\n  .btn {\n    display: inline-flex; align-items: center; gap: 6px;\n    height: 40px; padding: 0 18px;\n    border-radius: 12px;\n    font-size: 14px; font-weight: 700;\n    letter-spacing: -0.01em;\n    transition: background 0.15s, border-color 0.15s, transform 0.08s, box-shadow 0.15s;\n    white-space: nowrap;\n  }\n  .btn:active { transform: scale(0.97); }\n  .btn.primary { background: var(--color-primary); color: #fff; }\n  .btn.primary:hover { background: var(--color-primary-hover); }\n  .btn.ghost { color: var(--color-primary); font-weight: 700; background: transparent; }\n  .btn.ghost:hover { background: var(--color-primary-50); }\n  .btn.outline { border: 0; color: var(--toss-strong-text); background: var(--toss-inner-bg); }\n  .btn.outline:hover { background: #ECEEF1; }\n  .btn.secondary { background: var(--toss-strong-text); color: #fff; }\n  .btn.secondary:hover { background: #0F1419; }\n  .btn.warn-outline { border: 0; color: #92400E; background: #FEF3C7; font-weight: 600; }\n  .btn.warn-outline:hover { background: #FDE68A; }\n\n  /* Tooltip (header column hint) */\n  .tooltip-trigger {\n    position: relative;\n    display: inline-flex; align-items: center;\n    color: var(--fg-4);\n    cursor: help;\n    line-height: 0;\n  }\n  .tooltip-trigger:hover, .tooltip-trigger:focus { color: var(--color-primary); outline: none; }\n  .tooltip-content {\n    position: absolute;\n    top: calc(100% + 8px);\n    right: 0;\n    z-index: 50;\n    width: 2 lative; cursor: pointer; }\n  .step .circle {\n    width: 44px; height: 44px; border-radius: 50%;\n    margin: 0 auto 12px;\n    display: grid; place-items: center;\n    font-size: 14px; font-weight: 700;\n    background: var(--toss-inner-bg);\n    border: 0;\n    color: var(--toss-weak-text);\n    position: relative;\n    z-index: 2;\n    transition: transform 0.08s, box-shadow 0.18s;\n    letter-spacing: -0.01em;\n  }\n  .step:hover .circle { background: #ECEEF1; color: var(--toss-strong-text); }\n  .step:active .circle { transform: scale(0.94); }\n  .step.done .circle { background: var(--color-primary); border: 0; color: #fff; }\n  .step.done:hover .circle { background: var(--color-primary-hover); color: #fff; }\n  .step.current .circle { background: var(--color-primary); border: 0; color: #fff; box-shadow: 0 0 0 6px rgba(0,100,255,0.12); }\n  .step.current:hover .circle { background: var(--color-primary); color: #fff; }\n  .step .label { font-size: 13px; color: var(--toss-weak-text); line-height: 1.4; padding: 0 8px; font-weight: 500; }\n  .step.done .label, .step.current .label { color: var(--toss-strong-text); font-weight: 600; }\n  .step.current .label { color: var(--color-primary); font-weight: 700; }\n  .step:not(:last-child)::after {\n    content: ''; position: absolute;\n    top: 21px; left: 50%; right: -50%;\n    height: 2px; background: var(--toss-divider);\n    z-index: 1;\n  }\n  .step.done::after { background: var(--color-primary); }\n\n  /* ---------- scan states ---------- */\n  .scan-state {\n    padding: 60px 20px; text-align: center;\n  }\n  .scan-state h3 { font-size: 16px; font-weight: 600; margin: 0 0 6px; color: var(--fg-1); }\n  .scan-state p { font-size: 13px; color: var(--fg-3); margin: 0; }\n  .scan-state .illus {\n    width: 64px; height: 64px;\n    margin: 0 auto 20px;\n    border-radius: 16px;\n    background: var(--bg-muted);\n    display: grid; place-items: center;\n    color: var(--fg-4);\n  }\n  .scan-progress {\n    max-width: 520px; margin: 24px auto 0;\n    background: #F1F5F9;\n    border-radius: 999px;\n    height: 10px;\n    overflow: hidden;\n    position: relative;\n  }\n  .scan-progress .bar {\n    height: 100%;\n    background: linear-gradient(90deg, var(--color-primary) 0%, #4F46E5 100%);\n    border-radius: 999px;\n    transition: width 0.4s;\n  }\n  .scan-progress-label {\n    margin-top: 8px;\n    font-size: 12px;\n    color: var(--fg-2);\n    font-variant-numeric: tabular-nums;\n    font-family: 'Geist Mono', monospace;\n  }\n\n  .error-banner {\n    margin: 0 auto 20px; max-width: 480px;\n    background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px;\n    padding: 14px 18px;\n    display: flex; align-items: flex-start; gap: 12px;\n    text-align: left;\n  }\n  .error-banner .icon { color: var(--color-error); margin-top: 2px; flex-shrink: 0; }\n  .error-banner h4 { margin: 0 0 4px; font-size: 13.5px; color: var(--color-error-dark); font-weight: 600; }\n  .error-banner p { margin: 0; font-size: 12.5px; color: #7F1D1D; }\n\n  /* Screen switcher (prototype nav) \u2014 Toss-style: white pill with subtle shadow */\n  .proto-nav {\n    position: fixed;\n    bottom: 20px;\n    left: 50%;\n    transform: translateX(-50%);\n    background: var(--toss-strong-text);\n    border-radius: 100px;\n    padding: 7px;\n    display: flex; gap: 4px;\n    z-index: 200;\n    box-shadow: 0 8px 32px rgba(17,24,39,0.20), 0 2px 8px rgba(17,24,39,0.10);\n    max-width: calc(100vw - 32px);\n    overflow-x: auto;\n    scrollbar-width: none;\n  }\n  .proto-nav::-webkit-scrollbar { display: none; }\n  .proto-nav button {\n    color: rgba(255,255,255,0.6);\n    font-size: 13px; font-weight: 600;\n    padding: 9px 16px;\n    border-radius: 100px;\n    transition: background 0.15s, color 0.15s, transform 0.08s;\n    white-space: nowrap;\n    letter-spacing: -0.01em;\n  }\n  .proto-nav button:hover { color: #fff; }\n  .proto-nav button:active { transform: scale(0.95); }\n  .proto-nav button.active { background: var(--color-primary); color: #fff; }\n\n  /* hidden helpers */\n  .hidden { display: none !important; }\n\n  /* ============ Guide content (prose inside standard card) ============ */\n  /* Guide variant: warm guide tone on the card shell */\n  .card.guide-variant {\n    background: #FFFDF5;\n    border-color: #F3E8B8;\n    box-shadow: 0 1px 2px rgba(140,110,0,0.04), 0 6px 18px -10px rgba(140,110,0,0.12);\n  }\n  .card.guide-variant > .card-header {\n    background: linear-gradient(180deg, #FFF8E1 0%, #FFFCEE 100%);\n    border-bottom: 1px solid #F3E8B8;\n  }\n  .card.guide-variant > .card-header h2 {\n    display: inline-flex;\n    align-items: center;\n    gap: 9px;\n    color: #78350F;\n  }\n  .guide-head-icon {\n    width: 26px; height: 26px;\n    background: #F59E0B;\n    color: #fff;\n    border-radius: 50%;\n    display: inline-grid; place-items: center;\n    box-shadow: 0 2px 5px -1px rgba(245,158,11,0.45);\n    flex-shrink: 0;\n  }\n\n  .guide-content {\n    font-size: 13px;\n    color: var(--fg-2);\n    line-height: 1.72;\n  }\n  .guide-content h1,\n  .guide-content h2,\n  .guide-content h3,\n  .guide-content h4 {\n    color: var(--fg-1);\n    font-weight: 700;\n    margin: 14px 0 6px;\n  }\n  .guide-content h1:first-child,\n  .guide-content h2:first-child,\n  .guide-content h3:first-child,\n  .guide-content h4:first-child { margin-top: 0; }\n  .guide-content h3 { font-size: 14px; }\n  .guide-content h4 { font-size: 13.5px; }\n  .guide-content p { margin: 0 0 8px; }\n  .guide-content ul, .guide-content ol {\n    margin: 0 0 10px; padding-left: 20px;\n  }\n  .guide-content ul li,\n  .guide-content ol li { margin-bottom: 3px; }\n  .guide-content ul li::marker { color: var(--color-primary); }\n  .guide-content a { color: var(--color-primary); font-weight: 500; }\n  .guide-content a:hover { text-decoration: underline; }\n  .guide-content strong { color: var(--fg-1); font-weight: 600; }\n  .guide-content code {\n    font-family: 'Geist Mono', monospace;\n    font-size: 12px;\n    background: #F1F5F9;\n    padding: 1.5px 6px;\n    border-radius: 4px;\n    color: #0F172A;\n  }\n\n\n  /* step clickable */\n  .step:hover .circle { /* override above for any hover sticky issue */ }\n\n  /* scan \uc0c1\ud0dc sub-table \u2014 nested elevated panel inside a card (boundary + depth) */\n  .db-list-table {\n    margin-top: 12px;\n    border: 1px solid var(--toss-divider);\n    border-radius: 12px;\n    overflow: hidden;\n    background: var(--toss-card-bg);\n    box-shadow:\n      0 1px 2px rgba(17, 24, 39, 0.04),\n      0 6px 16px -8px rgba(17, 24, 39, 0.08),\n      inset 0 1px 0 rgba(255, 255, 255, 0.6);\n  }\n  .db-list-table table { width: 100%; border-collapse: collapse; font-size: 13px; }\n  .db-list-table thead { background: #FAFBFC; }\n  .db-list-table th { text-align: left; padding: 14px 16px; background: transparent; font-size: 13px; font-weight: 700; color: var(--toss-medium-text); text-transform: none; letter-spacing: -0.01em; border-bottom: 1px solid var(--toss-divider); }\n  .db-list-table td { padding: 14px 16px; border-top: 1px solid var(--toss-divider); }\n  .db-list-table tbody tr:first-child td { border-top: 0; }\n  .db-list-table tbody tr { transition: background 0.12s; }\n  .db-list-table tbody tr:hover td { background: var(--toss-inner-bg); }\n  .db-list-table tbody tr.non-target td { background: #F2F4F6; color: var(--toss-weak-text); }\n  .db-list-table tbody tr.non-target:hover td { background: #E5E8EB; }\n  .db-list-table tbody tr.non-target input[type=\"checkbox\"] { cursor: not-allowed; opacity: 0.5; }\n\n  .mgmt-group {\n    display: inline-flex; align-items: stretch;\n    border-radius: 6px;\n    overflow: visible;\n    position: relative;\n  }\n  .mgmt-btn {\n    background: var(--color-primary); color: #fff;\n    padding: 7px 14px;\n    border-radius: 6px 0 0 6px;\n    font-size: 12.5px; font-weight: 600;\n    display: inline-flex; align-items: center; gap: 5px;\n    border-right: 1px solid rgba(255,255,255,0.22);\n    box-shadow: 0 1px 2px rgba(0,100,255,0.2);\n    transition: background 0.12s;\n  }\n  .mgmt-btn:hover { background: var(--color-primary-hover); }\n  .mgmt-more {\n    background: var(--color-primary); color: #fff;\n    padding: 7px 8px;\n    border-radius: 0 6px 6px 0;\n    display: inline-grid; place-items: center;\n    position: relative;\n  }\n  .mgmt-more:hover { background: #FECACA; }\n  .mgmt-menu {\n    position: absolute; top: calc(100% + 4px); right: 0;\n    background: #fff;\n    border: 1px solid var(--border-default);\n    border-radius: 8px;\n    box-shadow: 0 8px 24px rgba(15,23,42,0.12);\n    padding: 4px;\n    min-width: 160px;\n    z-index: 50;\n    display: none;\n    text-align: left;\n  }\n  .mgmt-more.open .mgmt-menu { display: block; }\n  .mgmt-menu a {\n    display: block;\n    padding: 8px 12px;\n    font-size: 12.5px;\n    color: var(--fg-1);\n    border-radius: 5px;\n    cursor: pointer;\n    font-weight: 500;\n  }\n  .mgmt-menu a:hover { background: var(--bg-muted); text-decoration: none; }\n  .mgmt-menu a.danger { color: var(--color-error-dark); }\n  .mgmt-menu a.danger:hover { background: #FEE2E2; }\n  .menu-divider { height: 1px; background: var(--border-light); margin: 4px 0; }\n\n  /* ---------- Segmented toggle (Provider / View) \u2014 Toss style ---------- */\n  .seg-toggle {\n    display: inline-flex;\n    background: var(--toss-inner-bg);\n    border: 0;\n    border-radius: 12px;\n    padding: 4px;\n    gap: 2px;\n  }\n  .seg-toggle .seg-btn {\n    padding: 8px 16px;\n    border-radius: 8px;\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--toss-weak-text);\n    transition: background 0.15s, color 0.15s, transform 0.08s;\n    letter-spacing: -0.01em;\n  }\n  .seg-toggle .seg-btn:hover { color: var(--toss-strong-text); }\n  .seg-toggle .seg-btn:active { transform: scale(0.96); }\n  .seg-toggle .seg-btn.active {\n    background: #fff;\n    color: var(--toss-strong-text);\n    font-weight: 700;\n    box-shadow: 0 1px 3px rgba(17,24,39,0.08), 0 1px 2px rgba(17,24,39,0.04);\n  }\n\n  /* ---------- Step-content sections ---------- */\n  .step-content { display: none; }\n  .step-content.active { display: block; }\n\n  /* Step-banner \u2014 Toss-style soft banner */\n  .step-banner {\n    display: flex; align-items: center; gap: 14px;\n    padding: 18px 22px;\n    border-radius: var(--toss-radius-inner);\n    background: var(--color-primary-50);\n    border: 0;\n    margin-bottom: 20px;\n    font-size: 14px;\n    color: var(--color-info-dark);\n    font-weight: 500;\n  }\n  .step-banner.warn { background: #FFFBEB; border: 0; color: #78350F; }\n  .step-banner.success { background: #ECFDF5; border: 0; color: #065F46; }\n  .step-banner.error { background: #FEF2F2; border: 0; color: #7F1D1D; }\n  .step-banner svg { flex-shrink: 0; }\n  .step-banner strong { font-weight: 700; }\n  .step-banner .ml-auto { margin-left: auto; display: flex; gap: 8px; }\n\n  /* Install task list (Step 4) \u2014 horizontal pipeline, Toss-style stepped cards */\n  .install-tasks {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 12px;\n    margin-bottom: 20px;\n  }\n  .install-task {\n    display: flex; flex-direction: column; align-items: flex-start; text-align: left;\n    gap: 12px;\n    padding: 24px 22px;\n    border: 0;\n    border-radius: var(--toss-radius-inner);\n    background: var(--toss-inner-bg);\n    position: relative;\n    transition: background 0.15s, transform 0.08s, box-shadow 0.18s;\n  }\n  .install-task:first-child { border-radius: var(--toss-radius-inner); }\n  .install-task:last-child { border-radius: var(--toss-radius-inner); }\n  /* connector chevron between cards */\n  .install-task:not(:last-child)::after {\n    content: '\u203a';\n    position: absolute;\n    top: 50%; right: -14px;\n    width: 16px;\n    height: 16px;\n    background: transparent;\n    border: 0;\n    transform: translateY(-50%);\n    color: var(--toss-faint-text);\n    font-size: 22px;\n    font-weight: 700;\n    line-height: 1;\n    z-index: 2;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .install-task .num {\n    width: 32px; height: 32px; border-radius: 50%;\n    display: grid; place-items: center;\n    font-size: 14px; font-weight: 800;\n    background: #fff;\n    color: var(--toss-weak-text);\n    flex-shrink: 0;\n    box-shadow: 0 1px 2px rgba(17,24,39,0.04);\n  }\n  .install-task.done { background: #ECFDF5; }\n  .install-task.done .num { background: var(--color-success); color: #fff; }\n  .install-task.running { background: #EFF6FF; box-shadow: inset 0 0 0 1.5px rgba(0,100,255,0.12); }\n  .install-task.running .num { background: var(--color-primary); color: #fff; box-shadow: 0 0 0 4px rgba(0, 100, 255, 0.15); }\n  .install-task .body { width: 100%; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }\n  .install-task .title { font-size: 16px; font-weight: 700; color: var(--toss-strong-text); line-height: 1.35; letter-spacing: -0.02em; }\n  .install-task .sub { font-size: 13px; color: var(--toss-medium-text); line-height: 1.55; font-weight: 500; }\n  .install-task .status-pill {\n    font-size: 12px; font-weight: 700;\n    padding: 5px 12px;\n    border-radius: 999px;\n    background: #fff;\n    color: var(--toss-weak-text);\n    margin-top: 4px;\n    letter-spacing: -0.01em;\n  }\n  .install-task.done .status-pill { background: #fff; color: var(--color-success-dark); }\n  .install-task.running .status-pill { background: var(--color-primary); color: #fff; }\n  .install-task.failed .status-pill { background: #fff; color: #991B1B; }\n  .install-task[onclick] { cursor: pointer; }\n  .install-task[onclick]:hover { background: #fff; box-shadow: var(--toss-shadow-md); transform: translateY(-2px); }\n  .install-task[onclick]:active { transform: translateY(0) scale(0.99); }\n\n  /* Task detail modal tabs */\n  .task-tabs {\n    display: inline-flex;\n    gap: 4px;\ ont-size: 17px;\n    font-weight: 700;\n  }\n\n  .logical-modal .modal-body { padding: 14px 26px 0; }\n  .logical-twin {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 14px;\n    margin-bottom: 14px;\n  }\n  /* lg panel \u2014 Toss style: borderless w/ tinted bg */\n  .lg-panel {\n    border: 0;\n    border-radius: var(--toss-radius-inner);\n    background: var(--toss-inner-bg);\n    display: flex; flex-direction: column;\n    min-height: 420px;\n    max-height: 460px;\n    overflow: hidden;\n  }\n  .lg-panel-head {\n    padding: 14px 16px 12px;\n    border-bottom: 1px solid var(--toss-divider);\n    display: flex; flex-direction: column; gap: 10px;\n    background: transparent;\n  }\n  .lg-panel-title {\n    display: flex; align-items: center; gap: 8px;\n    font-size: 13px; font-weight: 700; color: var(--fg-1);\n  }\n  .lg-panel-title .count {\n    font-size: 11px; font-weight: 700;\n    background: var(--bg-tinted); color: var(--fg-2);\n    padding: 1px 7px; border-radius: 999px;\n    font-variant-numeric: tabular-nums;\n  }\n  .lg-panel-title.deny .count { background: #FEE2E2; color: #991B1B; }\n  .lg-panel-search { position: relative; }\n  .lg-panel-search svg {\n    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);\n    color: var(--fg-4); pointer-events: none;\n  }\n  .lg-panel-search input {\n    width: 100%; height: 32px;\n    border: 1px solid var(--border-default); border-radius: 8px;\n    padding: 0 12px 0 30px;\n    font-size: 12.5px; outline: none;\n    background: #fff;\n  }\n  .lg-panel-search input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(0,100,255,0.08); }\n\n  .lg-table-scroll { flex: 1; overflow: auto; }\n  .lg-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }\n  .lg-table thead th {\n    position: sticky; top: 0; z-index: 1;\n    text-align: left;\n    font-size: 11px; font-weight: 600;\n    color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.0  0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/><\u002Fsvg>';\n      statusEl.innerHTML = '<span>\uc2e4\ud328<\u002Fspan><button class=\"retry-btn\" onclick=\"retryRegistration(this)\">\uc7ac\uc2dc\ub3c4<\u002Fbutton>';\n    }\n  }\n\n  let _regState = null;\n  function _runRegistration(items, allowFailure) {\n    _regState = { items, allowFailure, idx: 0, success: 0, failed: 0, failedIdx: allowFailure ? Math.floor(Math.random() * items.length) : -1 };\n    _processNext();\n  }\n  function _processNext() {\n    if (!_regState) return;\n    const s = _regState;\n    if (s.idx >= s.items.length) {\n      _finishRegistration();\n      return;\n    }\n    const item = s.items[s.idx];\n    const rowEl = document.querySelector(`.progress-row[data-id=\"${item.id}\"]`);\n    if (!rowEl) { s.idx++; _processNext(); return; }\n    _setRowStatus(rowEl, 'calling');\n\n    const dur = 700 + Math.random() * 900;\n    setTimeout(() => {\n      const willFail = (s.idx === s.failedIdx);\n      if (willFail) {\n        _setRowStatus(rowEl, 'failed');\n        s.failed++;\n      } else {\n        _setRowStatus(rowEl, 'success');\n        s.success++;\n      }\n      _updateProgressMeter();\n      s.idx++;\n      _processNext();\n    }, dur);\n  }\n  function _updateProgressMeter() {\n    const s = _regState;\n    if (!s) return;\n    const completed = s.success + s.failed;\n    const pctOk = s.success / s.items.length * 100;\n    const pctTotal = completed / s.items.length * 100;\n    document.getElementById('pbDone').textContent = completed;\n    const fill = document.getElementById('progressBarFill');\n    fill.style.width = pctTotal + '%';\n    if (s.failed > 0) {\n      fill.style.setProperty('--ok-pct', pctOk + '%');\n      fill.classList.add('error');\n    }\n  }\n  function _finishRegistration() {\n    const s = _regStat xxxxxxxxxx' }, f2: { label: 'Subscription ID', ph: 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx' } },\n    'gcp':        { f1: { label: 'Project ID', ph: 'my-gcp-project-id' }, f2: null },\n    'idc-global': { f1: null, f2: null },\n    'idc-china':  { f1: null, f2: null },\n    'other-global': { f1: null, f2: null },\n    'other-china':  { f1: null, f2: null }\n  };\n  function morphProviderFields(provider) {\n    const cfg = PROVIDER_FIELDS[provider] || PROVIDER_FIELDS['aws-global'];\n    const f1 = document.getElementById('field1Wrap');\n    const f2 = document.getElementById('field2Wrap');\n    const installWrap = document.getElementById('installModeWrap');\n    const isAws = provider === 'aws-global' || provider === 'aws-china';\n    const isIdcOrOther = provider && (provider.startsWith('idc') || provider.startsWith('other'));\n\n    // Install mode: AWS only\n    if (installWrap) installWrap.style.display = isAws ? '' : 'none';\n\n    // For IDC/Other: hide both identifier fields entirely\n    if (isIdcOrOther) {\n      f1.style.display = 'none';\n      f2.style.display = 'none';\n      document.getElementById('infraPayer').value = '';\n      document.getElementById('infraLinked').value = '';\n    } else {\n      f1.style.display = '';\n      document.getElementById('field1Label').textContent = cfg.f1.label;\n      document.getElementById('infraPayer').setAttribute('placeholder', cfg.f1.ph);\n      if (cfg.f2) {\n        f2.style.display = '';\n        document.getElementById('field2Label').textContent = cfg.f2.label;\n        document.getElementById('infraLinked').setAttribute('placeholder', cfg.f2.ph);\n      } else {\n        f2.style.display = 'none';\n        document.getElementById('infraLinked').value = '';\n      }\n      [f1, f2].forEach(el => { el.classList.remove('morph'); void el.offsetWidth; el.classList.add('morph'); });\n    }\n\n    // Description: visible for all; for Other it represents the single shared description\n    const descWrap = document.ge l>`\n    },\n    2: {\n      name: '\uc5f0\ub3d9 \ub300\uc0c1 \uc2b9\uc778 \ub300\uae30',\n      html: `<h4>\uc2b9\uc778\uc790\uc758 \uac80\ud1a0\ub97c \uae30\ub2e4\ub9ac\uace0 \uc788\uc5b4\uc694<\u002Fh4>\n<p>\uc694\uccad\ud558\uc2e0 DB \uc5f0\ub3d9 \ub300\uc0c1 \ubaa9\ub85d\uc740 \ubcf4\uc548\ud300 \ubc0f \ub370\uc774\ud130 \uad00\ub9ac\uc790\uc758 \uac80\ud1a0\ub97c \ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc2b9\uc778 \uacb0\uacfc\ub294 \uba54\uc77c\uacfc Slack\uc73c\ub85c \uc548\ub0b4\ub429\ub2c8\ub2e4.<\u002Fp>\n<ul>\n  <li>\ud3c9\uade0 1\uc601\uc5c5\uc77c \uc774\ub0b4 \uac80\ud1a0\uac00 \uc644\ub8cc\ub429\ub2c8\ub2e4.<\u002Fli>\n  <li>3\uc601\uc5c5\uc77c \uc774\uc0c1 \uc9c0\uc5f0 \uc2dc <a href=\"#\">\ub2f4\ub2f9\uc790\uc5d0\uac8c \ubb38\uc758<\u002Fa>\ud574 \uc8fc\uc138\uc694.<\u002Fli>\n<\u002Ful>`\n    },\n    3: {\n      name: '\uc5f0\ub3d9 \ub300\uc0c1 \ubc18\uc601\uc911',\n      html: `<h4>\uc2b9\uc778\ub41c DB\ub97c \uc2dc\uc2a4\ud15c\uc5d0 \ubc18\uc601\ud558\uace0 \uc788\uc5b4\uc694<\u002Fh4>\n<p>\uc2b9\uc778\ub41c DB\uc5d0 \ub300\ud55c \uba54\ud0c0 \uc815\ubcf4\uac00 PII Agent \uad00\ub9ac \uc2dc\uc2a4\ud15c\uc5d0 \ub3d9\uae30\ud654\ub418\ub294 \uc911\uc785\ub2c8\ub2e4. \uc774 \uacfc\uc815\uc740 \uc790\ub3d9\uc73c\ub85c \uc9c4\ud589\ub418\uba70 \ubcc4\ub3c4 \uc870\uce58\uac00 \ud544\uc694\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4.<\u002Fp>\n<ul>\n  <li>\ubc18\uc601 \uc644\ub8cc\uae4c\uc9c0 \ucd5c\ub300 10\ubd84\uac00\ub7c9 \uc18c\uc694\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4.<\u002Fli>\n  <li>\uc774 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc2e4\uc81c \ub370\uc774\ud130\uac00 \uc804\uc1a1\ub418\uc9c0 \uc54a\uc73c\uba70, \uba54\ud0c0\ub370\uc774\ud130\ub9cc \ub3d9\uae30\ud654\ub429\ub2c8\ub2e4.<\u002Fli>\n<\u002Ful>`\n    },\n    4: {\n      name: 'Agent \uc124\uce58',\n      html: `<h4>PII Agent\ub97c \uc124\uce58\ud574 \uc8fc\uc138\uc694<\u002Fh4>\n<p>\ubc1c\uae09\ub41c Credential\uacfc \uc124\uce58 \uc2a4\ud06c\ub9bd\ud2b8\ub97c \uc0ac\uc6a9\ud574 \ub300\uc0c1 \uc778\ud504\ub77c\uc5d0 PII Agent\ub97c \ubc30\ud3ec\ud569\ub2c8\ub2e4. Agent \uc124\uce58 \ud6c4 \uc790\ub3d9\uc73c\ub85c \ub2e4\uc74c \ub2e8\uacc4\ub85c \ub118\uc5b4\uac11\ub2c8\ub2e4.<\u002Fp>\n<ul>\n  <li>Credential\uc740 <a href=\"#\">Credentials \uba54\ub274<\u002Fa>\uc5d0\uc11c \ud655\uc778\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4.<\u002Fli>\n  <li>Docker / Helm / Binary \uc124\uce58 \ubc29\uc2dd\uc740 <a href=\"#\">\uc124\uce58 \uac00\uc774\ub4dc<\u002Fa>\ub97c \ucc38\uace0\ud574 \uc8fc\uc138\uc694.<\u002Fli>\n  <li>Agent\ub294 \uc124\uce58 \ud658\uacbd\uc758 \ucd5c\uc18c \uc0ac\uc591(2 vCPU / 4GB RAM) \uc774\uc0c1\uc744 \uad8c\uc7a5\ud569\ub2c8\ub2e4.<\u002Fli>\n<\u002Ful>`\n    },\n    5: {\n      name: '\uc5f0\uacb0 \ud14c\uc2a4\ud2b8 (N-IRP \uc5f0\ub3d9)',\n      html: `<h4>Agent\uc640 N-IRP \uac04 \ud1b5\uc2e0\uc744 \ud655\uc778\ud558\uace0 \uc788\uc5b4\uc694<\u002Fh4>\n<p>\uc124\uce58\ub41c Agent\uac00 N-IRP(\uac1c\uc778\uc815\ubcf4 \ub9ac\uc2a4\ud06c \ud50c\ub7ab\ud3fc)\uc640 \uc815\uc0c1\uc801\uc73c\ub85c \ud1b5\uc2e0\ud558\ub294\uc9c0 \uc790\ub3d9\uc73c\ub85c \uc810\uac80\ud569\ub2c8\ub2e4. \ub124\ud2b8\uc6cc\ud06c ACL\uacfc \ubc29\ud654\ubcbd \uc815\ucc45\uc774 \uc62c\ubc14\ub978\uc9c0 \ud655\uc778\ud574 \uc8fc\uc138\uc694.<\u002Fp>\n<ul>\n  <li>\ud14c\uc2a4\ud2b8 \uc2e4\ud328 \uc2dc \ub124\ud2b8\uc6cc\ud06c \uad6c\uac04(443, 8443 \ud3ec\ud2b8)\uc744 \uc6b0\uc120 \uc810\uac80\ud574 \uc8fc\uc138\uc694.<\u002Fli>\n  <li>\uc7ac\uc2dc\ub3c4\ub294 \ucd5c\ub300 5\ud68c\uae4c\uc9c0 \uc790\ub3d9 \uc218\ud589\ub429\ub2c8\ub2e4.<\u002Fli>\n<\u002Ful>`\n    },\n    6: {\n      name: '\uad00\ub9ac\uc790 \uc2b9\uc778 \ub300\uae30',\n      html: `<h4>\ucd5c\uc885 \uad00\ub9ac\uc790 \uc2b9\uc778\uc744 \uae30\ub2e4\ub9ac\uace0 \uc788\uc5b4\uc694<\u002Fh4>\n<p>PII Agent \uc6b4\uc601\ud300\uc758 \ucd5c\uc885 \uc2b9\uc778\uc774 \uc644\ub8cc\ub418\uba74 \ubaa8\ub2c8\ud130\ub9c1\uc774 \uc2dc\uc791\ub429\ub2c8\ub2e4. \uc2b9\uc778 \uacb0\uacfc\ub294 \uba54\uc77c\ub85c \uc804\ub2ec\ub429\ub2c8\ub2e4.<\u002Fp>\n<ul>\n  <li>\uc2b9\uc778 \uacb0\uacfc\ub97c \uae30\ub2e4\ub9ac\ub294 \ub3d9\uc548 \uc5f0\uacb0 \uc0c1\ud0dc\uac00 \uc758\uc2ec\ub418\ub294 \ud56d\ubaa9\uc740 <strong>\uc5f0\uacb0 \ud14c\uc2a4\ud2b8 \uc7ac\uc2e4\ud589<\u002Fstrong>\uc73c\ub85c \ub2e4\uc2dc \ud655\uc778\ud560 \uc218 \uc788\uc5b4\uc694.<\u002Fli>\n  <li>\uae34\uae09 \uac74\uc740 <a href=\"#\">#pii-agent-support<\u002Fa> \ucc44\ub110\ub85c \uacf5\uc720\ud574 \uc8fc\uc138\uc694.<\u002Fli>\n<\u002Ful>`\n    },\n    7: {\n      name: '\uc644\ub8cc',\n      html: `<h4>\ubaa8\ub4e0 \uc5f0\ub3d9\uc774 \uc644\ub8cc\ub418\uc5c8\uc2b5\ub2c8\ub2e4<\u002Fh4>\n<p>PII Agent\uac00 \uc815\uc0c1 \ub3d9\uc791 \uc911\uc774\uba70, \ud0d0\uc9c0 \uacb0\uacfc\ub294 PII Map \ubc0f \ub300\uc2dc\ubcf4\ub4dc\uc5d0\uc11c \ud655\uc778\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4.<\u002Fp>\n<ul>\n  <li>\ud0d0\uc9c0 \ub9ac\ud3ec\ud2b8\ub294 \ub9e4\uc77c 09:00\uc5d0 \uc790\ub3d9 \ubc1c\uc1a1\ub429\ub2c8\ub2e4.<\u002Fli>\n  <li>\uc778\ud504\ub77c \ubcc0\uacbd \ubc1c\uc0dd \uc2dc \ub2e4\uc2dc \uc774 \ud654\uba74\uc5d0\uc11c \uc7ac\uc5f0\ub3d9\uc744 \uc9c4\ud589\ud574 \uc8fc\uc138\uc694.<\u002Fli>\n<\u002Ful>`\n    }\n  };\n\n  function setStep(n) {\n    document.querySelectorAll('.stepper .step').forEach(el => {\n      const s = parseInt(el.dataset.step, 10);\n      el.classList.remove('current', 'done');\n      if (s < n) el.classList.add('done');\n      else if (s === n) el.classList.add('current');\n    });\n    // swap content sections\n    document.querySelectorAll('.step-content').forEach(el => {\n      el.classList.toggle('active', String(n) === el.dataset.stepc);\n    });\n    renderGuide(n);\n    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  // ----- Provider toggle (Azure / GCP) -----\n  function setProvider(p) {\n    document.querySelectorAll('#providerToggle .seg-btn').forEach(b => {\n      b.classList.toggle('active', b.dataset.prov === p);\n    });\n    // page meta\n    const meta = {\n      azure: { provider: 'Azure', idLabel: 'Subscription ID', idValue: '28674067-0505-4776-87f2-ec659939821e', agent: 'Azure Agent' },\n      gcp:   { provider: 'GCP',   idLabel: 'Project ID',     idValue: 'visional-w-prd-835560',         agent: 'GCP Agent'   },\n      aws:   { provider: 'AWS',   idLabel: 'Account ID',     idValue: '482915736204',                  agent: 'AWS Agent'   }\n    }[p];\n    Object.entries(meta).forEach(([k, v]) => {\n      document.querySelectorAll(`[data-meta=\"${k}\"]`).forEach(el => el.textContent = v);\n    });\n    // step 4 sub-views\n    document.querySelectorAll('[data-prov-view]').forEach(el => {\n      const isMatch = el.dataset.provView === p;\n      // preserve display:table-cell for <th>\n      if (el.tagName === 'TH' || el.tagName === 'TD') {\n        el.style.display = isMatch ? 'table-cell' : 'none';\n      } else {\n        el.style.display = isMatch ? '' : 'none';\n      }\n    });\n  }\n\n  // ----- Logical DB modal (twin-panel staging, v3 spec) -----\n  // Domain model:\n  //   discovered: array of {id, type:'db'|'schema', dbName, schemaName?}\n  //   denyList:   array of {id, type, dbName, schemaName?, reason}\n  //   stagedAdd:  Map of id \u2192 {type, dbName, schemaName?, reason}\n  //   stagedRemove: Set of denyList ids\n  //\n  // Identity for matching: type + dbName (+ schemaName for schemas)\n\n  const REASONS = ['\ud0c0 \uc2dc\uc2a4\ud15c \uc0ac\uc6a9 DB', 'Dev DB', 'Stg DB'];\n\n  // Sample dataset per resource \u2014 resourceId \u2192 {discovered, deny}\n  const LG_DATASETS = {\n    'sea-live-space-prod': {\n      discovered: [\n        { id: 'd1', type: 'db', dbName: 'live' },\n        { id: 'd2', type: 'schema', dbName: 'live', schemaName: 'public' },\n        { id: 'd3', type: 'schema', dbName: 'live', schemaName: 'analytics' },\n        { id: 'd4', type: 'db', dbName: 'prd' },\n        { id: 'd5', type: 'schema', dbName: 'prd', schemaName: 'temp' },\n        { id: 'd6', type: 'db', dbName: 'stg' },\n        { id: 'd7', type: 'db', dbName: 'dev' },\n      ],\n      deny: [\n        { id: 'b1', type: 'db', dbName: 'stg', reason: 'Stg DB' },\n        { id: 'b2', type: 'db', dbName: 'dev', reason: 'Dev DB' },\n        { id: 'b3', type: 'schema', dbName: 'prd', schemaName: 'temp', reason: '\ud0c0 \uc2dc\uc2a4\ud15c \uc0ac\uc6a9 DB' },\n      ],\n    },\n    'sea-live-space-stg': {\n      discovered: [\n        { id: 'd1', type: 'db', dbName: 'app' },\n        { id: 'd2', type: 'schema', dbName: 'app', schemaName: 'public' },\n        { id: 'd3', type: 'db', dbName: 'reporting' },\n      ],\n      deny: [\n        // exists in (B) but not in (A) \u2014 valid normal state\n        { id: 'b1', type: 'db', dbName: 'legacy_warehouse', reason: '\ud0c0 \uc2dc\uc2a4\ud15c \uc0ac\uc6a9 DB' },\n      ],\n    },\n  };\n\n  let lgState = null; // initialized on open\n  let lgOpenDbs = new Set(); // tree expansion: set of dbNames currently expanded\n\n  function lgKey(item) {\n    return item.type === 'db' ? `db:${item.dbName}` : `sch:${item.dbName}.${item.schemaName}`;\n  }\n\n  function openLogicalModal(resourceId) {\n    const ds = LG_DATASETS[resourceId] || LG_DATASETS['sea-live-space-prod'];\n    document.getElementById('lgResId').textContent = resourceId;\n    lgState = {\n      resourceId,\n      discovered: JSON.parse(JSON.stringify(ds.discovered)),\n      deny: JSON.parse(JSON.stringify(ds.deny)),\n      stagedAdd: new Map(),     // key (lgKey on discovered item) \u2192 reason\n      stagedRemove: new Set(),  // deny.id\n      reasonEdits: new Map(),   // deny.id \u2192 new reason (in-place edit)\n    };\n    // expand all DBs by default\n    lgOpenDbs = new Set();\n    ds.discovered.forEach(d => { if (d.type === 'db') lgOpenDbs.add(d.dbName); });\n    ds.deny.forEach(d => { if (d.type === 'db') lgOpenDbs.add(d.dbName); });\n    document.getElementById('lgSearchA').value = '';\n    document.getElementById('lgSearchB').value = '';\n    lgRender();\n    document.getElementById('logicalModal').classList.add('open');\n  }\n  function closeLogicalModal() {\n    document.getElementById('logicalModal').classList.remove('open');\n    lgHidePop();\n  }\n\n  // -- Compute helpers\n  function lgDenyDbNames() {\n    // DBs covered by deny (already + staged), excluding those staged for removal\n    const set = new Set();\n    lgState.deny.forEach(d => {\n      if (d.type === 'db' && !lgState.stagedRemove.has(d.id)) set.add(d.dbName);\n    });\n    // staged-add DBs from discovered\n    lgState.stagedAdd.forEach((reason, key) => {\n      if (key.startsWith('db:')) set.add(key.slice(3));\n    });\n    return set;\n  }\n  function lgIsAlreadyDeny(item) {\n    // discovered item exactly matches an existing (non-staged-remove) deny entry\n    return lgState.deny.some(d =>\n      !lgState.stagedRemove.has(d.id) &&\n      d.type === item.type &&\n      d.dbName === item.dbName &&\n      d.schemaName === item.schemaName\n    );\n  }\n  function lgIsStagedAdd(item) {\n    return lgState.stagedAdd.has(lgKey(item));\n  }\n  function lgGetReason(item) {\n    // for discovered staged-add, return its reason\n    return lgState.stagedAdd.get(lgKey(item));\n  }\n\n  // -- Search match (parent-with-matching-child stays visible)\n  function lgFilterDiscovered(q) {\n    if (!q) return lgState.discovered;\n    const ql = q.toLowerCase();\n    const matched = new Set();\n    lgState.discovered.forEach(it => {\n      const hay = (it.dbName + ' ' + (it.schemaName || '')).toLowerCase();\n      if (hay.includes(ql)) {\n        matched.add(it.id);\n        if (it.type === 'schema') {\n          // include parent\n          const parent = lgState.discovered.find(p => p.type === 'db' && p.dbName === it.dbName);\n          if (parent) matched.add(parent.id);\n        }\n      }\n    });\n    return lgState.discovered.filter(it => matched.has(it.id));\n  }\n  function lgFilterDeny(q) {\n    // build effective deny list: existing deny (minus removed handled by render flag) + staged adds\n    const effective = [];\n    lgState.deny.forEach(d => effective.push({ ...d, _origin: 'existing' }));\n    lgState.stagedAdd.forEach((reason, key) => {\n      // synthesize a deny row from the staged add\n      const item = lgState.discovered.find(it => lgKey(it) === key);\n      if (item) effective.push({ id: '__add__' + key, type: item.type, dbName: item.dbName, schemaName: item.schemaName, reason, _origin: 'staged' });\n    });\n    if (!q) return effective;\n    const ql = q.toLowerCase();\n    const matched = new Set();\n    effective.forEach(it => {\n      const hay = (it.dbName + ' ' + (it.schemaName || '')).toLowerCase();\n      if (hay.includes(ql)) {\n        matched.add(it.id);\n        if (it.type === 'schema') {\n          const parent = effective.find(p => p.type === 'db' && p.dbName === it.dbName);\n          if (parent) matched.add(parent.id);\n        }\n      }\n    });\n    return effective.filter(it => matched.has(it.id));\n  }\n\n  // -- Render --\n  function lgRender() {\n    if (!lgState) return;\n    lgRenderPanelA();\n    lgRenderPanelB();\n    lgRenderPending();\n    lgRenderSave();\n  }\n\n  function svgChev() {\n    return `<svg class=\"toggle-tri\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" width=\"10\" height=\"10\"><polyline points=\"6 9 12 15 18 9\"/><\u002Fsvg>`;\n  }\n\n  function lgRenderPanelA() {\n    const q = document.getElementById('lgSearchA').value.trim();\n    const items = lgFilterDiscovered(q);\n    const tbody = document.querySelector('#lgTableA tbody');\n    document.getElementById('lgCountA').textContent = lgState.discovered.length;\n\n    if (items.length === 0) {\n      tbody.innerHTML = `<tr><td colspan=\"3\"><div class=\"lg-empty\"><div class=\"lg-empty-icon\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap =\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><line x1=\"4.93\" y1=\"4.93\" x2=\"19.07\" y2=\"19.07\"/><\u002Fsvg>\n            \uc774\ubbf8 \uc81c\uc678 \uc801\uc6a9 \uc911\n          <\u002Fspan>`;\n        } else {\n          rowClass = 'is-parent ' + (expanded ? '' : 'collapsed');\n          action = `<button class=\"row-action add\" onclick=\"lgOpenReasonPop(event, '${lgKey(item)}')\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"/><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><\u002Fsvg>\n            \ucd94\uac00\n          <\u002Fbutton>`;\n        }\n\n        rows.push(`\n          <tr class=\"${rowClass}\" data-db=\"${escapeAttr(item.dbName)}\">\n            <td><span class=\"type-pill db\">Database<\u002Fspan><\u002Ftd>\n            <td>\n              ${hasChildren\n                ? `<span onclick=\"lgToggleDb('${escapeAttr(item.dbName)}')\" style=\"cursor:pointer;\">${svgChev()}<\u002Fspan>`\n                : `<span class=\"toggle-spacer\"><\u002Fspan>`}\n              <span class=\"name-cell\">${escapeHtml(item.dbName)}<\u002Fspan>\n            <\u002Ftd>\n            <td>${action}<\u002Ftd>\n          <\u002Ftr>`);\n      } else {\n        // schema\n        const expanded = lgOpenDbs.has(item.dbName);\n        if (!expanded) return;\n\n        // determine parent state for inheritance\n        const parent = lgState.discovered.find(p => p.type === 'db' && p.dbName === item.dbName);\n        const parentDeny = parent && (lgIsAlreadyDeny(parent) || lgIsStagedAdd(parent));\n        const alreadyDeny = lgIsAlreadyDeny(item);\n        const stagedAdd = lgIsStagedAdd(item);\n\n        let rowClass = 'is-child';\n        let action = '';\n        if (parentDeny) {\n          rowClass += ' lipboard.writeText(text).catch(() => {});\n    btn.classList.add('copied');\n    btn.innerHTML = '<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>';\n    setTimeout(() => {\n      btn.classList.remove('copied');\n      btn.innerHTML = '<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"/><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"/><\u002Fsvg>';\n    }, 1400);\n  });\n\n  // ----- v4: land on Step 2 to showcase the new approval UI -----\n  document.addEventListener('DOMContentLoaded', () => {\n    showScreen('screen-3');\n  });\n\n  // ensure provider sub-views start in azure mode\n  setProvider('azure');\n\n  // ESC also closes logical modal\n  document.addEventListener('keydown', e => {\n    if (e.key === 'Escape') closeLogicalModal();\n  });\n\n  // ---------- Floating tooltip for \uc81c\uc678 \uc0ac\uc720 ----------\n  (function(){\n    let tip = null;\n    function ensure() {\n      if (tip) return tip;\n      tip = document.createElement('div');\n      tip.className = 'reason-floating-tip';\n      document.body.appendChild(tip);\n      return tip;\n    }\n    function show(chip) {\n      const t = ensure();\n      const reason = chip.getAttribute('data-reason') || '';\n      const meta = chip.getAttribute('data-reason-meta') || '';\n      t.innerHTML =\n        '<span class=\"rft-label\">\uc81c\uc678 \uc0ac\uc720<\u002Fspan>' +\n        '<span class=\"rft-body\">' + reason + '<\u002Fspan>' +\n        (meta ? '<span class=\"rft-meta\">' + meta + '<\u002Fspan>' : '');\n      t.style.visibility = 'hidden';\n      t.classList.add('visible');\n      const r = chip.getBoundingClientRect();\n      const tw = t.offsetWidth;\n      const th = t.offsetHeight;\n      const margin = 10;\n      let left = r.left;\n      let top = r.bottom + margin;\n      let flipUp = false;\n      if (top + th + 8 > window.innerHeight) {\n        top = r.top - th - margin;\n        flipUp = true;\n      }\n      if (left + tw + 8 > window.innerWidth) {\n        left = window.innerWidth - tw - 8;\n      }\n      if (left < 8) left = 8;\n      t.classList.toggle('flip-up', flipUp);\n      t.style.left = left + 'px';\n      t.style.top = top + 'px';\n      t.style.visibility = '';\n    }\n    function hide() {\n      if (tip) tip.classList.remove('visible');\n    }\n    document.addEventListener('mouseover', function(e) {\n      const chip = e.target.closest('.reason-chip-inline');\n      if (chip) show(chip);\n    });\n    document.addEventListener('mouseout', function(e) {\n      const chip = e.target.closest('.reason-chip-inline');\n      const to = e.relatedTarget;\n      if (chip && (!to || !to.closest('.reason-chip-inline'))) hide();\n    });\n    document.addEventListener('focusin', function(e) {\n      const chip = e.target.closest('.reason-chip-inline');\n      if (chip) show(chip);\n    });\n    document.addEventListener('focusout', function(e) {\n      const chip = e.target.closest('.reason-chip-inline');\n      if (chip) hide();\n    });\n    window.addEventListener('scroll', hide, true);\n  })();\n\n  // ---------- Floating tooltip for Resource ID ----------\n  (function(){\n    let tip = null;\n    function ensure() {\n      if (tip) return tip;\n      tip = document.createElement('div');\n      tip.className = 'resid-floating-tip';\n      document.body.appendChild(tip);\n      return tip;\n    }\n    function show(cell) {\n      const t = ensure();\n      const text = cell.querySelector('.res-id-text')?.textContent || '';\n      t.innerHTML =\n        '<span class=\"rft-label\">Resource ID<\u002Fspan>' +\n        '<span class=\"rft-body\">' + text + '<\u002Fspan>';\n      t.style.visibility = 'hidden';\n      t.classList.add('visible');\n      const r = cell.getBoundingClientRect();\n      const tw = t.offsetWidth;\n      const th = t.offsetHeight;\n      const margin = 8;\n      let left = r.left;\n      let top = r.bottom + margin;\n      let flipUp = false;\n      if (top + th + 8 > window.innerHeight) {\n        top = r.top - th - margin;\n        flipUp = true;\n      }\n      if (left + tw + 8 > window.innerWidth) {\n        left = window.innerWidth - tw - 8;\n      }\n      if (left < 8) left = 8;\n      t.classList.toggle('flip-up', flipUp);\n      t.style.left = left + 'px';\n      t.style.top = top + 'px';\n      t.style.visibility = '';\n    }\n    function hide() {\n      if (tip) tip.classList.remove('visible');\n    }\n    document.addEventListener('mouseover', function(e) {\n      // don't trigger on copy button hover (it's inside the cell but the hover state shouldn't change tip behavior)\n      const cell = e.target.closest('.res-id-cell');\n      if (cell) show(cell);\n    });\n    document.addEventListener('mouseout', function(e) {\n      const cell = e.target.closest('.res-id-cell');\n      const to = e.relatedTarget;\n      if (cell && (!to || !to.closest('.res-id-cell'))) hide();\n    });\n    window.addEventListener('scroll', hide, true);\n  })();\n\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
