<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:'Geist', sans-serif; color:#111827; }
  h1,h2,h3,p { margin:0; }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .lbl { font-family:'Geist Mono', monospace; font-size:10px; color:#9CA3AF; margin-top:6px; }
  .mono { font-family:'Geist Mono', monospace; }
</style>
</head>
<body>
  <h1 style="font-size:28px; font-weight:700; letter-spacing:-0.02em">연동 현황 대시보드</h1>
  <p class="lbl">Display · Geist 28 / 700 / -0.02em · tracking-tight</p>
  <div style="margin-top:10px; font-size:14px; font-weight:400; color:#374151; line-height:1.55">
    전체 시스템의 PII Agent 연동 상태를 모니터링합니다. The quick brown fox jumps over the lazy dog.
  </div>
  <div style="margin-top:10px" class="mono">
    <span style="font-size:12px; color:#6B7280">const primary = '#0064FF';</span>
  </div>
  <div class="lbl">Geist Mono — used for IDs / code</div>
</body>
</html>
