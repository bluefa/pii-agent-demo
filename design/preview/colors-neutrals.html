<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:'Geist', sans-serif; }
  .row { display:flex; gap:4px; }
  .tile { flex:1; }
  .sw  { height:52px; border-radius:6px; }
  .lbl { font-family:'Geist Mono', monospace; font-size:9px; color:#6B7280; margin-top:4px; text-align:center; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile"><div class="sw" style="background:#F9FAFB; border:1px solid #F3F4F6"></div><div class="lbl">50</div></div>
    <div class="tile"><div class="sw" style="background:#F3F4F6"></div><div class="lbl">100</div></div>
    <div class="tile"><div class="sw" style="background:#E5E7EB"></div><div class="lbl">200</div></div>
    <div class="tile"><div class="sw" style="background:#D1D5DB"></div><div class="lbl">300</div></div>
    <div class="tile"><div class="sw" style="background:#9CA3AF"></div><div class="lbl">400</div></div>
    <div class="tile"><div class="sw" style="background:#6B7280"></div><div class="lbl">500</div></div>
    <div class="tile"><div class="sw" style="background:#4B5563"></div><div class="lbl">600</div></div>
    <div class="tile"><div class="sw" style="background:#374151"></div><div class="lbl">700</div></div>
    <div class="tile"><div class="sw" style="background:#1F2937"></div><div class="lbl">800</div></div>
    <div class="tile"><div class="sw" style="background:#111827"></div><div class="lbl">900</div></div>
  </div>
</body>
</html>
