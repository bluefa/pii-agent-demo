<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; font-family:'Geist', sans-serif; }
  h4 { font-size:10px; font-weight:600; color:#6B7280; text-transform:uppercase; letter-spacing:0.06em; margin:0 0 8px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .chip { display:flex; flex-direction:column; align-items:center; gap:4px; width:54px; }
  .chip img { width:28px; height:28px; }
  .lbl { font-size:10px; color:#6B7280; font-family:'Geist Mono', monospace; text-align:center; }
</style>
</head>
<body>
  <h4>PROVIDERS</h4>
  <div class="row">
    <div class="chip"><img src="../assets/icons/aws.svg"><span class="lbl">aws</span></div>
    <div class="chip"><img src="../assets/icons/azure.svg"><span class="lbl">azure</span></div>
    <div class="chip"><img src="../assets/icons/gcp.svg"><span class="lbl">gcp</span></div>
  </div>
  <h4>SERVICES</h4>
  <div class="row">
    <div class="chip"><img src="../assets/icons/ec2.svg"><span class="lbl">ec2</span></div>
    <div class="chip"><img src="../assets/icons/rds.svg"><span class="lbl">rds</span></div>
    <div class="chip"><img src="../assets/icons/dynamodb.svg"><span class="lbl">dynamo</span></div>
    <div class="chip"><img src="../assets/icons/redshift.svg"><span class="lbl">redshift</span></div>
    <div class="chip"><img src="../assets/icons/azure-sql.svg"><span class="lbl">az sql</span></div>
    <div class="chip"><img src="../assets/icons/azure-cosmos.svg"><span class="lbl">cosmos</span></div>
    <div class="chip"><img src="../assets/icons/azure-postgresql.svg"><span class="lbl">az pg</span></div>
    <div class="chip"><img src="../assets/icons/azure-mysql.svg"><span class="lbl">az mysql</span></div>
    <div class="chip"><img src="../assets/icons/azure-mariadb.svg"><span class="lbl">mariadb</span></div>
    <div class="chip"><img src="../assets/icons/azure-synapse.svg"><span class="lbl">synapse</span></div>
    <div class="chip"><img src="../assets/icons/azure-vm.svg"><span class="lbl">az vm</span></div>
  </div>
</body>
</html>
