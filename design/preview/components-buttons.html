<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#F9FAFB; font-family:'Geist', sans-serif; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  button { font-family:inherit; }
</style>
</head>
<body>
  <div class="row">
    <button class="ds-btn ds-btn--primary">새 프로젝트</button>
    <button class="ds-btn ds-btn--secondary">취소</button>
    <button class="ds-btn ds-btn--ghost">닫기</button>
    <button class="ds-btn ds-btn--success">승인</button>
    <button class="ds-btn ds-btn--danger">반려</button>
    <button class="ds-btn ds-btn--primary" disabled style="opacity:.5; cursor:not-allowed">비활성</button>
  </div>
  <div class="row" style="margin-top:12px">
    <button class="ds-btn ds-btn--primary" style="padding:6px 12px; font-size:13px">sm</button>
    <button class="ds-btn ds-btn--primary">md</button>
    <button class="ds-btn ds-btn--primary" style="padding:12px 24px; font-size:16px">lg</button>
  </div>
</body>
</html>
