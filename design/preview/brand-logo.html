<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:#F9FAFB; font-family:'Geist', sans-serif; }
  .row { display:flex; gap:16px; align-items:center; }
  .logo { width:44px; height:44px; border-radius:12px; background:#0064FF; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px -1px rgb(0 100 255 / 0.35); }
  .logo svg { color:#fff; }
  .grad { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg, #0064FF 0%, #6366f1 100%); }
  .wordmark { font-size:20px; font-weight:700; letter-spacing:-0.02em; color:#111827; }
  .tag { font-size:12px; color:#6B7280; margin-top:2px; }
  .col { display:flex; flex-direction:column; }
</style>
</head>
<body>
  <div class="row">
    <div class="logo">
      <svg width="26" height="26" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <div class="col">
      <div class="wordmark">PII Agent</div>
      <div class="tag">관리자 · Cloud Provider 연동</div>
    </div>
    <div style="width:1px; height:40px; background:#E5E7EB"></div>
    <div class="grad"></div>
    <div class="col">
      <div style="font-size:12px; color:#6B7280">Brand gradient</div>
      <div style="font-family:'Geist Mono', monospace; font-size:11px; color:#111827">#0064FF → #6366f1</div>
    </div>
  </div>
</body>
</html>
