<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:'Geist', sans-serif; }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .bar { height:10px; background:#0064FF; border-radius:2px; }
  .name { width:34px; font-family:'Geist Mono', monospace; font-size:11px; color:#6B7280; }
  .val { font-family:'Geist Mono', monospace; font-size:10px; color:#9CA3AF; margin-left:4px; }
</style>
</head>
<body>
  <div class="row"><span class="name">1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="name">2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="name">3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="name">4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="name">5</span><div class="bar" style="width:20px"></div><span class="val">20px</span></div>
  <div class="row"><span class="name">6</span><div class="bar" style="width:24px"></div><span class="val">24px · card padding</span></div>
  <div class="row"><span class="name">8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="name">10</span><div class="bar" style="width:40px"></div><span class="val">40px</span></div>
  <div class="row"><span class="name">12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
</body>
</html>
