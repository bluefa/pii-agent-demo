<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:'Geist', sans-serif; }
  .row { display:flex; gap:16px; align-items:flex-start; }
  ul { list-style:none; margin:0; padding:8px 0; width:240px; background:#fff; box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.06); border-radius:12px; }
  li { margin:0 8px; padding:10px 12px; border-radius:8px; font-size:14px; color:#111827; cursor:pointer; border-left:4px solid transparent; transition:background 120ms; }
  li:hover { background:#F9FAFB; }
  li.active { background:#EFF6FF; border-left-color:#3B82F6; box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.04); }
  li.active .name { color:#1E40AF; font-weight:600; }
  li.active .sub  { color:#0064FF; }
  .name { display:flex; justify-content:space-between; align-items:center; }
  .badge { font-size:11px; background:#DBEAFE; color:#0064FF; padding:1px 8px; border-radius:999px; font-weight:500; }
  .sub { font-size:13px; color:#6B7280; margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <ul>
      <li><div class="name"><span>SVC-0001</span></div><div class="sub">결제 서비스</div></li>
      <li class="active"><div class="name"><span>SVC-0042</span><span class="badge">12</span></div><div class="sub">회원 데이터 허브</div></li>
      <li><div class="name"><span>SVC-0108</span></div><div class="sub">로그 분석</div></li>
      <li><div class="name"><span>SVC-0219</span></div><div class="sub">추천 엔진</div></li>
    </ul>
    <div style="font-size:12px; color:#6B7280; max-width:180px; line-height:1.5">
      <b style="color:#111827">Sidebar list</b><br>
      4px left-blue border + bg-blue-50 is the canonical "selected" pattern used across the admin.
    </div>
  </div>
</body>
</html>
