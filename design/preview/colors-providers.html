<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:'Geist', sans-serif; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .card { width:110px; border-left:4px solid; border-radius:8px; padding:12px; }
  .name { font-size:13px; font-weight:700; margin-bottom:2px; }
  .hex { font-family:'Geist Mono', monospace; font-size:10px; color:#9CA3AF; }
</style>
</head>
<body>
  <div class="row">
    <div class="card" style="border-color:#FF9900; background:#FF99000D"><div class="name" style="color:#FF9900">AWS</div><div class="hex">#FF9900</div></div>
    <div class="card" style="border-color:#0078D4; background:#0078D40D"><div class="name" style="color:#0078D4">Azure</div><div class="hex">#0078D4</div></div>
    <div class="card" style="border-color:#4285F4; background:#4285F40D"><div class="name" style="color:#4285F4">GCP</div><div class="hex">#4285F4</div></div>
    <div class="card" style="border-color:#374151; background:#F9FAFB"><div class="name" style="color:#374151">IDC</div><div class="hex">#374151</div></div>
    <div class="card" style="border-color:#9333EA; background:#FAF5FF"><div class="name" style="color:#9333EA">SDU</div><div class="hex">#9333EA</div></div>
  </div>
</body>
</html>
