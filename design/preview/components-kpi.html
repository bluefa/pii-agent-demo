<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#F9FAFB; font-family:'Geist', sans-serif; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .kpi { background:#fff; border-radius:16px; box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.06); padding:20px; }
  .head { display:flex; justify-content:space-between; align-items:center; }
  .icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
  .icon1 { background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
  .icon2 { background:linear-gradient(135deg, #10b981 0%, #059669 100%); }
  .pct { font-size:20px; font-weight:700; color:#0064FF; text-align:right; }
  .unit { font-size:10px; color:#9CA3AF; text-align:right; }
  .lbl { font-size:13px; color:#6B7280; margin-top:14px; font-weight:500; }
  .big { font-size:26px; font-weight:700; color:#111827; letter-spacing:-0.01em; margin-top:2px; }
  .sub { font-size:12px; color:#9CA3AF; font-weight:400; margin-left:6px; }
  .chip { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:2px 8px; border-radius:999px; margin-top:10px; background:#FEF2F2; color:#DC2626; font-weight:500; }
  .chip .d { width:5px; height:5px; border-radius:50%; background:#DC2626; }
</style>
</head>
<body>
  <div class="grid">
    <div class="kpi">
      <div class="head">
        <div class="icon icon1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="7" rx="1.5" stroke="white" stroke-width="1.8"/><rect x="3" y="14" width="18" height="7" rx="1.5" stroke="white" stroke-width="1.8"/><circle cx="7" cy="6.5" r="1" fill="white"/><circle cx="7" cy="17.5" r="1" fill="white"/></svg></div>
        <div><div class="pct">94.2%</div><div class="unit">연동률</div></div>
      </div>
      <div class="lbl">서비스 현황</div>
      <div class="big">1,482<span class="sub">시스템</span></div>
      <span class="chip"><span class="d"></span>끊어진 서비스 3</span>
    </div>
    <div class="kpi">
      <div class="head">
        <div class="icon icon2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="6" rx="7" ry="3" stroke="white" stroke-width="1.8"/><path d="M5 6v5c0 1.66 3.13 3 7 3s7-1.34 7-3V6" stroke="white" stroke-width="1.8"/><path d="M5 11v5c0 1.66 3.13 3 7 3s7-1.34 7-3v-5" stroke="white" stroke-width="1.8"/></svg></div>
        <div><div class="pct">88.7%</div><div class="unit">연동률</div></div>
      </div>
      <div class="lbl">DB 연동 현황</div>
      <div class="big">3,204<span class="sub">연동중</span></div>
      <span class="chip"><span class="d"></span>끊김 12</span>
    </div>
  </div>
</body>
</html>
