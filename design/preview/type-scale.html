<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px 22px; background:#fff; font-family:'Geist', sans-serif; }
  .row { display:flex; gap:14px; flex-wrap:wrap; align-items:baseline; }
  .item { display:flex; align-items:baseline; gap:8px; border-right:1px solid #F3F4F6; padding-right:14px; }
  .item:last-child { border-right:0; }
  .lbl { font-family:'Geist Mono', monospace; font-size:10px; color:#9CA3AF; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><span style="font-size:28px; font-weight:700; letter-spacing:-0.02em; color:#111827">Display</span><span class="lbl">28 / 700</span></div>
    <div class="item"><span style="font-size:22px; font-weight:700; color:#111827">H1</span><span class="lbl">22 / 700</span></div>
    <div class="item"><span style="font-size:18px; font-weight:600; color:#111827">H3</span><span class="lbl">18 / 600</span></div>
    <div class="item"><span style="font-size:15px; color:#374151">Body 15</span><span class="lbl">15 / 400</span></div>
    <div class="item"><span style="font-size:13px; color:#6B7280">Caption 13</span><span class="lbl">13 / 400</span></div>
    <div class="item"><span style="font-size:12px; color:#9CA3AF">Label 12</span><span class="lbl">12 / 400</span></div>
  </div>
  <div style="margin-top:16px; font-size:14px; font-weight:600; color:#6B7280; text-transform:uppercase; letter-spacing:0.05em">CARD TITLE STYLE · 14 / 600 UPPERCASE</div>
</body>
</html>
