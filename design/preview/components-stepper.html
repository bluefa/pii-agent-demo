<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#F9FAFB; font-family:'Geist', sans-serif; }
  .wrap { display:flex; align-items:center; justify-content:space-between; gap:4px; background:#fff; border-radius:12px; box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.06); padding:16px 20px; }
  .step { display:flex; flex-direction:column; align-items:center; flex:1; }
  .circle { width:36px; height:36px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; transition:all 150ms; }
  .done { background:#45CB85; color:#fff; }
  .curr { background:#3B82F6; color:#fff; box-shadow:0 0 0 4px #DBEAFE; }
  .todo { background:#F3F4F6; color:#9CA3AF; }
  .label { font-size:10px; font-weight:500; margin-top:6px; text-align:center; max-width:80px; line-height:1.3; }
  .lbl-done { color:#2A7D52; }
  .lbl-curr { color:#0064FF; }
  .lbl-todo { color:#9CA3AF; }
  .bar { flex:1; height:3px; border-radius:999px; margin:0 4px; margin-top:-24px; }
  .bar-done { background:#45CB85; }
  .bar-todo { background:#E5E7EB; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="step"><div class="circle done">✓</div><div class="label lbl-done">대상 확정</div></div>
    <div class="bar bar-done"></div>
    <div class="step"><div class="circle done">✓</div><div class="label lbl-done">승인 대기</div></div>
    <div class="bar bar-done"></div>
    <div class="step"><div class="circle curr">3</div><div class="label lbl-curr">반영 중</div></div>
    <div class="bar bar-todo"></div>
    <div class="step"><div class="circle todo">4</div><div class="label lbl-todo">설치 진행</div></div>
    <div class="bar bar-todo"></div>
    <div class="step"><div class="circle todo">5</div><div class="label lbl-todo">연결 테스트</div></div>
  </div>
</body>
</html>
