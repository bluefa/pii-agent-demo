                type: string
              schema_name:
                type: string
              reason:
                type: string
                enum: [TMP, STG, DEV]
              type:
                type: string
                enum: [DATABASE, SCHEMA]

    ExcludedLogicalDatabasesResponse:
      type: object
      required: [skip_logical_database_list]
      properties:
        skip_logical_database_list:
          type: array
          items:
            type: object
            required: [database_name, reason, type]
            properties:
              database_name:
                type: string
              schema_name:
                type: string
              reason:
                type: string
                enum: [TMP, STG, DEV]
              type:
                type: string
                enum: [DATABASE, SCHEMA]

    TestedLogicalDatabasesResponse:
      type: object
      required: [logical_database_list]
      properties:
        logical_database_list:
          type: array
          items:
            type: object
            required: [database_name, type]
            properties:
              database_name:
                type: string
              schema_name:
                type: string
              type:
                type: string
                enum: [DATABASE, SCHEMA]

    UpdateTestConnectionConfirmationRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean

    TestConnectionConfirmationResponse:
      type: object
      required: [target_source_id, confirmed]
      properties:
        target_source_id:
          type: integer
          format: int64
        confirmed:
          type: boolean
        confirmed_at:
          type: string
          format: date-time
          nullable: true

    ScanStatus:
      type: string
      enum:
        - ADDED
        - UNCHANGED
        - DELETED

    IntegrationStatus:
      type: string
      enum:
        - INTEGRATED
        - NOT_INTEGRATED

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    # --- Test Connection Schemas ---
    TestConnectionTriggerResponse:
      type: object
      required: [success, id]
      properties:
        success:
          type: boolean
          description: "요청 수락 여부"
        id:
          type: string
          description: "생성된 연결 테스트 작업 ID. polling 시 사용"

    TestConnectionJob:
      type: object
      description: "연결 테스트 작업의 전체 정보."
      required: [id, target_source_id, status, requested_at]
      properties:
        id:
          type: string
          description: "연결 테스트 작업 고유 ID"
          example: "tc-20260218-001"
        target_source_id:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/TestConnectionStatus'
        requested_at:
          type: string
          format: date-time
          nullable: true
          description: "요청 시각. 아직 기록되지 않은 경우 null"
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: "테스트 완료 시각. PENDING 상태에서는 null"
        requested_by:
          type: string
          description: "요청자 ID"
        resource_test_results:
          type: array
          items:
            $ref: '#/components/schemas/ResourceTestResult'

    ResourceTestResult:
      type: object
      required: [resource_id, test_connection_status]
      properties:
        resource_id:
          type: string
          description: "리소스 고유 식별자"
        test_connection_status:
          $ref: '#/components/schemas/TestConnectionStatus'
          description: "해당 리소스의 테스트 연결 상태"

    TestConnectionStatus:
      type: string
      enum: [PENDING, SUCCESS, FAIL]
      description: |
        연결 테스트 상태:
        - PENDING: 테스트 진행 중 (= Running)
        - SUCCESS: 모든 리소스 연결 성공
        - FAIL: 1개 이상의 리소스 연결 실패

    TestConnectionErrorStatus:
      type: string
      enum: [AUTH_FAIL, CONNECTION_FAIL, PERMISSION_DENIED]
      description: |
        연결 테스트 실패 유형:
        - AUTH_FAIL: 인증 실패 (credential 오류)
        - CONNECTION_FAIL: 연결 실패 (네트워크/호스트 접근 불가)
        - PERMISSION_DENIED: 권한 부족 (접근 가능하나 권한 없음)

    TestConnectionResultsResponse:
      type: object
      required: [content, page]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TestConnectionJob'
        page:
          $ref: '#/components/schemas/PageInfo'

    PageInfo:
      type: object
      required: [totalElements, totalPages, number, size]
      properties:
        totalElements: { type: integer, example: 5 }
        totalPages: { type: integer, example: 1 }
        number: { type: integer, description: "현재 페이지 번호 (0-based)" }
        size: { type: integer, description: "요청한 페이지 당 항목 수" }

    PiiAgentCommentDto:
      type: object
      properties:
        id:
          type: string
        targetSourceId:
          type: integer
          format: int64
        comment:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - targetSourceId
        - comment
        - createdBy
        - createdAt

    PiiAgentCommentRequestDto:
      type: object
      properties:
        comment:
          type: string
      required:
        - comment

  parameters:
    TargetSourceId:
      name: targetSourceId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    ResourceId:
      name: resourceId
      in: query
      required: true
      description: 리소스 고유 식별자
      schema:
        type: string
        example: "resource-abc-123"

  responses:
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    TestedLogicalDatabaseNotFound:
      description: TC 결과 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: "인증 실패"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            error: { code: "UNAUTHORIZED", message: "인증이 필요합니다." }

    PermissionDenied:
      description: "인가 실패"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            error: { code: "FORBIDDEN", message: "해당 리소스에 접근할 권한이 없습니다." }

    TargetSourceNotFound:
      description: "대상 소스를 찾을 수 없음"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            error: { code: "TARGET_SOURCE_NOT_FOUND", message: "해당 ID의 Target Source가 존재하지 않습니다." }
 
