# ADR-016 V1 reference configuration. The operational knobs below are bound by @Value into the immutable
# PipelineEngineSettings @Configuration (deploy-time, no runtime PUT), which the engine reads directly.
# Unit-test slices do not load this file — they use PipelineEngineSettings.builder() whose default values
# mirror these. The Postgres datasource lives under the `postgres` profile (it inherits these knobs). Tests
# use embedded H2 with Hibernate auto-DDL.

im:
  base-url: http://infra-manager.local   # IM (Infra Manager) Feign transport (implementation-notes §A)

pipeline:
  # operational knobs — bound by @Value into PipelineEngineSettings (deploy-time, no runtime PUT).
  slot-cap: 4
  max-external-calls-per-tick: 50
  max-fail-count: 3
  task-check-retention-days: 90
  tick-interval: PT30S
  per-call-deadline: PT30S
  dispatch-recovery-timeout: PT5M
  execution-timeout: PT30M
  wait-external-ttl: P7D
  condition-polling-guard: PT10M
  job-poll-cadence: PT45S
  queue-wait-alert: PT30M
  # background-loop cadences (PipelineScheduler) — not PipelineEngineSettings knobs.
  scheduler:
    initial-delay-ms: 5000
    tick-ms: 30000
    alert-ms: 60000
    notify-ms: 10000

---
# Production profile: Postgres + the canonical schema (schema-postgres.sql, validated). The operational knobs
# are inherited from the default profile's `pipeline:` block above (no per-environment override here).
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/pipeline
    username: ${DB_USER:pipeline}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # schema is owned by schema-postgres.sql / migrations, not Hibernate
    properties:
      hibernate.jdbc.time_zone: UTC
